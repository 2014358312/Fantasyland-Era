 EDE_develop_land: "圣都大开发"
 EDE_develop_land_desc: "我们的国土资源有限，必须先将小岛建设成能维持整个军队补给的基地。"
 EDE_mechanical_punk_research_society: "机械朋克研究社"
 EDE_mechanical_punk_research_society_desc: "汇集伊甸之都魔法社团的精干人才，研发出能将现代工业与伊甸魔法相融合的生产机器。"
 EDE_support_bonaven_company: "支持波拿文公司"
 EDE_support_bonaven_company_desc: "波拿文家族是伊甸之都地位最高的家族，旗下的波拿文重工集团也是全大洋洲最具影响力的公司。"
 EDE_introduce_heavy_industrial_equipment: "改进重型工业设备"
 EDE_introduce_heavy_industrial_equipment_desc: "我们的研究人员发现如果将岛上的魔法晶矿石提炼到一定纯度后可以代替很多稀有金属成为车间生产的原材料。"
 EDE_funding_mariana_corporation: "玛丽安娜公司"
 EDE_funding_mariana_corporation_desc: "以世羽已故的母亲所命名的公司，致力于伊甸之都的民用及军用设施建设。"
 EDE_developing_radar: "电子科技"
 EDE_developing_radar_desc: "计算机的出现使科学家们摆脱枯燥的演算程序，以至于可以有更多的时间胡思乱想……额，我是说，猜想。"
 EDE_comprehensive_research_team: "综合研究团队"
 EDE_comprehensive_research_team_desc: "介绍我懒得编了，反正就是能得到一个科研槽。"
 
