#国策
 # 共同前置
 EDN_forgotten_utopia:0 "被遗忘的理想乡"
 EDN_forgotten_utopia_desc:0 "我们的圣城曾是世界的灯塔，如今却被遗忘在历史的角落。是时候重新审视我们的处境了。"
 EDN_silence_of_feather_church:0 "羽教的沉默"
 EDN_silence_of_feather_church_desc:0 "曾经引导万民的羽教，如今对国家的困境保持了令人不安的沉默。"
 EDN_holy_city_council_debate:0 "圣城议会争论"
 EDN_holy_city_council_debate_desc:0 "议会中各派势力针锋相对，伊甸的未来道路必须在此刻抉择。"
 EDN_why_were_we_forgotten:0 "我们为何被遗忘？"
 EDN_why_were_we_forgotten_desc:0 "这个问题回荡在每一位伊甸公民心中。答案将决定我们的命运。"

 # 路线一：神权复辟
 EDN_enthrone_saintess:0 "拥立圣“女”"
 EDN_enthrone_saintess_desc:0 "让圣女重新登上权力的宝座，以神圣的意志引领伊甸。"
 EDN_purge_secular_council:0 "清洗世俗议会"
 EDN_purge_secular_council_desc:0 "世俗派的杂音只会阻碍神圣事业的推进。"
 EDN_doctrine_above_law:0 "教义高于法律"
 EDN_doctrine_above_law_desc:0 "羽教的教义即是最高法则，凡人的律法不过是其注脚。"
 EDN_holy_guard_oath:0 "圣卫军誓约"
 EDN_holy_guard_oath_desc:0 "以圣女之名起誓，圣卫军将成为信仰最锋利的剑。"
 EDN_moderate_theocracy:0 "温和神权"
 EDN_moderate_theocracy_desc:0 "信仰引导而非强制，以宗教的感召力团结同道。"
 EDN_religious_diplomacy:0 "宗教外交"
 EDN_religious_diplomacy_desc:0 "向世界传播羽教的光辉，建立以信仰为纽带的同盟。"
 EDN_extreme_crusade:0 "极端圣战路线"
 EDN_extreme_crusade_desc:0 "不信者必须被净化，这是神圣的使命。"
 EDN_heretic_purge_decree:0 "异端清洗令"
 EDN_heretic_purge_decree_desc:0 "颁布清洗令，所有异端将在圣火中被审判。"
 EDN_heaven_on_earth:0 "地上天国"
 EDN_heaven_on_earth_desc:0 "伊甸将成为神在地上的国度，永恒而不可侵犯。"

 # 路线二：世俗理性改革
 EDN_limit_church_power:0 "限制羽教权力"
 EDN_limit_church_power_desc:0 "信仰属于个人，国家属于公民。教会不应干预政治。"
 EDN_restore_parliament:0 "恢复议会制度"
 EDN_restore_parliament_desc:0 "让人民的声音重新回到权力的殿堂。"
 EDN_freedom_of_faith_act:0 "信仰自由法案"
 EDN_freedom_of_faith_act_desc:0 "每一位公民都有信仰或不信仰的自由，这是不可剥夺的权利。"
 EDN_citizens_eden:0 "公民的伊甸"
 EDN_citizens_eden_desc:0 "伊甸不属于神，不属于教会，它属于每一位生活在这里的公民。"
 EDN_international_idealism:0 "国际理想主义"
 EDN_international_idealism_desc:0 "伊甸的理想不应止步于城墙之内，我们要将光明带给整个世界。"
 EDN_ideal_alliance:0 "理想联盟"
 EDN_ideal_alliance_desc:0 "与志同道合的国家携手，共建理想的世界秩序。"
 EDN_isolationist_guardian:0 "孤立守护者"
 EDN_isolationist_guardian_desc:0 "在这个疯狂的世界中，守护好自己的家园才是最重要的。"
 EDN_walls_and_neutrality:0 "城墙与中立"
 EDN_walls_and_neutrality_desc:0 "筑起高墙，保持中立。让战火在我们的城墙外燃烧。"
 EDN_true_utopia:0 "真正的理想乡"
 EDN_true_utopia_desc:0 "伊甸终于成为了它名字所承诺的样子——一个真正的理想乡。"

 # 路线三：军政强硬
 EDN_declare_martial_law:0 "宣布紧急戒严"
 EDN_declare_martial_law_desc:0 "软弱的议会和虚伪的教会都无法拯救伊甸，唯有铁腕才能带来秩序。"
 EDN_dissolve_council:0 "解散圣城议会"
 EDN_dissolve_council_desc:0 "议会的时代已经结束。从今天起，军政委员会接管一切。"
 EDN_military_committee:0 "军政委员会"
 EDN_military_committee_desc:0 "由最优秀的军事指挥官组成的委员会将领导国家走向强盛。"
 EDN_instrumentalize_faith:0 "信仰工具化"
 EDN_instrumentalize_faith_desc:0 "信仰是凝聚力的来源，也是最好的动员工具。"
 EDN_realist_diplomacy:0 "现实主义外交"
 EDN_realist_diplomacy_desc:0 "没有永恒的敌人，也没有永恒的朋友，只有永恒的利益。"
 EDN_limited_war_theory:0 "有限战争理论"
 EDN_limited_war_theory_desc:0 "战争是政治的延续，但必须被精确地控制在有限范围内。"
 EDN_iron_expansionism:0 "铁血扩张主义"
 EDN_iron_expansionism_desc:0 "伊甸的疆域应当与其力量相匹配。"
 EDN_steel_expedition_force:0 "钢铁远征军"
 EDN_steel_expedition_force_desc:0 "组建一支无坚不摧的远征军，将伊甸的意志投射到远方。"
 EDN_steel_eden:0 "钢铁伊甸"
 EDN_steel_eden_desc:0 "伊甸不再是脆弱的理想乡，而是一座钢铁铸就的堡垒。"

 # 隐藏路线：信仰崩塌
 EDN_broken_wings:0 "羽翼折断"
 EDN_broken_wings_desc:0 "一切信仰与秩序都在崩溃……伊甸正在坠落。"
 EDN_holy_city_civil_war:0 "圣城内战"
 EDN_holy_city_civil_war_desc:0 "兄弟阋墙，圣城的街道被鲜血染红。"
 EDN_choice_in_ruins:0 "废墟中的抉择"
 EDN_choice_in_ruins_desc:0 "在废墟之中，幸存者们必须做出最后的选择。"
 EDN_pure_military_junta:0 "纯军政府"
 EDN_pure_military_junta_desc:0 "只有军队还保持着秩序。让军人来重建这个国家。"
 EDN_total_republic:0 "彻底共和国"
 EDN_total_republic_desc:0 "从废墟中诞生的共和国，将彻底告别过去的一切。"

 # 国家精神
 EDN_lost_symbol:0 "失落的象征"
 EDN_lost_symbol_desc:0 "伊甸曾经象征着理想与希望，如今这个名字只剩下空洞的回响。"
 EDN_doctrine_supremacy:0 "教义至上"
 EDN_doctrine_supremacy_desc:0 "羽教的教义凌驾于一切世俗法律之上，异见者将被沉默。"
 EDN_holy_guard_spirit:0 "圣卫军之魂"
 EDN_holy_guard_spirit_desc:0 "以信仰武装的圣卫军，是伊甸最忠诚的守护者。"
 EDN_crusade_fervor:0 "圣战狂热"
 EDN_crusade_fervor_desc:0 "圣战的号角已经吹响，每一位信徒都渴望为信仰而战。"
 EDN_war_justification_speed:0 "异端审判"
 EDN_war_justification_speed_desc:0 "对异端的审判不需要冗长的程序，神意即是正义。"
 EDN_heaven_on_earth_spirit:0 "地上天国"
 EDN_heaven_on_earth_spirit_desc:0 "伊甸已成为神在地上的国度，信仰之火将焚尽一切不义。"
 EDN_faith_freedom:0 "信仰自由"
 EDN_faith_freedom_desc:0 "每位公民都享有信仰自由，多元的思想让伊甸更加繁荣。"
 EDN_citizen_eden_spirit:0 "公民的伊甸"
 EDN_citizen_eden_spirit_desc:0 "伊甸属于她的公民，公民的福祉高于一切。"
 EDN_idealist_volunteers:0 "理想主义志愿军"
 EDN_idealist_volunteers_desc:0 "怀揣理想的志愿者们，愿意为正义的事业奔赴远方。"
 EDN_trade_influence_up:0 "理想联盟贸易网"
 EDN_trade_influence_up_desc:0 "以共同的理想为纽带建立的贸易网络，惠及所有成员。"
 EDN_fortress_eden:0 "伊甸堡垒"
 EDN_fortress_eden_desc:0 "高耸的城墙守护着伊甸的安宁，外敌休想踏入一步。"
 EDN_walls_neutrality_spirit:0 "城墙与中立"
 EDN_walls_neutrality_spirit_desc:0 "在坚固的城墙之后，伊甸埋头建设，不问外事。"
 EDN_true_utopia_spirit:0 "真正的理想乡"
 EDN_true_utopia_spirit_desc:0 "伊甸终于实现了她的名字所承载的全部含义。"
 EDN_instrumentalized_faith:0 "工具化的信仰"
 EDN_instrumentalized_faith_desc:0 "信仰不再是目的，而是服务于国家机器的高效工具。"
 EDN_realist_diplo_spirit:0 "现实主义外交"
 EDN_realist_diplo_spirit_desc:0 "利益至上的外交方针，让伊甸在列强间游刃有余。"
 EDN_limited_war:0 "有限战争"
 EDN_limited_war_desc:0 "精确控制战争规模，以最小代价获取最大利益。"
 EDN_iron_expansion_spirit:0 "铁血扩张"
 EDN_iron_expansion_spirit_desc:0 "伊甸的疆域将随着她的军事力量一同扩张。"
 EDN_steel_expedition:0 "钢铁远征军"
 EDN_steel_expedition_desc:0 "这支远征军是伊甸意志的延伸，所到之处皆为伊甸的领土。"
 EDN_steel_eden_spirit:0 "钢铁伊甸"
 EDN_steel_eden_spirit_desc:0 "理想乡已被钢铁重铸，柔软的梦想让位于冰冷的现实。"
 EDN_junta_spirit:0 "军政府统治"
 EDN_junta_spirit_desc:0 "从废墟中崛起的军政府，以铁腕维持着脆弱的秩序。"
 EDN_republic_reborn_spirit:0 "共和国重生"
 EDN_republic_reborn_spirit_desc:0 "浴火重生的共和国，在废墟之上书写新的篇章。"


#政党
 EDE_Yohane_Theocracy_long_name:0 "羽教神权圣国派"
 EDE_Yohane_Theocracy:0 "羽教圣国派"
 EDE_military_government_long_name:0 "伊甸之都军政府"
 EDE_military_government:0 "军政府"

 ###################################
 # 伊甸之都 - 右侧分支（工业/军事）本地化
 ###################################

 EDE_develop_land: "开垦圣土"
 EDE_develop_land_desc: "圣典记载，伊甸的土地是神所赐予的——耕耘它，就是践行信仰。\n\n但千年的宗教专注让这片土地的物质基础已经远远落后于时代。教会高层终于承认：仅靠祈祷和圣歌，帝国无法在下一个时代生存下去。\n\n是时候把圣土也纳入\"开垦\"的范畴了——不仅是田野，还有矿山、工坊和高炉。"
 EDE_develop_land_tt: "§G神权体制下的工业化第一步。教会长老会议通过《圣土开拓令》§!"
 EDE_consecrated_workshops: "圣化工坊"
 EDE_consecrated_workshops_desc: "保守派的方案——任何工坊在投产前必须接受\"圣化仪式\"。由羽翼教会的神职人员为每一台机器、每一座熔炉进行祝祷。\n\n听起来像是拖累效率的繁文缛节——但实际操作中，工匠们发现：\"被祝福过的工具\"确实出故障的频率更低。也许是心理作用，也许不是。\n\n§Y与世俗制造路线互斥§!"
 EDE_consecrated_workshops_tt: "§G工业加成(+0.5×2, uses=2)，稳定+3%。工匠们虔诚地工作，故障率显著下降§!"
 EDE_mechanical_punk_research_society: "机械朋克研究会"
 EDE_mechanical_punk_research_society_desc: "激进派的方案——一群年轻的神职人员和世俗工程师组成了\"机械朋克研究会\"，主张用最现代的技术武装伊甸。\n\n他们的口号极具争议：\"如果神造了人，人造了机器，那机器也是神的造物。\"\n\n保守派称他们是异端，改革派称他们是未来。\n\n§Y与圣化工坊路线互斥§!"
 EDE_mechanical_punk_research_society_tt: "§G工业加成(+1×2, uses=2)，政治点数+25。改革派在教会内部的话语权开始提升§!"
 EDE_saints_hammer: "圣徒之锤"
 EDE_saints_hammer_desc: "圣化工坊的第一个产品——\"圣徒之锤\"系列手工武器。每一把都由圣化过的工匠制造，上面刻着经文。\n\n工艺精湛、质量上乘，但产量极低。一个月的产能只够武装一个连。\n\n不过对于伊甸的宗教军队来说，这不是武器——是圣物。"
 EDE_saints_hammer_tt: "§G获得民族精神：圣徒之锤工坊。高品质但低产量的特色军备§!"
 EDE_temple_metallurgy: "圣殿冶金"
 EDE_temple_metallurgy_desc: "将古老的圣殿建造工艺与现代冶金学结合。圣化工坊的工匠们发现，按照圣典中记载的古法炼制的钢铁，强度确实优于现代工艺。\n\n没有人说得清原因——但结果无法否认。\n\n教会决定将这套工艺体系化，培养新一代\"圣殿冶金师\"。"
 EDE_temple_metallurgy_tt: "§G建筑科技加成(+1, uses=1)，工业加成(+0.5, uses=1)§!"
 EDE_support_bonaven_company: "波纳文公司"
 EDE_support_bonaven_company_desc: "波纳文家族是伊甸少有的世俗工业寡头。他们控制着伊甸最大的民营工厂，生产从缝纫机到农具的一切。\n\n机械朋克研究会建议教会扶持波纳文公司——用他们现成的工业基础，比从零开始建立圣化工坊快得多。\n\n代价是：波纳文家族的权力将大幅膨胀。"
 EDE_support_bonaven_company_tt: "§G获得民族精神：波纳文公司。快速的工业扩张，但世俗资本崛起§!"
 EDE_introduce_heavy_industrial_equipment: "引进重工业设备"
 EDE_introduce_heavy_industrial_equipment_desc: "通过波纳文公司的海外关系，伊甸第一次引进了真正意义上的重工业设备——高炉、轧钢机、精密机床。\n\n这些钢铁怪兽被运到伊甸时，围观的平民惊呼\"恶魔的造物\"。\n\n但当第一炉现代钢水浇铸出来时，连最保守的主教都不得不承认：效率就是效率。"
 EDE_introduce_heavy_industrial_equipment_tt: "§G政治点数+100，建筑+1加成，工业+1加成。伊甸正式进入重工业时代§!"
 EDE_holy_silver_veins: "圣银矿脉"
 EDE_holy_silver_veins_desc: "圣化路线的资源方案——由教会主导开采圣典中记载的\"圣银矿脉\"。这些矿脉虽然不产真正的白银，但含有丰富的铁、铬等战略金属。\n\n开采前要举行祈福仪式，矿工都是虔诚的信徒。效率不如世俗采矿公司，但……至少矿难率低得惊人。\n\n§Y与波纳文重工路线互斥§!"
 EDE_holy_silver_veins_tt: "§G钢铁+30，铬+10（随机州）。由教会主导的资源开采系统§!"
 EDE_funding_mariana_corporation: "资助玛丽安娜公司"
 EDE_funding_mariana_corporation_desc: "玛丽安娜公司是波纳文集团的军工子公司。教会直接注资，让他们专门为伊甸生产军用装备。\n\n公司的CEO——一位留着红色长发的女强人——向教会承诺：\"三年之内，伊甸将拥有这个次元最先进的军工体系。\"\n\n她没说的是：三年之后，玛丽安娜公司也将拥有这个次元最大的军工垄断。\n\n§Y与圣银矿脉路线互斥§!"
 EDE_funding_mariana_corporation_tt: "§G获得民族精神：玛丽安娜公司。军工生产力大幅提升，但寡头影响力扩张§!"
 EDE_divine_oracle_computation: "神谕推算"
 EDE_divine_oracle_computation_desc: "圣化路线的\"计算机\"方案——圣殿里的学者们发现，古代神谕仪式中使用的复杂符文阵列，在数学上等价于现代计算电路。\n\n他们开始系统化这套技术，把圣坛变成了……算力集群。\n\n\"这不是亵渎，\"首席学者说，\"这是让神的智慧以新的形式显现。\""
 EDE_divine_oracle_computation_tt: "§G电子科技+1.5（uses=1），研究速度+3%。神权与科学的奇特融合§!"
 EDE_developing_radar: "雷达研发"
 EDE_developing_radar_desc: "世俗路线的电子发展——玛丽安娜公司的工程师团队从海外引进雷达技术，并在伊甸进行本土化改进。\n\n第一台伊甸产雷达在圣殿塔顶测试时，保守派主教路过惊呼：\"那是什么邪恶的天线！\"\n\n\"是雷达，大人，\"工程师耐心地解释，\"它能让我们看到几十公里外的飞机。\"\n\n\"……能看到？那就……是好东西。\""
 EDE_developing_radar_tt: "§G电子科技+2（uses=1），雷达科技+1（uses=1）。现代感知体系建立§!"
 EDE_comprehensive_research_team: "综合研究团"
 EDE_comprehensive_research_team_desc: "无论走圣化路线还是世俗路线，伊甸都需要一支真正的综合研究团队。\n\n教会改革派和世俗工程师、圣殿学者和机械朋克研究会——所有派系坐到同一张桌子前。\n\n会议前半小时几乎要打起来。但当他们开始讨论具体问题时，分歧奇迹般地消失了——技术问题有技术答案，和神学立场无关。"
 EDE_comprehensive_research_team_tt: "§G研究槽+1，综合科技加成。伊甸的第一支真正意义上的跨学科研究团§!"
 EDE_sanctuary_steam_age: "圣域蒸汽时代"
 EDE_sanctuary_steam_age_desc: "伊甸之都，这个千年古老的神权之国，终于走进了自己的蒸汽时代。\n\n教堂的尖顶旁边，竖起了工厂的烟囱。圣歌与蒸汽汽笛在清晨同时响起。\n\n保守派说这是堕落的征兆，改革派说这是神圣的进步。\n\n路过的外国旅客只会说：真是个奇怪又迷人的国家。"
 EDE_sanctuary_steam_age_tt: "§G获得民族精神：圣域蒸汽时代。工业产能全面提升§!"
 EDE_future_of_our_military: "军事的未来"
 EDE_future_of_our_military_desc: "伊甸的军队——如果那还能叫军队的话——由羽翼教会的侍卫和各邦的贡品士兵组成。训练水平参差不齐，装备停留在上个世纪。\n\n长老会议终于认识到：在这个次元，光靠圣光是打不赢仗的。\n\n必须改革。问题是——按哪个方向改？"
 EDE_future_of_our_military_tt: "§G军队经验+10，政治点数+50。伊甸军事改革启动§!"
 EDE_angel_knights_order: "天使骑士团"
 EDE_angel_knights_order_desc: "圣化路线——重建古代的\"天使骑士团\"。这不是比喻——骑士团成员经过圣化仪式后，背后真的会显现光翼。\n\n神学家说这是\"圣徽的显现\"，医学家说这是\"某种集体心理现象\"，物理学家说\"这超出了我们的理解范围\"。\n\n不管原因是什么——结果就是：伊甸的天使骑士是这个次元里最可怕的步兵之一。\n\n§Y与世俗新军路线互斥§!"
 EDE_angel_knights_order_tt: "§G步兵与炮兵科技+1（uses=2），军队经验+20，战争支持+5%§!"
 EDE_household_troops: "国民新军"
 EDE_household_troops_desc: "世俗路线——仿照其他现代国家，建立由国民组成的常备军。训练严格，装备统一，纪律严明。\n\n没有光翼，没有圣徽，但有火枪和刺刀。\n\n保守派对此嗤之以鼻：\"凡人怎么能和天使相比？\"改革派回应：\"凡人数量足够多就可以。\"\n\n§Y与天使骑士团路线互斥§!"
 EDE_household_troops_tt: "§G步兵与炮兵科技+1（uses=2），军队经验+10，兵力+20000§!"
 EDE_holy_sword_oath: "圣剑誓约"
 EDE_holy_sword_oath_desc: "每一位加入天使骑士团的成员，都要在圣殿中举行\"圣剑誓约\"仪式——将自己的生命献给教会和神。\n\n仪式之后，骑士的剑会被赋予特殊的祝福——据说，这让他们的武器在战斗中更加锋利。\n\n科学上无法验证。战场上不容置疑。"
 EDE_holy_sword_oath_tt: "§G获得民族精神：圣剑誓约。天使骑士团的战斗力大幅提升§!"
 EDE_holy_war_conscription: "圣战征召"
 EDE_holy_war_conscription_desc: "以\"圣战\"的名义征召全国信徒入伍。虔诚的信徒自愿离开家园，前往训练营。\n\n教会给他们分发祈祷书和训练手册——前者用得更频繁。\n\n但战斗力不容小觑：为信仰而战的士兵，比为军饷而战的要勇猛得多。"
 EDE_holy_war_conscription_tt: "§G兵力+50000，获得民族精神：圣战征召。信仰驱动的兵源补充§!"
 EDE_call_for_enlistment: "国民征兵"
 EDE_call_for_enlistment_desc: "世俗化的征兵体系——不谈信仰，只谈公民义务。\n\n出乎意料的是，这种\"无神论式\"的征兵效果比教会想象的要好。许多不那么虔诚的年轻人反而更愿意参军——至少不用每天参加晨祷。\n\n军饷、医疗、退伍补贴——用实实在在的福利吸引了大量志愿者。"
 EDE_call_for_enlistment_tt: "§G获得民族精神：世俗征兵。兵力+100000§!"
 EDE_girls_and_panzer: "少女与战车"
 EDE_girls_and_panzer_desc: "一位军事改革派主教提出了一个令保守派震惊的方案——让女学员也参与装甲部队训练。\n\n\"坦克不在乎驾驶员的性别。\"她说。\n\n事实证明她是对的。伊甸首支女子装甲连在演习中表现优异——她们对机械的耐心和细致，甚至超过了男性同行。\n\n\"只要把车开回来就行了。\"这是她们的非官方口号。"
 EDE_girls_and_panzer_tt: "§G陆军学说成本-50%，装甲科技+1（uses=2）§!"
 EDE_armored_saints: "装甲圣徒"
 EDE_armored_saints_desc: "无论是天使骑士团还是国民新军，最终都要面对同一个现实——装甲兵是现代战争的支柱。\n\n伊甸的第一代装甲兵被称为\"装甲圣徒\"。他们驾驶的坦克——不论是否经过圣化——都刷着教会的徽记。\n\n从天使骑士团来的强调荣耀，从国民新军来的强调效率。两者融合后……意外地非常能打。"
 EDE_armored_saints_tt: "§G装甲科技+1.5（uses=1），军队经验+50，获得民族精神：装甲圣徒§!"
 EDE_expand_dockyard: "扩建船坞"
 EDE_expand_dockyard_desc: "伊甸的海岸线虽然不长，但战略位置关键。是时候认真建设一支海军了。\n\n第一批现代船坞开工。工人们在船坞的船首位置都刻上了圣徽——\"让神的祝福与船同行\"。"
 EDE_expand_dockyard_tt: "§G海军学说成本-50%，海军经验+15§!"
 EDE_develop_fleet: "发展舰队"
 EDE_develop_fleet_desc: "伊甸舰队的第一批现代军舰下水——一艘轻巡洋舰，三艘驱逐舰，若干辅助舰。\n\n规模不算大，但对于一个内陆神权国家来说，这已经是惊人的成就。\n\n教会为每一艘舰命名——都是圣徒的名字。"
 EDE_develop_fleet_tt: "§G海军经验+50，轻巡科技+1.5，海军学说成本-50%（uses=2）§!"
 EDE_holy_name_battleships: "圣名战列舰"
 EDE_holy_name_battleships_desc: "圣化海军路线——建造以神祇和圣徒命名的巨型战列舰。这些钢铁巨兽上刻满经文，舰首的雕像是教会的象征。\n\n主炮齐射时，水兵们要同时齐诵经文——\"以神的名义\"。\n\n据说这让炮弹的命中率提升了——虽然无法证明。\n\n§Y与巡洋舰原则路线互斥§!"
 EDE_holy_name_battleships_tt: "§G战列舰与战巡科技+1（uses=2）。重装甲主力舰优先§!"
 EDE_cruiser_doctrine: "巡洋舰原则"
 EDE_cruiser_doctrine_desc: "世俗海军路线——认为伊甸的战略需求不需要昂贵的战列舰。以巡洋舰为核心的机动舰队更符合经济效益。\n\n\"质量优于数量，数量优于吨位。\"新任海军部长的信条。\n\n§Y与圣名战列舰路线互斥§!"
 EDE_cruiser_doctrine_tt: "§G巡洋舰科技+1（uses=2），海军学说成本-50%。机动灵活的中型舰队§!"
 EDE_high_school_fleet: "女子高校舰队"
 EDE_high_school_fleet_desc: "受\"少女与战车\"成功的启发，海军也开始招募女性船员。\n\n某所教会附属女子高校的学生们在一次舰艇参观中表现出了惊人的操舰天赋。\n\n教会决定成立一支实验性的\"女子高校舰队\"——大多数船员都是16-18岁的女学生。\n\n批评者说这是儿戏，实战中这些少女却展现了惊人的冷静与协作能力。"
 EDE_high_school_fleet_tt: "§G海军学说成本-50%（uses=2），海军经验+30§!"
 EDE_ensure_bluesky: "确保碧空"
 EDE_ensure_bluesky_desc: "伊甸的天空属于神——但现在也属于飞机。\n\n在邻国已经开始大规模部署空军的情况下，伊甸不能再拖延自己的空军建设了。"
 EDE_ensure_bluesky_tt: "§G空军学说成本-50%（uses=2），空军经验+25§!"
 EDE_establish_lucientes_company: "建立露西恩特公司"
 EDE_establish_lucientes_company_desc: "伊甸的国有飞机制造企业——露西恩特公司。名字来自一位传说中乘着光翼飞翔的古代圣徒。\n\n公司的LOGO就是那位圣徒的剪影。\n\n\"我们造的不只是飞机，\"公司的创立宣言写道，\"是给予凡人以翅膀的使命。\""
 EDE_establish_lucientes_company_tt: "§G获得民族精神：露西恩特公司。空军装备生产效率提升§!"
 EDE_fighter: "战斗机研发"
 EDE_fighter_desc: "第一代伊甸产战斗机——形制简单，单发活塞引擎，但设计上采用了标志性的羽翼涂装。\n\n飞行员们戏称自己驾驶的是\"铁翅膀\"。"
 EDE_fighter_tt: "§G轻型航空加成+1（uses=1）§!"
 EDE_fighter_2: "进阶战机"
 EDE_fighter_2_desc: "下一代战斗机——双翼改单翼，木质结构改全金属蒙皮。性能跨代式提升。\n\n飞行员们给它起的绰号是\"降临者\"——从天而降的天使。"
 EDE_fighter_2_tt: "§G中型与轻型航空加成+1（uses=1，ahead=2）§!"
 EDE_heavy_bomber: "圣轰重盟"
 EDE_heavy_bomber_desc: "重型轰炸机研发——四发大型轰炸机，可以从伊甸起飞直达邻国首都。\n\n教会给轰炸机部队起了个响亮的名字——\"圣轰重盟\"。宣传画册上是一架机身涂满经文的巨型轰炸机，飞在云层之上。\n\n某位飞行员私下评价：\"我们是在用最虔诚的方式……投最重的炸弹。\""
 EDE_heavy_bomber_tt: "§G中型与重型航空加成+1（uses=1）§!"
 EDE_naval_bomber: "圣翼海航"
 EDE_naval_bomber_desc: "海军航空兵——能够从陆基机场起飞攻击敌方舰队的飞机。\n\n露西恩特公司与海军部联合开发，代号\"圣翼\"。机身两侧画着展开的翅膀。"
 EDE_naval_bomber_tt: "§G轻型航空加成+1（uses=1，ahead=2）§!"
 EDE_naval_fighter: "圣翼海战机"
 EDE_naval_fighter_desc: "\"圣翼\"项目的延伸——舰载战斗机。\n\n虽然伊甸目前还没有航母，但相关技术必须先储备。\n\n\"先有飞机，再有航母。反正神创造天使的时候也是先造翅膀的。\"露西恩特公司CEO的乐观评价。"
 EDE_naval_fighter_tt: "§G轻型航空加成+1（uses=1）§!"
 EDE_sacred_flame_project: "圣火号工程"
 EDE_sacred_flame_project_desc: "最机密的军事项目——\"圣火号\"。官方说辞是\"高速运输火箭\"，实际上是武器级的弹道导弹开发。\n\n项目由综合研究团和露西恩特公司联合主持。研究基地建在一座偏远山谷里，外围有整个师的天使骑士把守。\n\n当第一枚\"圣火\"试射成功时，项目首席工程师留下了眼泪。\n\n\"这是凡人的奇迹武器。\"他说。\n\n教会长老纠正他：\"这是神的奇迹武器——通过凡人之手降临。\""
 EDE_sacred_flame_project_tt: "§G获得民族精神：圣火号工程。火箭与喷气技术+1.5（uses=2）§!"
