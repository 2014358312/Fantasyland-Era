#事件
 FON_politics.0.t: "千年之交的大选"
 FON_politics.0.desc: "(没有文案，等待填充)"
 FON_politics.0.a: "娜维娅·卡萨帕会带来一代枫丹人的和平"
 FON_politics.0.b: "那维莱特会带领枫丹人迈向独立和自由"

 FON_story.0.t: "堤亚穆帝国的挑衅"
 FON_story.0.desc: "随着枫丹宣布恢复财政主权，堤亚穆帝国出现大规模军事调动的迹象，并在枫丹的边境频繁地挑起军事冲突，这毫无疑问是来自堤亚穆的警告。"
 FON_story.0.a: "战争已无法避免。"

 FON_news.0.t: "枫丹独立战争"
 FON_news.0.desc: "自从那维莱特执掌枫丹大权后，战争的阴霾就一直笼罩在关系日益紧张的堤亚穆帝国与枫丹之上。凌晨时分，在那维莱特的命令下，枫丹军队向堤亚穆帝国的阵地发起了大规模的冲锋，两国的战争正式打响。堤亚穆帝国的外交人员宣称，这只不过是枫丹又一次的以下犯上。而枫丹方面则痛斥堤亚穆帝国在枫丹境内犯下的累累罪行。至于战事后续发展......"
 FON_news.0.a: "让我们拭目以待。"

 FON_news.1.t: "枫丹独立战争的结束"
 FON_news.1.desc: "枫丹国战败"
 FON_news.1.a: "至暗时刻..."
 FON_news.1.b: "帝国的伟大胜利！"
 FON_news.1.b: "枫丹人的螳臂当车。"

 FON_news.2.t: "枫丹独立战争的结束"
 FON_news.2.desc: "堤亚穆帝国战败"
 FON_news.1.a: "神佑枫丹。"
 FON_news.1.b: "帝国的耻辱！"
 FON_news.1.b: "对堤亚穆帝国的沉重打击。"


#决议
 FON_Fontaine_independence_war_decision_category: "枫丹独立战争"
 FON_Fontaine_independence_war_decision_category_desc: "我们应当以雷霆之势攻下堤亚穆帝国的首都，并借助枫丹军队在堤亚穆帝国全境的势如破竹，逼迫他们承认枫丹独立的既定事实。否则漫长的战争将会彻底拖垮国内脆弱的经济。"
 FON_revendication_bailu: "收回白露区"
 FON_revendication_bailu_desc: "白露区是枫丹领土神圣不可分割的一部分。"
 FON_get_independence_from_TIA: "取得独立"
 FON_get_independence_from_TIA_desc: "如果我们只是攻下堤亚穆帝国的首都，堤亚穆帝国很可能并不会屈服，我们必须在堤亚穆帝国西境取得无可争辩的胜利。"


