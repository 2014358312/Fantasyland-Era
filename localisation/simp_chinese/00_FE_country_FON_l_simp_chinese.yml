#动态修正
 FON_independence_war_dynamic_modifier: "枫丹独立战争"
 FON_independence_war_dynamic_modifier_desc: "堤亚穆帝国统治下的腐朽和压迫早已让枫丹的人民忍无可忍。独立的呼声如同浪潮般席卷了枫丹上下，我们必须抓住抓住这一机遇，将枫丹的命运交还给枫丹的人民。"
 FON_fontaine_industrial_system_dynamic_modifier: "枫丹工业体系"
 FON_fontaine_industrial_system_dynamic_modifier_desc: "作为繁华与享乐主义的基石，枫丹产出和出口的流行奢侈品和艺术装置充当起了其经济快速发展的润滑剂，随之带来的是大量企业对利润丰厚的消费品和其他轻工业的倾向性投资，导致能源、重机械与基础军工等核心领域长期投入不足，严重依赖进口与技术整合。部分有识之士已经提议我们将重心转向夯实国家重工业基础，但时间不等人，我们必须做出取舍……"
 FON_fontaine_military_dynamic_modifier: "松散的军队"
 FON_fontaine_military_dynamic_modifier_desc: "枫丹的军事力量如同其社会结构一般，呈现华丽而松散的特质，士兵们已经习惯了戏剧般的仪式性流程，对持续性纪律和协同作战极为陌生。随着日益临近的危机，一场覆盖三军的军事现代化改革已经刻不容缓，只有时间能够见证，她们能否在一切无可挽回之前，将自身捶打成枫丹每一寸水与土的坚实壁垒。"
 FON_cultural_protection_act: "帝国文化保护法"
 FON_cultural_protection_act_desc: "堤亚穆帝国颁布的《枫丹文化保护法》以帝国法律的形式保障了枫丹的语言、宗教仪式、艺术传统和地方习俗。这让枫丹人民感到自己的身份受到了尊重。"
