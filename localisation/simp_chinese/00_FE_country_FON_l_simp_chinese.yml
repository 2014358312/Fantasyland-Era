#人物
 Furina_de_Fontaine: "芙宁娜·德·枫丹"
 PORTRAIT_FON_FURINA_DE_FONTAINE_DESC: "§Y生于：§L976年；堤亚穆帝国，枫丹庭§!\n背景：§L根据堤亚穆帝国内部曾出具的一份官方调查来看，芙宁娜只是一位平平无奇的接替已故前枫丹大主教芙卡洛斯·德·枫丹的少女，她既无暗藏的野心，也对尘世的各种勾心斗角应对的无所适从。那么到底是什么能够让枫丹的人民们聚集在这位大主教的布道台下，参与到这场帝国命运的角逐中？\n\n芙卡洛斯。§!§!"
 Fucarlos_de_Fontaine: "芙卡洛斯·德·枫丹"
