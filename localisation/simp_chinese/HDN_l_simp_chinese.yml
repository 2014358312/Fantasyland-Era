l_simp_chinese:
 ###################################
 # 超次元海王星 联合国策树 - 本地化
 ###################################

 HDN_zero_dimension_call: "零次元的呼声"
 HDN_zero_dimension_call_desc: "来自零次元的异常信号正在四国中同时被侦测到。暗黑心黑芽的力量似乎正在苏醒，而最令人担忧的是——连最强大的女神们单独都无法应对这次危机。\n\n这一次，紫耀之都、黑土边域、白露之滨、绿荫箱庭必须联合起来。"
 HDN_zero_dimension_call_tt: "§G联合防御体系建立，四国女神召开紧急会议§!"
 HDN_save_zero_dimension: "拯救零次元"
 HDN_save_zero_dimension_desc: "零次元是所有次元的起点——如果它沦陷，整个女神次元都将随之崩塌。必须主动出击，在黑暗完全占领零次元之前夺回主导权。"
 HDN_save_zero_dimension_tt: "§G稳定+10%，经验+5。四国女神联合军成立§!"
 HDN_shadow_beneath: "暗影之下"
 HDN_shadow_beneath_desc: "或许——不应该急着冲进零次元。那里面的东西，比想象的更古老、更黑暗。也许真正的答案，藏在暗影之下。"
 HDN_shadow_beneath_tt: "§Y政治点数+200，解锁决议：加快推进战线§!"
 HDN_strike_force: "打击力量"
 HDN_strike_force_desc: "召集四位守护女神——涅普缇努、诺瓦露、布兰、贝露——亲自上阵。这是零次元危机以来四神第一次完全同步行动。"
 HDN_strike_force_tt: "§G解锁守护女神：涅普缇努、诺瓦露、布兰、贝露。解锁决议：打击喽啰（战力+50）§!"
 HDN_otherworld_goddess: "异界女神"
 HDN_otherworld_goddess_desc: "来自神次元的普露露特、碧雪、爱耶芙、空帕出现了。她们声称这场危机不仅威胁女神次元，也威胁她们自己的世界。"
 HDN_otherworld_goddess_tt: "§G战力+30。解锁角色：普露露特、碧雪、爱耶芙、空帕§!"
 HDN_external_support: "外界援助"
 HDN_external_support_desc: "女神候补生们——涅普姬雅、优尼、萝姆、拉姆——带着她们各自邦国的支援部队抵达前线。"
 HDN_external_support_tt: "§G战力+15。解锁角色：涅普姬雅、优尼、萝姆、拉姆。解锁决议：外部信仰支持§!"
 HDN_collect_local_faith: "收集本地信仰"
 HDN_collect_local_faith_desc: "零次元居民海男和天王星涡芽带来了古老的信仰力量——那是只有零次元原住民才能驾驭的特殊能量。"
 HDN_collect_local_faith_tt: "§G解锁角色：海男、天王星涡芽。解锁决议：收集怪物信仰§!"
 HDN_contact_chaos: "接触混沌"
 HDN_contact_chaos_desc: "心次元的克萝娲儿和犯罪神玛洁空奴主动联系了我们。她们声称愿意提供情报——但代价是什么？"
 HDN_contact_chaos_tt: "§Y解锁角色：克萝娲儿、玛洁空奴。解锁决议：重新部署军力§!"
 HDN_otherworld_traveler: "异界旅行家"
 HDN_otherworld_traveler_desc: "大涅普——来自另一个时间线的涅普缇努——意外地出现在战场上。她带来了关于未来的警告。"
 HDN_otherworld_traveler_tt: "§G解锁角色：大涅普。解锁决议：招揽外界人才§!"
 HDN_secret_organization: "联系秘密组织"
 HDN_secret_organization_desc: "亚菲魔贾斯和史铁魔克斯代表神秘的AffimaX株式会社前来接触。他们的技术……来历不明。"
 HDN_secret_organization_tt: "§Y解锁角色：亚菲魔贾斯、史铁魔克斯。战力+50。解锁决议：发展秘密结社§!"
 HDN_ancient_goddess: "利用远古女神"
 HDN_ancient_goddess_desc: "七贤人中的琪瑟乔·蕾伊和犯罪神破解鼠提出了一个疯狂的方案：启用远古女神的力量。"
 HDN_ancient_goddess_tt: "§R解锁角色：琪瑟乔·蕾伊、破解鼠。警告：远古力量代价不明§!"
 HDN_next_gen_awakening: "次时代形态觉醒"
 HDN_next_gen_awakening_desc: "所有的准备汇聚成了这一刻——女神们将觉醒超越既有极限的次时代形态。这是女神次元的最强战力。"
 HDN_next_gen_awakening_tt: "§G我方战力+80。决战零次元-100日。启用次世代形态§!"
 HDN_void_and_destruction: "虚空与毁灭"
 HDN_void_and_destruction_desc: "暗影之下的真相被揭开——这不是对抗，而是拥抱。让虚空吞噬一切旧秩序，让毁灭铺就新时代的道路。"
 HDN_void_and_destruction_tt: "§R我方战力+100。决战零次元-200日§!"
 HDN_decisive_battle_zero: "决战零次元"
 HDN_decisive_battle_zero_desc: "一切准备就绪。是时候前往零次元，与暗黑心黑芽展开最终对决了。"
 HDN_decisive_battle_zero_tt: "§Y触发决战零次元事件。胜负将决定四国的未来走向§!"
 HDN_goddess_triumph: "女神凯旋"
 HDN_goddess_triumph_desc: "次时代形态的光芒扫清了零次元的阴霾。暗黑心黑芽败退，女神们以完美的胜利回归。\n\n但真正的建设才刚刚开始。"
 HDN_goddess_triumph_tt: "§G政治点数+200，稳定+15%。解锁自治/联合政府分歧§!"
 HDN_looming_threat: "迫近的威胁"
 HDN_looming_threat_desc: "虽然激活了次时代形态，但暗黑心黑芽在决战中占据了上风。胜利不属于任何一方，但威胁依然存在。\n\n需要更多力量——来自妹妹、黄金、或者更深的秘密。"
 HDN_looming_threat_tt: "§Y政治点数+100，稳定-5%。解锁妹妹线/黄金参氅/秘密结社三条分线§!"
 HDN_shadow_awakening: "暗影觉醒"
 HDN_shadow_awakening_desc: "没能激活次时代形态，决战也落败了。女神们失去了最后的防线——但她们内心的阴影觉醒了。也许黑暗，才是真正的力量。"
 HDN_shadow_awakening_tt: "§R政治点数+100。暗黑力量觉醒§!"
 HDN_turbulence_returns: "波澜再起"
 HDN_turbulence_returns_desc: "赢了决战，但国内已经天翻地覆。稳定度跌至谷底，胜利的回报也被消耗殆尽。\n\n重新收拾局面的时候到了。"
 HDN_turbulence_returns_tt: "§Y政治点数+100，稳定+5%。重建政权§!"
 HDN_dark_unification: "暗黑统合"
 HDN_dark_unification_desc: "没有完成虚空与毁灭，但赢了决战，而且混沌力量在暗黑同盟中最强——这是由混沌主导的暗黑秩序。"
 HDN_dark_unification_tt: "§R政治点数+200。混沌势力主导暗黑同盟§!"
 HDN_dark_apocalypse: "暗黑灭世"
 HDN_dark_apocalypse_desc: "虚空与毁灭已经完成，决战也赢了。世界的旧秩序将被彻底抹除，取而代之的是暗黑星统治下的新纪元。"
 HDN_dark_apocalypse_tt: "§R政治点数+200，战争支持+15%。进入灭世路线§!"
 HDN_tari_line: "塔利线（远古的召唤）"
 HDN_tari_line_desc: "在紧急措施中选择了同意蕾伊的提议，并赢得了决战——远古女神的力量被完全释放。塔利时代来临。"
 HDN_tari_line_tt: "§R政治点数+150。远古女神统治降临§!"
 HDN_uranus_interworld: "天王星-两界互通"
 HDN_uranus_interworld_desc: "没完成虚空与毁灭，也输了决战——但天王星的两界通道被打开，跨次元的物资流通成为可能。"
 HDN_uranus_interworld_tt: "§Y政治点数+150。两界贸易通道开启§!"
 HDN_uranus_rebuild: "天王星-次元重建"
 HDN_uranus_rebuild_desc: "虽然输了决战，但虚空与毁灭的仪式为天王星提供了重建次元的基础。这是从废墟中重新开始。"
 HDN_uranus_rebuild_tt: "§Y政治点数+150，稳定+10%。次元重建工程启动§!"
 HDN_city_state_autonomy: "各邦自治"
 HDN_city_state_autonomy_desc: "天魔解体后，四邦决定走自治路线。每一邦保留自己的女神、自己的文化、自己的传统——但通过一系列共享国策维持联合。\n\n这不是统一，是结盟。"
 HDN_city_state_autonomy_tt: "§G政治点数+150。激活自治路线：四女神分支解锁§!"
 HDN_joint_defense: "共同防御协定"
 HDN_joint_defense_desc: "布兰领导的军事分支。四邦签订共同防御协定——一邦受袭，即为全体受袭。"
 HDN_joint_defense_tt: "§G解锁布兰军事线§!"
 HDN_joint_military_exercise: "联合军事演习"
 HDN_joint_military_exercise_desc: "四邦军队首次联合演习。协同作战能力和相互理解都得到了提升。"
 HDN_joint_military_exercise_tt: "§G军队经验+25，战争支持+5%§!"
 HDN_joint_command: "联合司令部"
 HDN_joint_command_desc: "成立四邦联合司令部，由轮值女神担任最高指挥官。"
 HDN_joint_command_tt: "§G获得民族精神：联合司令部§!"
 HDN_unified_supply: "统一供应标准"
 HDN_unified_supply_desc: "弹药、装备、补给品的规格全部统一。后勤体系彻底整合。"
 HDN_unified_supply_tt: "§G获得民族精神：统一供应体系§!"
 HDN_new_army: "建立新军"
 HDN_new_army_desc: "在联合司令部的基础上建立全新的四邦联合军——新女神军。"
 HDN_new_army_tt: "§G兵力+20000，军队经验+30§!"
 HDN_political_cooperation: "政治合作"
 HDN_political_cooperation_desc: "涅普缇努领导的政治分支。四邦展开全面政治合作。"
 HDN_political_cooperation_tt: "§G政治点数+100。解锁涅普缇努政治线§!"
 HDN_intelligence_sharing: "情报互通"
 HDN_intelligence_sharing_desc: "建立四邦情报共享机制。"
 HDN_intelligence_sharing_tt: "§G政治点数+50§!"
 HDN_guru_cabinet: "教祖内阁"
 HDN_guru_cabinet_desc: "由四邦教祖组成的联合内阁——伊丝特娲尔、神宫寺惠、西泽美奈、箱崎千香共同主持日常政务。"
 HDN_guru_cabinet_tt: "§G获得民族精神：教祖内阁§!"
 HDN_research_sharing: "科研共享"
 HDN_research_sharing_desc: "四邦科研成果互通有无，技术壁垒被打破。"
 HDN_research_sharing_tt: "§G研究槽+1§!"
 HDN_supreme_goddess_council: "最高女神议会"
 HDN_supreme_goddess_council_desc: "四位守护女神定期召开最高议会，重大决策需四神共议。"
 HDN_supreme_goddess_council_tt: "§G获得民族精神：最高女神议会§!"
 HDN_unbreakable_alliance: "牢不可破的联盟"
 HDN_unbreakable_alliance_desc: "经过军事、政治、科研的全方位整合，四邦联盟达到了前所未有的紧密程度。"
 HDN_unbreakable_alliance_tt: "§G政治点数+200，稳定+10%。获得民族精神：牢不可破的联盟§!"
 HDN_economic_union: "经济联合体"
 HDN_economic_union_desc: "诺瓦露领导的经济分支。四邦关税统一，货币挂钩。"
 HDN_economic_union_tt: "§G政治点数+50。解锁诺瓦露经济线§!"
 HDN_invest_in_cities: "向各邦投资"
 HDN_invest_in_cities_desc: "中央资金向各邦基建项目倾斜。"
 HDN_invest_in_cities_tt: "§G政治点数+50§!"
 HDN_foreign_enterprise: "与外企合作"
 HDN_foreign_enterprise_desc: "引入外部企业参与四邦建设。"
 HDN_foreign_enterprise_tt: "§G政治点数+50§!"
 HDN_supreme_goddess_bank: "至高女神银行"
 HDN_supreme_goddess_bank_desc: "成立四邦联合中央银行——至高女神银行。"
 HDN_supreme_goddess_bank_tt: "§G获得民族精神：至高女神银行§!"
 HDN_goddess_joint_mining: "女神联合矿业"
 HDN_goddess_joint_mining_desc: "四邦矿产资源联合开采、统一分配。"
 HDN_goddess_joint_mining_tt: "§G钢铁+20，钨+10（随机州）§!"
 HDN_joint_railway: "联合铁路"
 HDN_joint_railway_desc: "贯通四邦的铁路网建成，物流效率大幅提升。"
 HDN_joint_railway_tt: "§G政治点数+100§!"
 HDN_industrial_proposal: "产业发展提案"
 HDN_industrial_proposal_desc: "贝露领导的产业分支。协调四邦产业布局。"
 HDN_industrial_proposal_tt: "§G政治点数+100。解锁贝露产业线§!"
 HDN_light_industry_boost: "提振轻工业"
 HDN_light_industry_boost_desc: "优先发展消费品产业。"
 HDN_light_industry_boost_tt: "§G获得民族精神：轻工业振兴§!"
 HDN_aid_reconstruction: "援助重建"
 HDN_aid_reconstruction_desc: "零次元危机后的重建工程。"
 HDN_aid_reconstruction_tt: "§G稳定+3%§!"
 HDN_develop_mining: "发展矿业"
 HDN_develop_mining_desc: "重点开发矿产资源。"
 HDN_develop_mining_tt: "§G钢铁+10（随机州）§!"
 HDN_local_dev_plan: "本地发展计划"
 HDN_local_dev_plan_desc: "因地制宜的本地化发展方案。"
 HDN_local_dev_plan_tt: "§G获得民族精神：本地发展计划§!"
 HDN_goddess_rule: "女神的统治"
 HDN_goddess_rule_desc: "在自治的基础上，四女神形成核心决策圈——统治不再分散，但每位女神仍保留对自己邦国的特殊权威。"
 HDN_goddess_rule_tt: "§G政治点数+300，稳定+15%。解锁核心圈：四女神个人分支§!"
 HDN_inner_noire: "诺瓦露分支"
 HDN_inner_noire_desc: "诺瓦露的个人统治风格——以工作狂的标准要求所有人。"
 HDN_inner_noire_tt: "§G获得民族精神：诺瓦露工作狂§!"
 HDN_inner_secretariat: "建立秘书组"
 HDN_inner_secretariat_desc: "成立高效的秘书团队处理日常政务。"
 HDN_inner_secretariat_tt: "§G政治点数+100§!"
 HDN_inner_admin_reform: "改革行政体系"
 HDN_inner_admin_reform_desc: "诺瓦露亲自主持的行政体系改革。"
 HDN_inner_admin_reform_tt: "§G获得民族精神：行政改革§!"
 HDN_inner_neptune: "涅普缇努分支"
 HDN_inner_neptune_desc: "涅普缇努的个人统治风格——放手让下属做事。"
 HDN_inner_neptune_tt: "§G政治点数+100§!"
 HDN_inner_indirect_rule: "间接治理"
 HDN_inner_indirect_rule_desc: "中央只管大方向，具体事务由地方处理。"
 HDN_inner_indirect_rule_tt: "§G获得民族精神：间接治理§!"
 HDN_inner_close_trade: "加大工贸联系"
 HDN_inner_close_trade_desc: "强化四邦间工商贸易的紧密联系。"
 HDN_inner_close_trade_tt: "§G政治点数+50§!"
 HDN_inner_vert: "贝露分支"
 HDN_inner_vert_desc: "贝露的个人统治风格——南岛之风，自由与休闲。"
 HDN_inner_vert_tt: "§G政治点数+100§!"
 HDN_inner_south_wind: "南岛之风"
 HDN_inner_south_wind_desc: "贝露风格的宽松统治文化推广到全境。"
 HDN_inner_south_wind_tt: "§G政治点数+50§!"
 HDN_inner_game_kingdom: "游戏王国"
 HDN_inner_game_kingdom_desc: "在贝露的推动下，绿荫箱庭发展成为次元级的游戏王国。"
 HDN_inner_game_kingdom_tt: "§G获得民族精神：游戏王国§!"
 HDN_inner_blanc: "布兰分支"
 HDN_inner_blanc_desc: "布兰的个人统治风格——鼓励魔法研究与古代遗迹探索。"
 HDN_inner_blanc_tt: "§G政治点数+100§!"
 HDN_inner_ancient_ruins: "开发古代遗迹"
 HDN_inner_ancient_ruins_desc: "系统性发掘白露之滨境内的古代遗迹。"
 HDN_inner_ancient_ruins_tt: "§G研究槽+1§!"
 HDN_inner_encourage_magic: "鼓励魔法"
 HDN_inner_encourage_magic_desc: "魔法研究成为白露之滨的重点发展方向。"
 HDN_inner_encourage_magic_tt: "§G研究速度+5%§!"
 HDN_federation_government: "联合政府"
 HDN_federation_government_desc: "四邦合并为一个联合政府。女神们放弃了各自的最高权威，转而通过选举和共同法律进行治理。\n\n这不是结盟，是统一。"
 HDN_federation_government_tt: "§G政治点数+150。激活联合政府路线：权力斗争开启§!"
 HDN_fed_campaign_noire: "诺瓦露竞选"
 HDN_fed_campaign_noire_desc: "诺瓦露参与联合政府首次选举。她的竞选纲领：黑土工业联合体，效率至上。"
 HDN_fed_campaign_noire_tt: "§G政治点数+100。诺瓦露主导执政§!"
 HDN_fed_campaign_vert: "贝露竞选"
 HDN_fed_campaign_vert_desc: "贝露参与联合政府首次选举。她的竞选纲领：现代化生产，宽松环境。"
 HDN_fed_campaign_vert_tt: "§G政治点数+100。贝露主导执政§!"
 HDN_fed_industrial_combine: "黑土工业联合体"
 HDN_fed_industrial_combine_desc: "诺瓦露的核心政策——以黑土边域为中心的工业联合体。"
 HDN_fed_industrial_combine_tt: "§G获得民族精神：黑土工业联合体§!"
 HDN_fed_streamline_admin: "精简行政体系"
 HDN_fed_streamline_admin_desc: "裁撤冗余部门，行政效率优先。"
 HDN_fed_streamline_admin_tt: "§G稳定+3%，政治点数+100§!"
 HDN_fed_expand_admin: "扩招公务员"
 HDN_fed_expand_admin_desc: "扩大行政队伍，覆盖更多基层事务。"
 HDN_fed_expand_admin_tt: "§G兵力+10000，政治点数+50§!"
 HDN_fed_modern_production: "现代化生产"
 HDN_fed_modern_production_desc: "全面推行现代化生产标准。"
 HDN_fed_modern_production_tt: "§G获得民族精神：现代化生产§!"
