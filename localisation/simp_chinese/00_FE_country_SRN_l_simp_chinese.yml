SRN_heishanjunzhihuiguan_fmy:0 "黑衫军指挥官"
SRN_heishanjunzhihuiguan_fmy_desc:0 "这些将领并非出身官僚化的军事学院，而是从信仰最炽热、行动最果决的战士中脱颖而出。他们是领袖意志的活体延伸，身着肃穆的黑色制服，将战场视为铸造民族灵魂的熔炉。对他们而言，战争远不止于火力与机动——它是一场激烈的美学仪式，是洗刷平庸、让霸权理念浸透每一寸焦土的庄严圣礼。受其指挥的部队不仅是战斗单元，更是一支献身于至高理想的武装传道团。在黑衫军指挥官的凝视下，恐惧被升华为狂喜，纪律被奉为诗篇，士兵们甘愿以血肉之躯在霸权的丰碑上刻下不朽的姓名。"
#海军

##########国家精神
###动态国家精神
#国策获得
SRN_National_Spirit_heshanjun:0 "黑衫军"
SRN_National_Spirit_heshanjun_desc:0 "黑色衬衫，是他们的皮肤；金色束棒，是他们的信仰。黑衫军——这支诞生于街头暴力与政治恐怖的准军事力量，曾用蓖麻油与棍棒为法西斯革命开道，又用刺刀与烈焰将“法西斯”的意志烙进每一寸国土。\n\n他们巡逻在城乡的每一个角落，用沉默的黑潮吞噬异议，用纪律的铁链捆缚民族。没有独立的灵魂，只有领袖的命令；没有法律的边界，只有革命的必要。\n\n他们是国家最忠诚的猎犬，也是悬在一切敌人头顶的金色闪电。"
#开局获得
SRN_National_Spirit_guojiaanquanzhiyuanjun:0 "国家安全志愿军"
SRN_National_Spirit_guojiaanquanzhiyuanjun_desc:0 "当正规军开赴前线，当黑衫军精锐编入主力突击纵队，法西斯萨丁仍然需要一支扎根于每座城镇、每片田垄的二线武装——国家安全志愿民兵，便是这面永不降下的本土之盾。\n\n这些征召自地方党部的民兵战士，或许在装备上无法与野战部队媲美，却以狂热的信念和铁的纪律填补了后方的每一处缺口。\n\n他们巡逻于桥梁与铁路枢纽，清剿游击队的暗影，看押战俘营里的叛乱之眼，并随时准备在任何敌军登陆的海岸线上筑起第一道血肉防线。\n\n国家安全志愿军总指挥部将全国民兵整合为一台精密运转的镇压与警戒机器，确保领袖的意志从心脏一直延伸到最边远的四肢。这并非我们手中最强大的力量——却是一切战线背后沉默的基石。"
SRN_National_Spirit_guojiafatuanzhuyijingji:0 "国家法团主义经济"
SRN_National_Spirit_guojiafatuanzhuyijingji_desc:0 "在领袖的远见之下，萨丁彻底埋葬了带来分裂的阶级斗争——取而代之的，是“职团国家”的光辉大厦。二十二个法团将全国每一个行业都编织进国家的意志之中：工人与雇主同坐一堂，不再为零碎的利益争吵，而是共同为民族的强盛流汗。罢工被取缔，闭厂被禁止，一切经济争端均由法西斯劳工法庭裁决。\n\n齿轮与麦穗紧紧相扣，在束棒的注视下，整个国家的生产力正向平稳转型。"
