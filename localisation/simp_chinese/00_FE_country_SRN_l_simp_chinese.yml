#开局获得
SRN_National_Spirit_faxisgemingshiyuandi:0 "法西斯革命始源地"
SRN_National_Spirit_faxisgemingshiyuandi_desc:0 "法西斯主义正是在这片土地上第一次向世界露出了獠牙。我们是革命的摇篮，是第一个将国家从混乱与软弱中拯救出来的先驱。这份荣耀赋予了萨丁领导世界走向新秩序的使命，任何试图质疑这一事实的人，都将在领袖的注视下化为尘埃。\n\n从米兰圣塞波尔克罗广场的第一簇黑色火苗，到如今这场改写国运的洪流，萨丁作为法西斯革命无可争议的始源地，早已将这份基因烙进了民族的脊髓。当世界还在旧秩序的残梦中彷徨时，我们已率先高擎起法西斯的炬火，照亮了通向新世界的康庄大道。\n\n这份先驱者的骄傲与责任，将驱使每一位真正的萨丁儿女用钢铁与信仰去重铸旧日的荣光。"
SRN_National_Spirit_minzhudezhongjie:0 "民主的终结"
SRN_National_Spirit_minzhudezhongjie_desc:0 "议会已沦为法西斯党的橡皮图章，反对派的报纸被付之一炬，独立的工会与政党遭到解散，秘密警察的耳目则遍布每一条街巷。国家法西斯党用束棒与蓖麻油宣告：旧时代的自由主义已死。在这片“民主之墓”上，一个极权的新国家正从灰烬中站起。然而，强权铸就的沉默，究竟是永恒的秩序，还是下一次火山爆发前的地壳运动？"
SRN_National_Spirit_shodaokongzhidegongrenyundong:0 "受到控制的工人运动"
SRN_National_Spirit_shodaokongzhidegongrenyundong_desc:0 "在法团主义经济指导下所构建的职团国家中，独立的工人运动早已被碾碎，取而代之的是从属于党的“法西斯产业组合”。理论上，这些工会保障着工人的福利；实际上，它们不过是国家机器上的一颗螺丝钉——负责动员生产力、压制阶级冲突，并将一切劳动热情导向领袖的意志。罢工既已被视为叛国，劳资和谐也就变为一纸行政命令。受控的工会，是国家攥紧的拳头，正牢牢锁住千百万萨丁劳动者的喉咙。"
SRN_National_Spirit_faxisiducai:0 "法西斯独裁"
SRN_National_Spirit_faxisiducai_desc:0 "一切权力归于法西斯。议会与反对派早已灰飞烟灭，法西斯党以金色雄鹰与束棒为印，将国家的每一根神经都握于铁腕之中。\n\n不再有争论，只有执行。\n\n不再有动摇，只有服从。"
