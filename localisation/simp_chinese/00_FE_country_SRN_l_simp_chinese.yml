##########领袖
SRN_weituoliaoweintuo_lingxiu:0 "维托里奥·维内托"
SRN_weituoliaoweintuo_lingxiu_desc:0 "维托里奥·维内托并非诞生于旧贵族的宫殿或将军的营房。他曾是古典学教授与军事史学者，在旧秩序的腐朽岁月里，他将半生投入对国家与美德的追寻。当民族在颓废与分裂中沉沦时，维托里奥·维内托放下羊皮卷，执起了束棒。他以一种近乎祭司般的庄严语调，向群众宣讲一个被埋没千年的真理：本民族的祖先曾以铁与法统治已知世界，而衰落的根源仅仅在于后代遗忘了他自身。\n\n所有力量都在他的意志中汇聚成一股洪流。士兵视其为不败的统帅，工人视其为公正的保护者，信徒视其为天命的传达者。带领民族冲破平庸的牢笼、在霸权的星图上刻下不朽之名，是他唯一的、不可抗拒的使命。"

##########副手
SECONDARY_SRN_guojiafaxisidang_head_of_government_character_name:0 "国家法西斯党"
SECONDARY_SRN_guojiafaxisidang_head_of_government_character_trait:0 "\n§Y束棒与蓖麻油§!\n-政治点数:§G+10%§!\n-意识形态变化抵抗力度:§G+20%§!"
SECONDARY_SRN_guojiafaxisidang_head_of_government_character_desc:0 "\n§L国家法西斯党并非一个仅供选举的普通政治团体，它是霸权意志在民间的圣火守护者，是民族觉醒的先锋军团。该党以对领袖的绝对忠诚为纽带，以法团主义的社会重建为纲领，以帝国扩张为终极使命，将所有阶级、地域与世代熔铸为单一的、钢铁般的战斗共同体。\n\n该党坚信，保守主义与进步主义已让民族陷入分裂与虚弱，唯有通过威权领导、社团协作和不断的革命性战争，才能夺取本民族在阳光下应有的生存空间。在它的旗帜下，政治被升华为一种永恒的运动——每一座党支部都是一处霸权的哨所，每一次集会都是民族意志的灌注，每一位党员都是新秩序的活体砖石。全国法西斯党不容忍任何异议，因为它自视为国家灵魂的唯一合法代表，是过去荣光与未来征服之间的唯一桥梁。§!"

SRN_guojiafaxisidang_head_of_government_character:0 "国家法西斯党"
SRN_guojiafaxisidang_head_of_government_character_desc:0 "国家法西斯党并非一个仅供选举的普通政治团体，它是霸权意志在民间的圣火守护者，是民族觉醒的先锋军团。该党以对领袖的绝对忠诚为纽带，以法团主义的社会重建为纲领，以帝国扩张为终极使命，将所有阶级、地域与世代熔铸为单一的、钢铁般的战斗共同体。\n\n该党坚信，保守主义与进步主义已让民族陷入分裂与虚弱，唯有通过威权领导、社团协作和不断的革命性战争，才能夺取本民族在阳光下应有的生存空间。在它的旗帜下，政治被升华为一种永恒的运动——每一座党支部都是一处霸权的哨所，每一次集会都是民族意志的灌注，每一位党员都是新秩序的活体砖石。全国法西斯党不容忍任何异议，因为它自视为国家灵魂的唯一合法代表，是过去荣光与未来征服之间的唯一桥梁。"
