 # 芙宁娜正统线
 TIA_Funina_orthodoxy_decree: "芙宁娜正统诏令"
 TIA_Funina_orthodoxy_decree_desc: "米雅以帝国最高权威颁布诏令，宣布芙宁娜为堤亚穆帝国唯一正统水神。诏令援引帝国建国以来的法典传统和水神启示录中关于“秩序之水”的经文，以法理而非暴力确立正统地位。首都的芙宁娜派知识分子与法官们欢欣鼓舞，但南方省份传来了不安的消息……"
 TIA_Funina_orthodoxy_decree_tt: "§Y南方阿库娅派信众将在数月内组织大规模抗议§!"

 TIA_water_court_establishment: "水神裁判所"
 TIA_water_court_establishment_desc: "芙宁娜信仰的核心教义是“水即正义，正义即裁决”。米雅在路德维希的建议下，于帝都设立水神裁判所——以芙宁娜教义为法理基础的最高司法机构。裁判所不仅审理宗教争端，更被赋予了对贵族违法行为的审判权。这削弱了旧贵族的司法特权，赢得了平民的拥护，却也让保守贵族视之为对传统秩序的颠覆。"

 TIA_fontaine_pilgrimage_concordat: "枫丹朝圣协约"
 TIA_fontaine_pilgrimage_concordat_desc: "帝国承认芙宁娜为正统水神后，芙卡洛斯信仰发源地——枫丹——的地位变得微妙而重要。米雅提出与枫丹刺玫会签署《朝圣协约》：承认枫丹为芙宁娜信仰的圣地，允许帝国信徒自由前往朝圣；作为交换，刺玫会必须公开承认帝国对枫丹的主权，并将宗教事务纳入水神裁判所管辖。这是一笔政治交易——用宗教地位换取政治臣服。"
 TIA_fontaine_pilgrimage_concordat_tt: "枫丹刺玫会温和派获得主导权，激进派被边缘化"

 TIA_suppress_southern_aqua: "南方净化令"
 TIA_suppress_southern_aqua_desc: "芙宁娜正统确立后，南方阿库娅派的抵制越来越公开。多个省份的阿库娅神殿拒绝悬挂帝国诏令，甚至出现了焚烧芙宁娜圣像的事件。南方净化令将派遣帝国宪兵和水神裁判所法官南下，强制关闭阿库娅神殿、没收教产、逮捕阿库娅派顽固领袖。"
 TIA_suppress_southern_aqua_tt: "§R南方省份的阿库娅派被武力压制，但地下活动将更加隐蔽和危险§!"

 TIA_sacred_land_development: "圣地开发计划"
 TIA_sacred_land_development_desc: "朝圣协约签订后，枫丹地区出现了意想不到的经济繁荣。朝圣者从帝国各地涌来，带动了旅馆、餐饮和交通行业的蓬勃发展。米雅命路德维希制定“圣地开发计划”，在枫丹修建朝圣大道、水神纪念堂和圣水温泉设施，将宗教旅游打造为帝国的新经济支柱。宗教与商业的结合让保守教士皱眉，但金币的响声比经文更有说服力。"
 TIA_sacred_land_development_tt: "枫丹从帝国的隐患变为帝国的资产"

 TIA_quell_southern_unrest: "平定南方动乱"
 TIA_quell_southern_unrest_desc: "南方净化令果然引发了激烈反弹。多个城市爆发暴动，阿库娅派信徒与帝国宪兵在街头冲突，部分地方驻军中的阿库娅派军官拒绝执行镇压命令。帝国不得不派遣正规军南下，一场规模不大但影响深远的内部军事行动就此展开。"
 TIA_quell_southern_unrest_tt: "南方的反抗被武力压制，帝国为此付出了不小的代价"

 TIA_theocratic_harmony: "“水之和谐”"
 TIA_theocratic_harmony_desc: "芙宁娜正统、朝圣协约、圣地开发……一系列政策的成功催生了一种新的政治哲学。在一场盛大的“水之和谐”仪式上，帝国宣布：皇权即神权，水神的意志通过皇帝来传达，水神裁判所成为帝国司法体系的最高层级。帝国不再是一个世俗国家配一个国教，而是一个真正的法理神权帝国——秩序、法律、信仰三位一体。"
 TIA_theocratic_harmony_tt: "§G堤亚穆帝国成为了水之法理的化身。在这个帝国，法律即信仰，信仰即秩序。§!"

 TIA_divine_authority: "“神罚之水”"
 TIA_divine_authority_desc: "南方被平定后，帝国的芙宁娜信仰不再有任何公开的挑战者。水神裁判所的权力扩展到帝国每一个角落，任何对正统信仰的质疑都将被视为对帝国本身的叛逆。米雅以“神罚之水”的名义发布最终诏令：芙宁娜的意志不可违抗，一切法律的最终解释权归于水神裁判所。帝国变成了一个高效但压抑的神权国家——异见消失了，但创造力也随之枯竭。"
 TIA_divine_authority_tt: "§G堤亚穆帝国在芙宁娜的名义下实现了绝对统一。§Y代价是自由思想的消亡。§!"

 # 世俗化线
 TIA_secularization_edict: "政教分离敕令"
 TIA_secularization_edict_desc: "米雅做出了一个在这个世界上几乎闻所未闻的决定——帝国将不指定任何国教。政教分离敕令宣布：信仰是私人事务，帝国的治理基于法律和理性而非任何神明的意志；皇权不来自神授，而来自对国家和人民的责任。这份敕令在帝国全境引发了海啸般的反应——芙宁娜派和阿库娅派有史以来第一次达成了共识：§R他们都愤怒了。§!"
 TIA_secularization_edict_tt: "§R两大教派同时爆发抗议，帝国正面临建国以来最严重的信仰危机§!"

 TIA_weather_the_storm: "挺过风暴"
 TIA_weather_the_storm_desc: "政教分离敕令颁布后的头几个月是帝国最黑暗的时期。两派信徒联合举行大规模抗议，多个城市陷入瘫痪，部分地方官员公开拒绝执行敕令，军队内部也出现了不稳定迹象。米雅不得不在这场风暴中保持冷静，依靠忠诚的近卫部队和文官系统维持最低限度的秩序，等待民众的愤怒逐渐耗尽。"
 TIA_weather_the_storm_tt: "风暴正在减弱，但帝国远未回到正轨"

 TIA_age_of_reason_proclamation: "理性时代宣言"
 TIA_age_of_reason_proclamation_desc: "宗教狂热的风暴平息后，一个新问题浮出水面：如果帝国不再用神权维系国民认同，那用什么？米雅在爱丽丝·贝德福德等知识分子的建议下发布了《理性时代宣言》——宣告帝国将以科学、法律和人文精神作为国家基石。宣言不否认水神的存在，但明确指出“神明的领域是信仰，人类的领域是理性，二者不应混淆”。这是一份在这个世界上前所未有的文件。"
 TIA_age_of_reason_proclamation_tt: "§Y如果爱丽丝已入阁，帝国将额外获得一个研究槽§!"

 TIA_freedom_of_faith_act: "信仰自由保障法"
 TIA_freedom_of_faith_act_desc: "两大教派虽不再是国教，信徒依然占帝国人口的绝大多数。米雅选择了包容的道路：颁布《信仰自由保障法》，明确保障所有信仰的合法地位，禁止宗教歧视，但同时规定宗教组织不得干涉国家政务。这是一条困难但正直的道路——它尊重了每个人的信仰自由，也守住了政教分离的底线。"
 TIA_freedom_of_faith_act_tt: "芙宁娜派和阿库娅派终于学会了——或者说不得不接受了——与对方和平共处"

 TIA_state_atheism: "国家无神论"
 TIA_state_atheism_desc: "还有一条更激进的道路——彻底消灭宗教的影响力。帝国不仅停留在“政教分离”，而是走向了“国家无神论”：关闭所有官方神殿，将宗教教育从学校中清除，没收教会财产收归国有。这种做法在效率上无可挑剔——它一劳永逸地解决了宗教问题，没收的教产更为国库注入了大量资金。但它也彻底撕裂了帝国与所有宗教势力的关系。"
 TIA_state_atheism_tt: "§R帝国与一切宗教势力彻底决裂。帕雷提亚的精灵长老、涅比利斯的神权共和国、甚至穆露奈依特的吸血姬祭司——所有人都在用不可思议的目光注视着堤亚穆§!"

 TIA_enlightened_empire: "“理性之光”"
 TIA_enlightened_empire_desc: "信仰自由、政教分离、理性治国——堤亚穆走出了一条在这个世界上前所未有的道路。它证明了即使在一个魔法与神权并存的世界里，人类也可以用理性和制度来治理国家。帝国学者将这种模式称为“理性之光”——它不否认魔法的存在，不贬低信仰的价值，但坚持用人类的智慧和法律来决定国家的命运。"
 TIA_enlightened_empire_tt: "§G堤亚穆帝国成为了理性的灯塔。在这个充满神权和魔法的世界里，它证明了人类可以用自己的智慧照亮前路。§!"

 TIA_scientific_supremacy: "“钢铁理性”"
 TIA_scientific_supremacy_desc: "国家无神论将帝国推上了一条极端但高效的道路。没有了宗教的束缚，科学研究以前所未有的速度推进——魔法被视为一种可用科学方法研究的自然现象，而非神明的恩赐。帝国的工厂、实验室和军工企业在“科学至上”的旗号下全速运转。这个帝国不再相信任何神明，它只相信数据、实验和钢铁。"
 TIA_scientific_supremacy_tt: "§G堤亚穆帝国抛弃了神明，拥抱了科学。它变得空前强大，也空前孤独。§!"

 # 阿库娅正统线
 TIA_Aqua_orthodoxy_decree: "阿库娅正统诏令"
 TIA_Aqua_orthodoxy_decree_desc: "米雅以帝国最高权威颁布诏令，宣布阿库娅为堤亚穆帝国唯一正统水神。诏令强调了阿库娅“滋养万物、庇佑苍生”的教义，将其与帝国“爱民如子”的君主传统相结合。南方省份举国欢腾，农民和士兵们高呼万岁，但北方的学院和法院里一片寂静——那是暴风雨前的沉默。"
 TIA_Aqua_orthodoxy_decree_tt: "§R枫丹刺玫会激进派将此视为对枫丹文化的公然否定，独立运动急剧升温§!"

 TIA_divine_grace_mission: "女神恩泽布道团"
 TIA_divine_grace_mission_desc: "帝国在全国范围内组建“女神恩泽布道团”——由阿库娅派神官和帝国官员组成的巡回传教团体。布道团不仅传播阿库娅教义，还在各地分发救济物资、主持祈福仪式，将宗教活动与社会福利绑定在一起。底层民众纷纷皈依，军队中的阿库娅派士气高涨，但知识分子们嗤之以鼻——他们认为这不过是用面包收买灵魂。"

 TIA_holy_conscription: "神恩征召令"
 TIA_holy_conscription_desc: "布道团的成功让帝国看到了宗教动员的巨大潜力。“神恩征召令”以阿库娅的名义号召全国信徒参军，宣称“为阿库娅而战就是为帝国而战”，承诺阵亡者将在女神怀抱中获得永恒安息。数以万计的志愿者涌入征兵站。军方欢欣鼓舞，但帝国正越来越像一台宗教战争机器。"
 TIA_holy_conscription_tt: "帝国正在变成一台以信仰为燃料的战争机器"

 TIA_reconcile_northern_scholars: "北方学者安抚"
 TIA_reconcile_northern_scholars_desc: "北方省份的不满越来越公开。以十桥大学为中心的知识分子群体发表联合声明，批评“布道团是对理性的侮辱”。更危险的是，部分北方贵族暗中联络芙宁娜派残余势力，甚至有情报显示他们试图联系枫丹的刺玫会。米雅意识到不能把所有非阿库娅派都推向对立面——她需要安抚北方学者，至少让他们保持中立。"
 TIA_reconcile_northern_scholars_tt: "北方学者虽不认同阿库娅正统，但愿意为帝国效力——只要帝国不再逼迫他们改信"

 TIA_sacred_army_formation: "圣战军团编成"
 TIA_sacred_army_formation_desc: "神恩征召令的成功超出了所有人的预期。阿库娅派神官被编入军队担任随军祭司，士兵们在战前齐声诵念阿库娅的祈祷词。帝国军方将这些狂热的信徒编组为“圣战军团”——独立于常规军的特殊作战单位，直接听命于皇帝和阿库娅最高神官。这支军队的战斗力令人生畏，但它对国家的忠诚到底基于帝国还是基于信仰？这个问题没有人敢问。"
 TIA_sacred_army_formation_tt: "§Y圣战军团将作为预备役部队加入堤亚穆帝国的作战序列§!"

 TIA_aqua_cultural_renaissance: "阿库娅文艺复兴"
 TIA_aqua_cultural_renaissance_desc: "北方学者的安抚出人意料地催生了一场文化运动。开明的阿库娅派神学家与北方哲学家展开对话，他们发现阿库娅教义中“水滋养万物”的理念与自然科学的研究精神并不矛盾——水的流动、循环、净化本身就是自然法则的体现。这场“阿库娅文艺复兴”将宗教热情引导向了科学探索和文化创造。帝国在不放弃阿库娅正统的前提下，找到了一条兼容理性的道路。"
 TIA_aqua_cultural_renaissance_tt: "阿库娅的恩泽不仅滋养生命，也滋养知识"

 TIA_aqua_theocratic_militarism: "“神恩即力量”"
 TIA_aqua_theocratic_militarism_desc: "圣战军团在实战中证明了宗教狂热的可怕力量。帝国的军事体系完全围绕阿库娅信仰重组：每支部队配备随军祭司，每场战斗以圣水仪式开始，每次胜利归功于女神庇佑。帝国不再是一个拥有军队的国家，而是一支拥有国家的军队。阿库娅最高神官在帝国决策中的话语权已与皇帝平起平坐——甚至更大。"
 TIA_aqua_theocratic_militarism_tt: "§G堤亚穆帝国已成为阿库娅的圣剑。它无比锋利，§R但握住它的手正在流血。§!"

 TIA_aqua_benevolent_empire: "“水之恩泽”"
 TIA_aqua_benevolent_empire_desc: "阿库娅文艺复兴证明了信仰与理性不必对立，恩泽与力量可以共存。帝国在“滋养万物”的教义引导下走出了一条独特的道路——一种“仁慈神权”：皇帝以阿库娅代言人的身份治理国家，治理的核心不是暴力和控制，而是恩泽和庇佑。这种模式赢得了广泛支持，也让东大陆的观察者困惑——这个帝国明明是神权统治，但它的子民看起来比许多共和国的公民还要幸福。"
 TIA_aqua_benevolent_empire_tt: "§G堤亚穆帝国在阿库娅的恩泽下找到了属于自己的道路。这条路既不通向断头台，也不通向战场，而是通向一个水神眷顾的黄金时代。§!"

 ###################################
 # 枫丹危机线
 ###################################

 TIA_fontaine_assessment: "枫丹局势评估"
 TIA_fontaine_assessment_desc: "枫丹刺玫会自治区虽然名义上是帝国的附属国，但近年来独立倾向日益明显。刺玫会内部的激进派与温和派分歧严重，帝国对此地的控制力正在被逐步侵蚀。是时候对枫丹局势进行一次全面而冷静的评估了——摸清底牌，才能做出正确的决定。"
 TIA_fontaine_assessment_tt: "§Y枫丹局势评估完成。帝国获得了对刺玫会内部力量格局的初步了解，可以开始制定对策。§!"

 TIA_fontaine_intelligence_network: "枫丹情报网"
 TIA_fontaine_intelligence_network_desc: "帝国情报部门在枫丹建立秘密情报网络，渗透刺玫会各派系、监控独立运动核心成员、截获关键通信。这张无形的网将成为帝国在枫丹问题上的千里眼和顺风耳。"
 TIA_fontaine_intelligence_network_tt: "§Y枫丹情报网开始运作。帝国将陆续收到关于刺玫会动向的情报。§!"

 TIA_fontaine_autonomy_negotiation: "自治权谈判"
 TIA_fontaine_autonomy_negotiation_desc: "与其等待枫丹的独立倾向升级为不可控的危机，不如主动出击——邀请刺玫会的代表坐到谈判桌前。帝国愿意在一定范围内扩大枫丹的自治权，但前提是刺玫会必须公开放弃独立诉求，承认帝国的宗主权不可动摇。谈判将是漫长而艰难的，但和平解决枫丹问题的代价远低于战争。"
 TIA_fontaine_autonomy_negotiation_tt: "§G帝国向刺玫会释放了善意，谈判大门已经打开。§!"

 TIA_fontaine_cultural_protection: "枫丹文化保护法"
 TIA_fontaine_cultural_protection_desc: "颁布专门的《枫丹文化保护法》，以帝国法律的形式保障枫丹的语言、宗教仪式、艺术传统和地方习俗。这不仅是对枫丹人民的尊重，更是向世界宣告——帝国的统一不以消灭多样性为代价。刺玫会的温和派将此视为巨大的胜利。"
 TIA_fontaine_cultural_protection_tt: "枫丹的文化传统获得了帝国法律的正式保护。刺玫会温和派的影响力大幅上升。"

 TIA_fontaine_joint_waterworks: "联合水利工程"
 TIA_fontaine_joint_waterworks_desc: "枫丹地区水资源丰富但基础设施落后。帝国提出一项大规模联合水利工程计划——由帝国提供技术和资金，枫丹提供土地和劳动力，共同修建灌溉渠网、防洪堤坝和水力发电设施。这个工程的真正目的不只是水利——它将把枫丹的经济命脉与帝国紧紧绑定，让独立在经济上变得不可想象。"
 TIA_fontaine_joint_waterworks_tt: "§G联合水利工程把枫丹的经济命脉与帝国紧密绑定。独立的经济代价变得不可承受。§!"

 TIA_fontaine_parliament_reform: "枫丹议会改革"
 TIA_fontaine_parliament_reform_desc: "帝国推动枫丹议会的民主化改革：扩大议会席位、引入直选制度、保障温和派和中立派的参政权。改革的目的是让枫丹人民通过合法的政治渠道表达诉求，将独立运动的能量引导到体制内消化。如果枫丹人民发现他们可以通过投票改变命运，谁还需要革命？"
 TIA_fontaine_parliament_reform_tt: "枫丹议会改革将激进派的能量引导到了体制内。温和派在新议会中占据多数席位。"

 TIA_fontaine_reconciliation: "帝国框架内的和解"
 TIA_fontaine_reconciliation_desc: "自治权谈判、文化保护法、联合水利工程、议会改革——一系列怀柔政策的累积效果远超任何单一措施。枫丹人民发现，留在帝国框架内并不意味着屈辱和丧失身份，而是可以在保持自身文化特色的同时享受帝国的经济保障和军事庇护。帝国与枫丹的关系进入了一个全新的阶段。"
 TIA_fontaine_reconciliation_tt: "§G枫丹危机和平解决。帝国以智慧而非暴力赢得了枫丹的忠诚——这是一个值得所有国家学习的范例。§!"

 TIA_fontaine_revoke_autonomy: "撤销自治权"
 TIA_fontaine_revoke_autonomy_desc: "够了。枫丹刺玫会把帝国的宽容当成了软弱，自治权被他们用来培植独立力量。帝国宣布撤销枫丹的一切自治特权——刺玫会议会解散，地方法规作废，枫丹总督由帝国中央直接任命。这道命令将在枫丹引发轩然大波，但帝国已经做好了准备。"
 TIA_fontaine_revoke_autonomy_tt: "§R枫丹的自治权被帝国一纸令下全部撤销。刺玫会宣布帝国“撕毁了历史契约”，枫丹街头爆发大规模抗议。§!"

 TIA_fontaine_martial_law: "军事管制令"
 TIA_fontaine_martial_law_desc: "撤销自治权后的抗议浪潮迫使帝国进一步升级手段。枫丹全境实施军事管制——帝国驻军接管城市治安、宵禁令覆盖所有主要城市、集会自由被暂停、刺玫会的公开活动被全面禁止。帝国军旗取代了枫丹旗帜飘扬在每一座城门上。"
 TIA_fontaine_martial_law_tt: "§R枫丹进入军事管制状态。街头平静了下来，但沉默比呐喊更令人不安。§!"

 TIA_fontaine_thorn_rose_purge: "刺玫会清剿"
 TIA_fontaine_thorn_rose_purge_desc: "军事管制为帝国提供了行动的掩护。情报部门锁定了刺玫会的核心成员、秘密据点和资金网络。帝国军队在一个凌晨同时对枫丹全境数十个目标发动突袭——逮捕领导人、查封秘密印刷厂、冻结海外账户。刺玫会作为一个有组织的政治力量将不复存在。"
 TIA_fontaine_thorn_rose_purge_tt: "§R帝国对刺玫会发动了全面清剿。数十名领导人被捕，组织网络被摧毁。§!§Y但刺玫会残余势力仍可能进行最后的抵抗。§!"

 TIA_fontaine_garrison_reinforcement: "枫丹驻军强化"
 TIA_fontaine_garrison_reinforcement_desc: "在刺玫会清剿的同时，帝国加强了枫丹地区的军事基础设施——修建永备工事、扩充弹药库、改善通信网络。这些设施既可以用来震慑叛乱分子，也可以在未来的对外战争中作为帝国的战略后方。"
 TIA_fontaine_garrison_reinforcement_tt: "枫丹地区的军事基础设施得到全面加强。帝国对枫丹的军事控制力达到了前所未有的水平。"

 TIA_fontaine_direct_rule: "枫丹直辖化"
 TIA_fontaine_direct_rule_desc: "刺玫会被清剿、驻军被强化——帝国对枫丹的控制已经是事实上的直辖。现在需要做出最后的政治决定：是正式吞并枫丹、将其彻底融入帝国版图，还是保留枫丹作为附属国的名义存在、实行“名为自治实为直辖”的管理模式？"
 TIA_fontaine_direct_rule_tt: "§Y帝国即将做出关于枫丹命运的最终决定。§!"

#事件
 TIA.1.t: "启示"
 TIA.1.desc: "深夜，月光洒满了堤亚穆帝国的皇宫。年轻的公主米雅在梦中经历了一段不可思议的旅程。她仿佛目睹了帝国的衰败，亲身经历了因自己无所作为而导致的帝国毁灭。当她被带上断头台时，一种强烈的悔恨与不甘涌上心头。\n\n然而，就在公主头颅掉下的这一刹那，时间仿佛倒流，米雅突然从梦中惊醒，发现自己回到了那个决定性的时期。看着那本身边沾上血迹的笔记和其中的内容，她意识到，这不仅仅是一个梦，而是上天给予她重生的机会，让她能够改变帝国的命运。"
 TIA.1.a: "我要逃离上断头台的命运！"
 TIA.1.b: "我什么时候有这本笔记了？"

 TIA.2.t: "[From.GetLeader]退位"
 TIA.2.desc: "漫长的岁月似乎终于压垮了[From.GetLeader]皇帝的肩膀。在庆祝帝国千年荣光的庆典之后，陛下在御前会议上做出了一个让所有重臣都为之震惊的决定。\n\n“朕已引领帝国走过了一段漫长的旅程，”皇帝的声音虽然疲惫，却带着不容置疑的坚定，“如今，帝国的未来需要新的活力与视野。朕决定，将不再独揽帝国的重担。”\n\n所有的目光都投向了静静站在一旁的米娅。这位年轻的皇室成员以其敏锐的头脑和独特的魅力，早已在私下赢得了部分改革派和民众的期待。[From.GetLeader]亲手将象征至高权力的帝国玺戒放在了她的手中。\n\n“从此刻起，米娅将成为帝国的摄政，并将在朕的指导下，逐步接管所有的权责。愿她的智慧能带领堤亚穆走向下一个千年的辉煌。”\n\n朝堂之上暗流涌动。有人为新时代的到来而欢欣鼓舞，也有人对权力的突然更迭和未知的未来感到深深的不安。然而，无论如何，帝国的命运已经翻开了崭新的一页。"
 TIA.2.a: "§C隆重举行权力交接典礼，稳定人心§!"
 TIA.2.b: "§G低调过渡，确保陛下安宁退休§!"
 TIA.2.c: "§R有势力反对交接？必须彻查！§!"
 
 TIA.3.t: "帝国成功抵御住了瘟疫的考验！"
 TIA.3.desc: "[From.GetLeader]伫立于白玉高台，俯瞰着广场上涌动的人群。手中未持诏书，而是握着一束象征健康的金穗草与白芷——这是帝国医学院新培育的抗菌植物。微风拂过，草叶轻扬，仿佛连空气都涤荡着革新后的洁净气息。历时一年的医疗改革通过了最严峻的考验：一场原本可能席卷全国的瘟疫在首都初现时，便被迅速遏制。\n\n[From.GetLeader]走向广场中央新落成的纪念碑，将金穗草嵌入碑座基石的凹槽中，日落时分，民众仍未散去。孩子们捧着分到的“健康糖”，在广场奔跑嬉笑。[From.GetLeader]悄悄退至露台，轻声道：​​“§G看啊，博士……真正的帝国荣耀，不是疆土，是每个孩子都能无忧无虑地奔跑的黄昏。§!”\n\n远方的检疫站旗帜轻扬，钟声敲响，一场瘟疫的阴影彻底消散于堤亚穆的暮色中。"
 TIA.3.a: "终于解决了这个棘手的问题了……"

 TIA.4.t: "刺玫会的秘密集会"
 TIA.4.desc: "情报网传回了第一份重要报告：刺玫会高层在枫丹城郊的一座庄园中举行了秘密会议。与会者包括激进派领袖、数名枫丹旧贵族和两名身份不明的外国人。会议的具体内容暂时无法确认，但密探成功记录了与会者名单和会议持续时间——整整两天一夜。这不是普通的例会。"
 TIA.4.a: "命令密探尝试渗透刺玫会高层"
 TIA.4.b: "不要冒险，继续外围监控即可"
 TIA.4.c: "将情报通报给枫丹总督，由他判断"
 TIA.4.a_tt: "渗透行动风险高但回报大——如果成功，帝国将掌握刺玫会的核心机密"
 
 TIA.5.t: "刺玫会的路线图"
 TIA.5.desc: "渗透行动取得了突破性成果。帝国密探获取了一份被刺玫会核心成员称为“五年路线图”的秘密文件。文件详细规划了枫丹走向独立的分步骤方案：第一阶段扩大自治权、第二阶段建立独立财政和军事力量、第三阶段寻求国际承认、第四阶段在“合适的时机”宣布独立。文件还列出了可能的国际支持者名单——其中赫然出现了穆露奈依特和东大陆某个共和国的名字。"
 TIA.5.a: "将路线图作为筹码保存"
 TIA.5.b: "将证据泄露给刺玫会温和派，让他们自己清理门户"
 TIA.5.a_tt: "§Y帝国掌握了刺玫会的独立路线图。这份证据可以在谈判中发挥关键作用。§!"
 TIA.5.b_tt: "温和派在看到激进派的“路线图”后大为震惊，他们并不想要战争"

 TIA.6.t: "米雅的日记-马术社"
 TIA.6.desc: "上一世，因为不会骑马所以导致逃跑不够快......这一世，我要学会骑马！为了更好的跑路！"
 TIA.6.a: "为了以防万一，就算这次没有阻止革命那也要跑路！"
 
 TIA.7.t: "总督的两难"
 TIA.7.desc: "枫丹总督收到帝国的情报通报后陷入了沉思。作为帝国任命的地方长官，他当然效忠于帝国；但他在枫丹生活了二十年，与当地人建立了深厚的感情。他最终向米雅呈交了一份态度谨慎的报告，建议帝国“在不激化矛盾的前提下加强管控”——一句什么都说了又什么都没说的外交辞令。不过报告的附件中有一份详尽的刺玫会各派系实力对比分析，这很有价值。"
 TIA.7.a: "采纳总督的建议"
 TIA.7.b: "总督太优柔寡断了，但他的情报分析很有用"
 
 TIA.8.t: "枫丹的愤怒"
 TIA.8.desc: "阿库娅正统政策在枫丹引发了剧烈反弹。枫丹是芙卡洛斯信仰的发源地——帝国否认芙卡洛斯、独尊阿库娅，在枫丹人看来等于否认了他们最核心的文化身份。刺玫会抓住机会大肆宣传：帝国不仅在政治上压迫枫丹，现在连信仰都要剥夺！枫丹街头爆发了建区以来规模最大的抗议活动，参与者远超刺玫会的组织能力——这是真正的民愤。"
 TIA.8.a: "派遣宪兵压制抗议"
 TIA.8.b: "不能在枫丹问题上火上浇油"
 TIA.8.c: "派遣阿库娅布道团进入枫丹“安抚”民众"
 TIA.8.c_tt: "§R这等于在伤口上撒盐！枫丹人会将布道团视为对他们信仰的公然侮辱！§!"

 TIA.9.t: "枫丹的困惑"
 TIA.9.desc: "帝国推行世俗化政策后，枫丹出现了意料之外的反应。刺玫会的宗教领袖们原本准备好了一套“帝国亵渎水神”的宣传攻势，但世俗化政策并不针对任何特定教派——它平等地对待所有信仰，包括芙卡洛斯。一些枫丹知识分子甚至公开表示，世俗化帝国“至少不会强迫我们改信”。刺玫会的独立叙事失去了宗教这张王牌。"
 TIA.9.a: "很好，宗教问题不再是枫丹独立的借口了！"
 TIA.9.a_tt: "世俗化政策意外地缓解了枫丹的宗教对立情绪。刺玫会失去了一个重要的动员工具。"

 TIA.10.t: "阿鲁卡王国发生暴乱"
 TIA.10.desc: ""
 TIA.10.a: "不行！我必须要去！"

 TIA.11.t: "水神之争：帝国的十字路口"
 TIA.11.desc: "会议的气氛凝重得如同暴风雨前的海面。关于确立国家水神信仰的最终辩论已经持续了数日，南北双方的代表据理力争，引经据典，甚至不惜以地方稳定相要挟。南方派呈上了据称是阿库娅女神亲赐的“圣水”（虽然看起来和普通井水无异，但据说能让人变得乐观……或者说傻乐？），强调其女神§C活泼亲民、赐福慷慨§!，是帝国繁荣的源泉。北方派则展示了历代关于芙宁娜（或芙卡洛斯）的文献记载和精美圣像，颂扬其§C高贵智慧、守护众生§!的牺牲精神，认为这才是水神应有的威仪与深度。双方都宣称对方是异端，亵渎了真正的神明。\n\n米娅陛下，帝国的命运系于您的一念之间。是顺应南方炽热的民意，尊奉§C阿库娅§!为帝国唯一真神？还是认可北方悠久的传统，确立§C芙宁娜§!（或芙卡洛斯）的至高地位？抑或是……采取更为彻底的手段，从根本上§R斩断神权对世俗的干涉§!，宣告帝国自此进入一个§R理性与皇权至高无上§!的新时代？无论选择哪条路，都必将掀起巨大的波澜，但帝国已无路可退，必须在这信仰的迷宫中，为万民指明方向。"
 TIA.11.a: "§Y水流终归一源：尊奉阿库娅女神！§!"
 TIA.11.b: "§C静水流深：芙宁娜才是真神！§!"
 TIA.11.c: "§R神权虚妄：帝国才是唯一的光！§"

 TIA.12.t: "堤亚穆帝国的财政深渊"
 TIA.12.desc: "在堤亚穆帝国的繁荣表象下，腐败与挥霍如毒藤般蔓延。国库的黄金早已被权贵们用于奢华宴会和无效工程，帝国财政犹如沙堡般崩塌。尽管有财政官员曾试图挽救，但高层官员们的贪婪让改革化为泡影。物价飞涨、民怨沸腾，市场崩溃的浪潮席卷每一个角落。农民抛弃土地，商队停滞不前，帝国的经济引擎嘎吱作响，预示着一场更深的灾难。当金币的光芒褪去，只留下冰冷的债务深渊。"
 TIA.12.a: "命运的齿轮无法阻挡......"
 
 TIA.13.t: "帝国阴影：瘟疫肆虐"
 TIA.13.desc: "财政崩溃的余波未息，堤亚穆帝国又迎来更黑暗的试炼。一场源自贫困街区的瘟疫悄然爆发——被称作“矿石病”的神秘病症，在营养不良的人群中快速扩散。医院的床位被挤爆，药物短缺让医生们徒劳叹息。街道上死寂笼罩，原本繁华的皇都沦为鬼城。水神的信徒们开始低语：这是阿库娅的愚弄之咒，或是芙宁娜的审判之泪？无论真相如何，瘟疫横行撕裂了社会仅存的秩序，农民起义的星星之火在尸骸间燃起，预示信仰之争即将登场。生命在病毒前脆弱如纸。"
 TIA.13.a: "命运的齿轮无法阻挡......"

 TIA.14.t: "信仰的裂痕：阿库娅与芙宁娜"
 TIA.14.desc: "瘟疫与贫困让堤亚穆帝国的灵魂渴求救赎，但水神之争却将它推入更血腥的深渊。一方是贝尔泽古的阿库娅信徒，崇拜她为“智障水神”——追求欢乐与愚行中的解脱；另一方是枫丹的芙宁娜信徒，奉她为“优雅水之女神”——信仰仪式与崇高审判。两派在城镇广场爆发的冲突迅速蔓延：阿库娅的信徒以混乱狂欢对抗芙宁娜的庄严圣歌，街头演变为神权战场。尽管中央试图调解，但瘟疫和经济崩溃已消融了中央权威。信徒的血染红了河流，分裂的苗头在西部的芙宁娜势力和东部的阿库娅阵营间燃烧——宗教狂热成为帝国分裂的催化剂。"
 TIA.14.a: "命运的齿轮无法阻挡......"

 TIA.15.t: "帝国的终焉：四分五裂"
 # ====== Fallback（命运线直达 / 未知组合）======
 TIA.15.desc: "堤亚穆帝国的命运已被书写：财政崩溃、瘟疫横行和宗教冲突碾碎了最后一丝统一。中央权威崩溃，领土分裂为五个争斗的实体。从西向东依次诞生......\n\n枫丹国：由芙宁娜领导，她以水神之名宣布独立，拥抱优雅与秩序。\n堤亚穆中部战区：残存的帝国核心，右田铃将军勉强维持军管，坚守衰败的皇权遗产。\n奴隶之剑起义军：露娜号召的农奴起义在瘟疫废墟中崛起，剑指压迫者。\n贝尔泽古王国：阿库娅自封为“水神女王”，信徒们用狂欢粉饰裂痕，成为东方堡垒。\n\n地理划分已成定局：西方枫丹的芙宁娜信徒、中部堤亚穆的混乱、起义军的火焰和东方贝尔泽古的愚行。帝国的物语在此终结，世界版图重组——水神之争从信仰演变为国界线......"
 # ====== 三重崩溃（原版时间线）======
 TIA.15.desc_all: "堤亚穆帝国的命运已被书写：财政崩溃引发了饥荒，饥荒催生了瘟疫，瘟疫摧毁了最后一丝社会秩序——而水神之争则将绝望的民众分裂成了互相残杀的阵营。\n\n三块多米诺骨牌，一块推倒一块，直到整座帝国轰然倒塌。\n\n中央权威崩溃，领土分裂为互相争斗的势力。枫丹以芙宁娜之名宣布独立，贝尔泽古在阿库娅的旗帜下自立为国，奴隶之剑的起义军在废墟中崛起，中部军区在右田铃的铁腕下勉强维持最后的秩序。\n\n米雅站在宫殿阳台上，看着与日记中一模一样的烽火——\n\n这一次，她没能改变任何事。"
 # ====== 双重崩溃 ======
 TIA.15.desc_famine_plague: "帝国不是被敌人击溃的——它是被饿死的，然后被病死的。\n\n饥荒掏空了帝国的身体，瘟疫夺走了帝国的呼吸。当粮价涨到天文数字时，饿得发疯的民众涌入城镇抢粮；当矿石病在营养不良的人群中爆发时，连抢粮的力气都没有了。\n\n尸体堆在路边无人收殓——因为活着的人也快倒下了。\n\n信仰的裂痕虽然还在，但此刻已经没有人有力气为神明而战了。人们只是安静地死去，安静地腐烂，安静地被遗忘。\n\n路德维希最后一次进入会议室时，手里拿着一份已经没有意义的财政报告。他看了一眼米雅，什么都没说——\n\n因为他们都知道，说什么都已经晚了。"
 TIA.15.desc_famine_faith: "饥饿的人最需要的是面包。但当面包消失的时候，他们抓住的是信仰——然后信仰撕裂了他们。\n\n饥荒让帝国的平民失去了对皇权的最后一丝信任。“连面包都给不了我们的皇帝，凭什么统治我们？”——这句话从南方传到北方，从东部传到西部。\n\n而阿库娅派和芙宁娜派的传教士则趁虚而入，向饥饿的人群伸出了双手：“皇帝不管你们——但神会。”\n\n于是饥荒变成了宗教战争的燃料。挨饿的农民拿起武器，不是为了面包——而是为了各自的水神。\n\n帝国的崩溃不是从王座开始的——是从空荡荡的面包房和满溢的教堂开始的。"
 TIA.15.desc_plague_faith: "瘟疫让帝国虚弱，信仰让帝国撕裂。\n\n当矿石病在帝国南部蔓延时，两派水神信徒给出了截然不同的解释。阿库娅派宣称瘟疫是“芙宁娜的诅咒”，芙宁娜派反击说是“阿库娅的愚行带来了天罚”。双方都在各自的教堂里疯狂祈祷——然后走出教堂互相殴打。\n\n帝国军队本该维持秩序，但士兵们自己也分成了两派。一个连队里的阿库娅信徒和芙宁娜信徒在一次巡逻中发生了冲突——三人死亡，七人重伤。\n\n瘟疫杀死了身体，信仰杀死了灵魂。当这两把刀同时刺入帝国的胸膛时——\n\n即使没有饥荒，帝国也撑不住了。"
 # ====== 单一崩溃 ======
 TIA.15.desc_famine: "帝国是被饿死的。\n\n没有瘟疫，没有宗教战争——只有最朴素、最残酷、最不浪漫的死法。帝国的平民因为吃不上饭而暴动，帝国的士兵因为领不到军粮而哗变，帝国的贵族因为粮价飞涨而趁火打劫。\n\n米雅站在窗前看着帝都空荡荡的街道——不是因为宵禁，而是因为已经没有人有力气出门了。\n\n日记里写得很清楚：饥荒是第一块倒下的多米诺骨牌。在“那个”未来里，饥荒之后是瘟疫，瘟疫之后是宗教战争，然后帝国分崩离析。\n\n这一次，瘟疫和宗教战争没有来——但仅仅一场饥荒，就已经足够将帝国推下悬崖。\n\n原来，命运不需要三块骨牌。一块就够了。"
 TIA.15.desc_plague: "帝国是被病死的。\n\n矿石病——日记中记载的那场瘟疫——在帝国南部爆发时，没有人预料到它的蔓延速度会如此之快。三周内，三个省份的医疗体系全面崩溃。六周内，帝都也沦陷了。\n\n帝国的财政没有崩溃，信仰的裂痕也在可控范围内——但这些都不重要了。当一个帝国失去了十分之一的人口时，任何制度、任何信仰、任何权威都会像沙堡一样坍塌。\n\n活下来的人不再信任任何人——不信任皇室（为什么不阻止瘟疫？），不信任教会（为什么神不保佑我们？），不信任彼此（你是不是带着病毒？）。\n\n帝国没有被推翻。它只是……空了。"
 TIA.15.desc_faith: "帝国是被信仰杀死的。\n\n没有饥荒，没有瘟疫——帝国的仓库里有粮食，帝国的平民也还健康。但这些都无法阻止一场从灵魂深处蔓延的裂变。\n\n阿库娅与芙宁娜之争从街头斗殴升级为武装冲突，从武装冲突升级为全面内战。帝国军队被迫在两派之间维持中立——但当士兵自己也开始选边站的时候，“中立”就变成了一个笑话。\n\n最令人心碎的是：帝国本可以不这样。粮食是够的，疾病是可控的，唯独人心——人心从来不讲道理。\n\n“他们本来可以好好活着，”路德维希在最后一次内阁会议上说，“但他们选择了为一个谁也没见过的神互相杀戮。”\n\n米雅低下了头。有些命运，不是面包和药就能改变的。"
 TIA.15.a: "命运的齿轮无法阻挡......"

 TIA.16.t: "堤亚穆陷入战火"
 TIA.16.desc: "随着堤亚穆陷入四分五裂的战火，曾经两国精心划定的“堤亚穆-穆露奈依特缓冲区”已沦为权力真空地带。这片富含矿产与农田的肥沃土地，如今只剩下零星的地方民兵和流亡贵族苟延残喘。穆露奈依特女皇的案头堆满了前线密报——参谋部激烈争论：是趁机吞并这块唾手可得的肥肉，还是恪守旧约维持中立？窗外，帝国旗帜在寒风中猎猎作响，仿佛低语着历史的抉择……"
 TIA.16.a: "帝国之犁必须耕遍无主之地！"
 TIA.16.b: "契约神圣，不可玷污帝国荣光"

 TIA.17.t: "堤亚穆-穆露奈依特缓冲区沦陷"
 TIA.17.desc: "当堤亚穆的残存军队在瘟疫与宗教战争中苦苦支撑时，北方边境传来噩耗——穆露奈依特的黑黄旗已插遍缓冲区的每一座哨塔！女皇米雅颤抖着撕碎急报，议会厅内死寂无声。昔日的协定化为废纸，而帝国甚至无力派遣一支斥候队北上质问。冰冷的现实如利刃刺入心脏：​​“连最后的喘息之地，也成了他人盛宴的餐盘。”​​ 窗外，枫丹与贝尔泽古的炮火映红了夜空，帝国的黄昏从未如此漫长......"
 TIA.17.a: "记住这背叛，而非宽恕"

 TIA.18.t: "双头鹰的暗影"
 TIA.18.desc: "当枫丹与贝尔泽古的旗帜在废墟中倒下，堤亚穆与中部战区隔着锈蚀的铁丝网冷冷对峙。米雅女皇在露那提亚重建政府，却收到右田铃的卫星影像——中部士兵正在拆除本部边界哨站，将报废坦克堆成金属长城。四女神联盟随即发表中立声明：“巨人的争斗会碾碎蝼蚁”，而玛尔德尼亚等边境城市的无线电静默如同暴风雨前的窒息......是战火重燃还是和平谈判？"
 TIA.18.a: "派遣使者前去谈判、地点选在......紫耀之都"
 TIA.18.b: "我们不需要谈判，既然我们可以平了叛军自然也可以平了他们！"

 TIA.19.t: "紫耀之都的邀请函"
 TIA.19.desc: "女皇米雅的使节穿越瓦罗亚的晨雾，将鎏金请柬送至中部战区司令部。提案令人震惊:以“堤亚穆帝国联邦”之名组建联合政府，玛尔德尼亚以西保留皇权统治，而以东获得高度自治权、由军部管辖。右田铃的参谋们争执不休：接受意味着放弃剑指北方的野心，拒绝则可能重燃战火。谈判地点定于中立城市紫耀之都，海风能否吹散猜忌的阴云？"
 TIA.19.a: "签署联邦协议"
 TIA.19.b: "加强边境驻军"

# TIA.20 - 退位风波
 TIA.20.t: "退位？"
 TIA.20.desc: "阿库娅降临阿克塞尔的消息如同一道惊雷劈开了帝国的天空。这位自称“真正的水神”的蓝发女神——不，严格来说应该叫女孩——在帝都广场上大声宣布“这个国家的治理简直是一团糟”，然后以一种极为随意的语气“建议[From.GetLeader]考虑一下把位子让出来”。\n\n帝国宫廷炸开了锅。支持者认为神明降世是帝国获救的征兆，反对者则怒斥这是对皇室的公然侮辱。而阿库娅本人似乎对这一切引发的混乱毫无自觉，正在王宫的花园里悠闲地泡着露天温泉。\n\n[From.GetLeader]需要做出回应——但她面对的不是一个普通的政治对手，而是一位（自称的）神明。"
 TIA.20.a: "试着和她谈谈……虽然我不觉得她会听"
 TIA.20.b: "……随她去吧，反正这个帝国已经够乱了"
 TIA.20.a_tt: "米雅试图与阿库娅进行外交谈判，但与一位对政治毫无兴趣的女神谈判注定不会顺利"

 # TIA.21 - 阿库娅对王位没有兴趣
 TIA.21.t: "王位？谁要这种东西？"
 TIA.21.desc: "事情的发展出乎所有人的预料。在帝国上下为阿库娅的“篡位宣言”惶恐不安的时候，当事人本人却在某天早上打着哈欠宣布：\n\n“什么王位啊，每天要处理那么多文件，还要开那么多会，想想就好累啊。你们自己玩吧，我才不要当什么皇帝呢。”\n\n说完，阿库娅真的就这么走了。她没有留下任何指示、任何要求，甚至连一个像样的告别仪式都没有。帝国突然陷入了一种诡异的权力真空——旧的秩序已经被她的到来动摇，新的秩序却因为她的离开而无法建立。民间舆论分裂为“松了口气派”和“被女神抛弃派”，宫廷里的气氛更是一言难尽。"
 TIA.21.a: "……所以这一切闹剧到底是为了什么"
 TIA.21.a_tt: "阿库娅的离去让帝国陷入尴尬的混乱——她来了，她搅乱了一切，然后她走了"

 # TIA.22 - 阿库娅不情愿的加冕
 TIA.22.t: "加冕？我需要这种东西？"
 TIA.22.desc: "在一系列令人目不暇接的政治操作之后，阿库娅——堤亚穆帝国历史上最不情愿的统治者——被推上了皇位。加冕仪式在帝都大教堂举行，场面庄严肃穆。\n\n唯一破坏氛围的是阿库娅本人。她在整个仪式过程中至少打了七次哈欠，把皇冠戴歪了三次，还在宣誓效忠帝国的时候小声嘟囔“这东西好重啊能不能换个轻点的”。\n\n但不管怎么说，帝国有了一位新的统治者。一位水神。一位对文书工作深恶痛绝、对国家治理毫无兴趣、但确实拥有某种超自然力量的统治者。帝国的未来将走向何方，没有人知道。唯一可以确定的是——它一定会很有趣。"
 TIA.22.a: "以水神之名——新时代开始了！"
 TIA.22.b: "加冕只是形式……真正重要的是谁在幕后掌舵"
 TIA.22.a_tt: "阿库娅正式成为堤亚穆帝国的统治者。帝国的执政风格即将发生……难以预测的变化"
 TIA.22.b_tt: "阿库娅坐在王座上，但真正的决策权仍然掌握在帝国旧有的权力网络手中"

 # TIA.23 - 芙卡洛斯现身
 TIA.23.t: "啊？又来一个水神？"
 TIA.23.desc: "就在帝国上下为阿库娅引发的混乱焦头烂额的时候，命运决定再开一个玩笑。\n\n帝国西部边境传来急报：一位自称“芙卡洛斯”的女性突然出现在枫丹地区，宣称自己才是“真正的水之女神”，并指责阿库娅是“冒牌货”。她的出现立刻获得了枫丹地区信奉芙宁娜传统的民众的狂热追捧。\n\n消息传到帝都后，阿库娅的反应是：“哈？又来一个？真是烦死了。”宫廷大臣们的反应则截然不同——两位“水神”的存在将帝国的宗教分裂推向了新的高潮。芙宁娜派如获至宝，阿库娅派义愤填膺。\n\n帝国本就脆弱的内部团结正在加速瓦解。内战的阴影越来越近了。"
 TIA.23.a: "这个帝国到底有多少水神！？"
 TIA.23.b: "冷静……也许可以利用两位“女神”之间的矛盾"
 TIA.23.a_tt: "§R芙卡洛斯的出现将帝国的宗教分裂推到了临界点。内战似乎已不可避免§!"
 TIA.23.b_tt: "在混乱中寻找机会——如果能让两位“女神”互相制衡，帝国或许还有一线生机"

###################################
 # 米雅贝儿线 (TIA.24-26)
 ###################################

 TIA.24.t: "贵族们的冷眼"
 TIA.24.desc: "米雅贝儿发表了“帝国的明日”宣言之后，帝都的反应并不如她预想的那样热烈。旧贵族们在私人沙龙里冷嘲热讽，称她的改革宣言是“小女孩的过家家”。几个有实力的大贵族甚至公开拒绝出席皇室晚宴，以示对改革路线的不满。\n\n宫廷里弥漫着一种令人不安的沉默。侍女们窃窃私语，说上一位试图改革的皇族已经在断头台上变成了“失败的象征”。\n\n米雅攥紧了拳头。她比任何人都清楚失败的下场——毕竟她已经“见过”一次了。"
 TIA.24.a: "亲自逐一拜访，我会让他们看到我的诚意"
 TIA.24.b: "绕过贵族！去广场上直接对人民说话！"
 TIA.24.c: "让安妮去处理吧……她比我更擅长和这些人打交道"
 TIA.24.a_tt: "米雅放下皇族的架子逐一拜访贵族家宅，用她独有的方式——三分真诚七分演技——逐渐软化了最顽固的反对者"
 TIA.24.b_tt: "米雅站在帝都中央广场上，面对数千名平民发表了动情的演讲。贵族们的阻挠在民意面前显得苍白无力"

 TIA.25.t: "暗夜中的匕首"
 TIA.25.desc: "深夜，一个黑影潜入了皇宫的长廊。若非安妮恰好在附近巡视并及时呼救，那把涂了毒药的匕首已经刺进了米雅贝尔的卧室。\n\n刺客被当场制服，但拒绝交代幕后主使。帝都卫队在他身上发现了一枚已经被废弃的旧贵族纹章——这到底是真正的线索还是栽赃嫁祸？\n\n整个宫廷陷入了恐惧和猜疑。得到消息的米雅抱着膝盖坐在床上发抖——不是因为恐惧，而是因为愤怒。“不会再有断头台了，”她低声说，“不管是我的还是别人的。”"
 TIA.25.a: "彻查到底，每一个嫌疑人都不能放过"
 TIA.25.b: "公开宣布：“感谢某位好心人的警告，朕已知悉”"
 TIA.25.c: "借题发挥，该清洗的势力早就该清洗了"
 TIA.25.e: "民众在广场演说后自发收集情报，有人看到了刺客的面孔"
 TIA.25.d: "通过拜访时结识的线人追踪刺客"
 TIA.25.a_tt: "情报部门展开了大规模调查。数个旧贵族家族被牵连其中"
 TIA.25.b_tt: "米雅故意轻描淡写地处理了暗杀事件，展现了令贵族们始料未及的从容。幕后黑手反而变得惶恐不安"

 TIA.26.t: "诏令的最后一条"
 TIA.26.desc: "王室诏令已经基本拟定完毕——机构改革、官僚清洗、税制调整——每一条都经过了反复斟酌。但在签署的最后时刻，米雅叫住了草拟文书的路德维希。\n\n“加一条”她说，“关于政治犯。”\n\n帝国监狱中关押着数百名因内战、宗教冲突和政治异见而入狱的囚犯。他们中有些是真正的罪犯，有些只是说错了话站错了队。米雅的日记里写着未来的帝国会如何对待这些人——但“那个”未来已经不存在了。\n\n现在，她需要自己做出决定。"
 TIA.26.a: "大赦天下，帝国需要每一双手来重建"
 TIA.26.b: "有条件释放，宣誓效忠者可获自由"
 TIA.26.c: "以调查中掌握的完整反叛名单为依据，赦免无辜者"

 ###################################
 # 爱丽丝·贝德福德线 (TIA.27-29)
 ###################################

 TIA.27.t: "学院长老会的围攻"
 TIA.27.desc: "爱丽丝在帝国学术院的演讲引发了轩然大波。长老会的六位院士联名发表公开信，称爱丽丝的“理性至上主义”是“对学术传统的亵渎”，并要求皇室撤回对她的任命。\n\n信中最刺耳的一句话是：“一个连魔法血脉都没有的平民女孩，凭什么指导帝国的科学方向？”\n\n爱丽丝读完公开信后露出了她标志性的冷淡微笑：“血脉无法推导公式，出身不能证明定理。如果他们想辩论——我随时奉陪。”"
 TIA.27.a: "在学术委员会上公开辩论，让数据说话"
 TIA.27.b: "以皇室令直接推行改革，学院那些老古董可以慢慢适应"
 TIA.27.c: "给长老们荣誉顾问头衔，让他们以为自己仍有影响力"
 TIA.27.a_tt: "爱丽丝在公开辩论中用一百二十七页数据报告让所有反对者哑口无言。她的名言被学生们传颂：'真理不需要血统'"

 TIA.28.t: "三号实验室爆炸事件"
 TIA.28.desc: "凌晨三点，帝国军事研究所三号实验室发生爆炸。原因是一组魔力增幅装置的参数校准失误导致能量反馈失控。\n\n事故造成两名研究员受伤，一台价值连城的原型设备被炸成碎片。更糟糕的是，爆炸声传遍了半个帝都，反对军事研究的舆论随即高涨。\n\n爱丽丝赶到现场时，消防队还在灭火。她蹲在废墟旁捡起一块烧焦的元件端详了很久，然后说了一句让所有人都安静下来的话：\n\n“失败的实验不是浪费，它排除了一条错误的道路。”"
 TIA.28.a: "爱丽丝亲自主持事故调查并重建安全规程"
 TIA.28.b: "不能给反对派递刀子"
 TIA.28.c: "追加预算，用更好的设备杜绝隐患"
 TIA.28.d: "联系在辩论后主动示好的学院同僚，共同调查事故原因"

 TIA.29.t: "第一件魔导原型机"
 TIA.29.desc: "经过无数次失败和改进，爱丽丝团队终于完成了帝国第一台实用型“魔导动力机关”——一台能将微量魔力转化为持续机械动力的装置。它不大，只有一个衣柜的大小，但它产生的动力足以驱动一整座小型工厂。\n\n当爱丽丝扳下启动开关的瞬间，实验室里所有人都屏住了呼吸。装置发出低沉的嗡鸣声，指示灯逐一亮起，输出功率表的指针稳稳地停在了预期值上。\n\n沉默了三秒后，实验室爆发出震耳欲聋的欢呼声。爱丽丝面无表情地记录下最后一个数据，然后——在没有人注意到的角落——她偷偷抹去了眼角的泪水。"
 TIA.29.a: "公开展示——让帝国所有人都看看科学的力量！"
 TIA.29.b: "列为最高机密——这是帝国未来的军事优势"
 TIA.29.c: "向友好国家出售部分技术——用金钱加速下一阶段研究"

 ###################################
 # 安妮·利特斯坦线 (TIA.30-32)
 ###################################

 TIA.30.t: "空荡的粮仓"
 TIA.30.desc: "安妮在帝国南部巡视救济粮分配站时发现了令人心寒的真相：中央拨付的救济粮只有不到四成真正到达了灾民手中。其余的被层层截留——地方官员克扣了一些，运输商吃掉了一些，甚至帝都的粮仓管理员都在暗中倒卖。\n\n当安妮打开一座本应装满粮食的粮仓大门时，空旷的库房里只有几只老鼠在发霉的角落里窜动。而在粮仓外的街道上，一群骨瘦如柴的孩子正用空洞的眼神注视着她。\n\n安妮当场哭了。然后她擦干眼泪，开始写第一份报告。"
 TIA.30.a: "让安妮亲赴灾区，每一袋粮食都要经过她的手"
 TIA.30.b: "先抓贪官，杀鸡儆猴！"
 TIA.30.c: "紧急从邻国采购粮食"
 TIA.30.a_tt: "安妮在灾区驻扎了整整三周，亲自监督每一批物资的分配。她的名字在南方成为了希望的代名词"

 TIA.31.t: "瘟疫村庄的抉择"
 TIA.31.desc: "公共卫生运动推进到帝国中部时遭遇了最严峻的考验。一座有两千人的村庄爆发了烈性瘟疫，帝国派出的医疗队在村口被拦下——村民们害怕外人会带来更多疾病。\n\n随行医生建议立即设立隔离区并禁止人员进出。但安妮从望远镜里看到了村里的景象——没有医生、没有药物、病人被家属放在街边等死。\n\n“隔离意味着我们可以保住外面的人，”医生说，“但里面的人……恐怕大部分都……”\n\n安妮放下望远镜，脱下了手套。"
 TIA.31.a: "安妮走进了疫区——“他们需要知道帝国没有放弃他们”"
 TIA.31.b: "设立隔离区并派驻军看守理性比感性更能救人"
 TIA.31.c: "军事强制隔离，必须立刻切断传播链"
 TIA.31.d: "利用在灾区建立的民间信任网络"
 TIA.31.e: "医疗改革建立的设施就在附近，隔离病房和巡医早已就位"
 TIA.31.a_tt: "安妮在疫区停留了十一天，亲手护理伤病者。当她平安走出村庄时，幸存的村民跪在路边失声痛哭。这个故事很快传遍了整个帝国"
 TIA.31.e_tt: "§G医疗改革建设的基础设施让安妮的公共卫生团队如虎添翼§!"

 TIA.32.t: "混乱的选票"
 TIA.32.desc: "地方议会选举的第一天就爆发了混乱。在帝国南部的一座城镇，三个不同派系的候选人各自宣布自己获胜。投票箱被打翻了两次，选票散落一地。一名贵族候选人的支持者公然恐吓平民选民，而另一方则雇佣了街头混混在投票站外“维持秩序”。\n\n安妮到达现场时，选举委员会的成员已经互相揪住了衣领。她深吸一口气，然后用一种所有人都没有听过的洪亮声音喊道：\n\n“够了！”\n\n全场安静了下来。"
 TIA.32.a: "维持秩序，承认选举结果，这就是民主，虽然混乱但真实"
 TIA.32.b: "选举无效，重新来过，但这次由帝国军队监督"
 TIA.32.c: "……承认贵族候选人的“胜利”，改革不能一步登天"
 TIA.32.d: "安妮的名望会让所有人安静下来"

 ###################################
 # 艾克莱尔线 (TIA.33-35)
 ###################################

 TIA.33.t: "军营里的对峙"
 TIA.33.desc: "艾克莱尔下达军纪整肃令的第三天，帝国东部军区的十七名军官联名上书，拒绝执行新规。他们的理由很直接：“我们跟随帝国打了二十年仗，一个年轻人凭什么来教我们带兵？”\n\n更糟糕的是，这十七名军官手下总共掌控着帝国近三分之一的现役兵力。如果他们真的铁了心要对抗中央，帝国可能面临又一次分裂。\n\n艾克莱尔读完联名信后只说了一句话：“备马。”\n侍从问：“要带多少人？”\n“我一个人去。”"
 TIA.33.a: "独自走进军营谈判"
 TIA.33.b: "逐一约谈——给他们面子，也给他们退路"
 TIA.33.c: "全部免职——从军校应届毕业生中提拔新军官"
 TIA.33.a_tt: "艾克莱尔只身步入叛意暗涌的军营，用一场两小时的即兴演讲和一次当场的徒手格斗挑战赢得了所有军官的沉默服从"

 TIA.34.t: "将军们的回信"
 TIA.34.desc: "统一指挥体系法令颁布后，帝国各地军事主官的回应陆续送达帝都。\n\n北部军区表示“完全服从中央”——但附带了一份长长的补偿清单。南部军区说“需要时间过渡”——翻译过来就是“我再拖拖看”。西部军区回了一封只有两个字的信：“不从。”而东部军区在艾克莱尔上次亲访之后保持了缄默，但情报显示他们正在悄悄加固防御工事。\n\n艾克莱尔把四封信摆在桌上看了很久，然后拿起笔——给每一位将军写了一封完全不同的回信。"
 TIA.34.a: "以利诱之——在新体系中给每位将军一个荣誉头衔"
 TIA.34.b: "以势迫之——调忠诚部队前往西部军区'例行检阅'"
 TIA.34.c: "最后通牒——三个月内移交指挥权，否则以叛国论处"
 TIA.34.d: "“铁娘子”的名号已经传遍全军，将军们的回信措辞变得恭敬了许多"

 TIA.35.t: "硝烟中的笑容"
 TIA.35.desc: "帝国新军的第一次大规模实弹演习在帝都北郊的练兵场举行。这是验证军事改革成果的关键时刻——如果新编部队无法协调配合，所有的改革都只是纸面文章。\n\n演习持续了整整一天。步兵、炮兵、装甲兵在统一指挥下完成了十二个战术课目。最后一个科目是全军联合突击——当冲锋号响起的那一刻，数千名士兵如同一架精密的机器般同时启动。\n\n演习结束时，观礼台上的各国武官面面相觑——三个月前还是一盘散沙的堤亚穆军队，什么时候变得如此令人生畏了？\n\n艾克莱尔站在练兵场上方的高台上，嘴角微微上扬。这是改革以来她第一次露出笑容。"
 TIA.35.a: "宣布演习圆满成功——让全帝国看看新军的面貌！"
 TIA.35.b: "一百零三处不足——真正的战场比这残酷十倍"

 ###################################
 # 迪欧娜线 (TIA.36-38)
 ###################################

 TIA.36.t: "帝都广场上的请愿者"
 TIA.36.desc: "民族整合局成立的第二周，帝都广场上出现了一支意想不到的队伍——来自帝国南部山区的少数民族代表团，二十三个人，带着手写的请愿书走了八天来到帝都。\n\n请愿书的内容很简单：他们请求帝国允许他们继续使用自己的语言教育下一代，保留传统的节日仪式，以及——最让人心酸的一条——“请不要砍掉我们村口那棵有三百年历史的祈祷树。”\n\n卫兵们不知道该怎么办，请示了三级上司之后，消息传到了迪欧娜耳中。"
 TIA.36.a: "迪欧娜亲自接见——“来，坐下，告诉我你们的故事”"
 TIA.36.b: "以法令回应——保障基本文化权利但强调帝国统一"
 TIA.36.c: "不予接见——帝国只承认一种身份"
 TIA.36.a_tt: "迪欧娜与代表团谈了整整一个下午。当她走出会议室时，她手里拿着一份修改了六遍的政策草案——其中有些内容是她原本没有想到的"

 TIA.37.t: "书院里的火焰"
 TIA.37.desc: "同化政策推行的第三个月，帝国西部一座历史悠久的少数民族书院遭到了纵火袭击。近千册用少数民族文字书写的古老文献在大火中化为灰烬——其中包括一些已知唯一的孤本。\n\n纵火者是一群自称“帝国净化者”的狂热青年，他们宣称“只有消灭劣等文化，帝国才能真正统一”。\n\n消息传到帝都时，迪欧娜正在翻阅一份关于语言统一政策的报告。她读完纵火事件的简报后，久久没有说话。\n\n“我推行同化政策是为了让所有人成为帝国公民，”她最终说道，“不是为了让某些人以此为借口烧毁别人的历史。”"
 TIA.37.a: "下令逮捕纵火者，设立文献保护专项基金"
 TIA.37.b: "私下处分肇事者——但不公开表态"
 TIA.37.c: "将此事定性为“文化统一进程中的个别过激行为”"
 TIA.37.a_tt: "迪欧娜亲自出席了书院的重建仪式，并宣布所有民族文献均受帝国法律保护。纵火者被判处重刑"
 TIA.37.d: "之前接见的少数民族代表主动提供了纵火者的线索"

 TIA.38.t: "意外的丰收"
 TIA.38.desc: "所有人——包括迪欧娜自己——都没有预料到边境自治实验会取得如此显著的成果。\n\n试点地区是帝国东北部一片长期动荡的多民族混居区。自治令颁布后，当地人自发组建了由各族代表组成的管理委员会。仅仅半年时间，该地区的税收上缴额增长了四成，治安事件下降了六成，而最令人惊讶的是——曾经水火不容的两个部族共同集资修建了一座跨河大桥。\n\n迪欧娜派出的观察员在报告中写道：'当人们被赋予管理自己命运的权力时，他们选择了合作而非对抗。这是我在帝国境内见过的最美丽的景象。'"
 TIA.38.a: "将自治经验推广到更多边境地区！"
 TIA.38.b: "一个成功案例不代表普遍适用"
 TIA.38.c: "“请来见证我们的成功”"

 ###################################
 # 路德维希线 (TIA.39-41)
 ###################################

 TIA.39.t: "面包与石头"
 TIA.39.desc: "财政紧缩令的后果比路德维希预想的来得更快也更猛烈。当帝都的面包价格在一周内上涨了三成后，市民的愤怒终于爆发了。\n\n数百名市民涌上帝都的商业大街，砸碎了三家官办商铺的橱窗，向巡逻的宪兵投掷石块。一位妇人抱着饥饿哭泣的婴儿站在路中央，声嘶力竭地喊着“你们先饿死我们的孩子，再拿我们的税金去填贵族的酒窖！”\n\n路德维希站在宫殿的窗前，面无表情地看着远处的烟雾。他的秘书紧张地问是否要修改政策。\n\n“不。”路德维希回答，“帝国没有破产的本钱。”"
 TIA.39.a: "“短痛好过长痛”"
 TIA.39.b: "在面包价格上做一点让步"
 TIA.39.c: "出动宪兵，不能让暴乱扩大"
 TIA.39.a_tt: "路德维希的铁腕态度引发了更多不满，但帝国的财务数字确实在好转——以民众的忍耐为代价"

 TIA.40.t: "贵族的口袋与帝国的金库"
 TIA.40.desc: "帝国债券发行的第一天，认购额几乎为零。路德维希精心设计的国债计划被贵族和商人们用沉默投了反对票。\n\n他派人调查后发现了令人咬牙切齿的真相：帝国最富有的二十个贵族家族名下的资产总额，是帝国年度财政收入的七倍。他们不是没有钱——他们只是把钱藏在了帝国的手伸不到的地方。\n\n路德维希在办公室里坐了一整夜。第二天早上，他的桌上放着三份方案。"
 TIA.40.a: "公开贵族们的资产清单，让全帝国看看谁在吸血"
 TIA.40.b: "提高国债利率到一个让贪婪者无法拒绝的水平"
 TIA.40.c: "皇室率先认购"
 TIA.40.d: "紧缩令的财务数字已经证明了一切"
 TIA.40.a_tt: "当路德维希在帝国议会上展开那份资产清单时，旁听席上的平民代表发出了愤怒的吼叫。次日，国债认购额暴涨"

 TIA.41.t: "暗夜中的毒酒"
 TIA.41.desc: "商会国有化法令签署后的第四天深夜，路德维希在批阅文件时随手喝了一口放在桌上的茶。他立刻感到嘴唇发麻，多年的警觉让他瞬间将茶杯推翻在地。\n\n侍卫闻声冲入时，路德维希正靠在椅子上剧烈咳嗽。帝国御医连夜赶来洗胃，确认茶水中被加入了一种罕见的慢性毒药——不会致命，但足以让人在数周内丧失思考和工作能力。\n\n“他们想让我变成废人，而不是烈士，”路德维希在病床上冷笑，“不错的手段。可惜他们低估了我喝茶的量——我只抿了一口。”\n\n三天后，他苍白着脸回到办公桌前。桌上放着商会残余势力的调查报告。"
 TIA.41.a: "“看来我踩到了正确的尾巴”"
 TIA.41.b: "顺藤摸瓜"
 TIA.41.c: "市民自发在他住所外通宵守卫"

 ###################################
 # 莉薇娅线 (TIA.42-44)
 ###################################

 TIA.42.t: "地下的秘密"
 TIA.42.desc: "帝都重建工程在皇宫东翼的地基施工中发现了意想不到的东西——一片被掩埋在地下十米深处的古代遗迹。工人们挖出了刻满未知文字的石板、已经锈蚀但仍可辨认的金属管道，以及一间保存出奇完好的地下密室。\n\n密室的墙壁上绘满了壁画，描绘着某种巨大的魔法装置——它的形状与帝国现存的任何技术都截然不同。考古学家初步判断，这片遗迹至少有五百年的历史——远早于帝国建国。\n\n莉薇娅赶到工地时，工程总监正焦急地等待指示：继续施工意味着毁掉遗迹，停工则意味着帝都重建的延期。"
 TIA.42.a: "暂停工程，这可能是改写帝国历史的发现"
 TIA.42.b: "做好记录和取样后继续施工，工期不能拖"
 TIA.42.c: "让尤蜜拉来看看，壁画上的东西也许不只是历史"
 TIA.42.a_tt: "考古发掘持续了两个月，出土了大量珍贵文物和技术图纸。学者们兴奋地宣称：这些古代知识可能为帝国的科技发展指明新方向"

 TIA.43.t: "铁路工人的愤怒"
 TIA.43.desc: "南北交通计划是帝国重建的动脉工程，但修建铁路的不是图纸和规划——是人。三万名工人在酷暑和严寒中日夜赶工，而他们收到的工资只有原定的六成。\n\n罢工在帝国中部的一座隧道工地首先爆发，随后像野火一样蔓延。三天之内，南北干线上超过半数的工地停工。工人代表们提出的要求很简单：足额工资、每周一天的休息日、以及“不要让我们像奴隶一样死在隧道里”。\n\n莉薇娅站在帝都的大比例尺工程地图前，标注着每一个停工工地的红色圆点几乎连成了一条线——恰好就是她精心规划的南北干线。"
 TIA.43.a: "和他们谈判，工人是帝国的脊梁，不是消耗品"
 TIA.43.b: "换人，帝国不缺劳动力"
 TIA.43.c: "军事接管，南北线是国家工程，不容中断"
 TIA.43.d: "利用古代遗迹中发现的工程技术，这样可以让隧道施工效率翻倍"
 TIA.43.a_tt: "莉薇娅在工地和工人代表谈了三天三夜。最终达成的协议不仅恢复了工资，还首次在帝国立法中确立了工人的基本权利保障"

 TIA.44.t: "烟囱冒烟了"
 TIA.44.desc: "帝国重建后的第一座全新工厂在帝都南郊正式投产。当高耸的烟囱第一次冒出浓烟时，围观的市民们爆发出了震耳欲聋的欢呼声——对于一个经历了瘟疫和饥荒的国家来说，一座工厂运转的声音比任何演讲都更有说服力。\n\n莉薇娅站在工厂门口，看着流水线上第一批产品缓缓下线，嘴角露出了久违的微笑。她回头看向身后的帝国旗帜——它在烟囱排出的热气中迎风飘扬，比以往任何时候都更有生命力。"
 TIA.44.a: "盛大典礼，邀请各国使节观礼，让世界看到帝国的重生"
 TIA.44.b: "低调投产，尽快出货才是正事"
 TIA.44.c: "工人们用热情回报了莉薇娅，第一座工厂比计划提前了两个月投产"


 ###################################
 # 尤蜜拉·多克尼斯线 (TIA.45-47)
 ###################################

 TIA.45.t: "深夜的魔力脉冲"
 TIA.45.desc: "魔力枯竭研究刚进入第二阶段就出现了超出预期的状况。帝国中部的魔力观测站记录到一次强烈的异常脉冲——方向指向帝都正下方。脉冲持续了整整十七秒，导致半个帝都的魔法灯具同时熄灭又同时亮起。\n\n尤蜜拉在第一时间赶到观测站。数据显示，这次脉冲的能量级别远超任何已知的自然魔力波动。更令人不安的是，脉冲的频率特征与古代文献中记载的某种“魔力回流”现象高度吻合——那些文献一直被学界认为是传说。\n\n“传说成真了，”尤蜜拉盯着跳动的数据说，“帝国的脚下埋着比我们想象中大得多的东西。”"
 TIA.45.a: "这正是我需要的数据！"
 TIA.45.b: "暂停实验，先确认没有危险"
 TIA.45.c: "秘密转移到地下实验室，这件事外界不能知道"
 TIA.45.a_tt: "尤蜜拉在异常脉冲的基础上推进了一系列突破性实验，魔力枯竭的成因正在被一步步揭开"

 TIA.46.t: "禁忌的边界"
 TIA.46.desc: "禁忌文献的复原工作进展到了最危险的部分。古代魔法师留下的记录中有一整个章节被用特殊墨水加密——解密后的内容让尤蜜拉的研究团队集体沉默了。\n\n那些记录详细描述了一种能够汲取生命力并将其转化为魔力的方法。理论上，这种技术可以彻底解决魔力枯竭问题——代价是需要持续消耗活物的生命能量。\n\n古代魔法师在记录的最后写了一行话：“我们最终放弃了这条路。不是因为它行不通，而是因为它太有效了。”\n\n尤蜜拉对着这行字沉思了很久。"
 TIA.46.a: "只研究可控的部分，禁忌就是禁忌"
 TIA.46.b: "深入研究，理解黑暗才能控制黑暗"
 TIA.46.c: "销毁这部分记录，有些知识不该被人类掌握"
 TIA.46.d: "脉冲研究中收集的安全边界数据，让尤蜜拉在接触禁忌知识时多了一道安全网"
 TIA.46.b_tt: "§Y尤蜜拉决定冒险深入禁区。她获得了强大的知识，但也打开了一扇可能无法关闭的门……§!"

 TIA.47.t: "当灯火亮起"
 TIA.47.desc: "帝国第一座魔导发电厂经过八个月的建设终于落成。它坐落在帝都郊外的一座山丘上，外观像是一座古典神殿与工厂的奇异混合体，尤蜜拉坚持保留传统魔法符文作为装饰，她说这是“对前人的敬意”。\n\n通电仪式在黄昏时分举行。当尤蜜拉扳下开关的那一刻，整座发电厂发出低沉而稳定的嗡鸣声。魔力被转化为电能，沿着新铺设的线路向帝都蔓延。\n\n一盏、两盏、十盏、百盏——帝都的街灯逐一亮起，像是黑暗中绽放的花朵。人群先是沉默，然后爆发出山呼海啸般的欢呼。\n\n尤蜜拉站在发电厂的屋顶上，俯瞰着灯火通明的帝都。在这一刻，她觉得自己所做的一切都是值得的。"
 TIA.47.a: "让灯火照亮帝国的未来！"
 TIA.47.b: "先供军工，民用还能等待"
 TIA.47.c: "禁忌知识虽然危险，但它提供了一种前所未有的高效魔力转化方案"
 
 ###################################
 # 内阁线连锁事件 - 全部本地化
 ###################################

 ###################################
 # 后续事件 TIA.48-63
 ###################################

 # --- 米雅 48: 亲访贵族的回报 ---
 TIA.48.t: "老狐狸们的让步"
 TIA.48.desc: "米雅贝尔的逐一拜访策略比任何人预想的都更有效。在她离开最后一位大贵族的宅邸后不到一周，三个原本最激烈的反对派家族向皇室递交了“合作意向书”——用词极尽谦卑。\n\n更重要的是，在拜访过程中，米雅贝尔敏锐地注意到某些贵族之间关系的微妙裂痕。她在日记里详细记录了这些信息——这些“谁看谁不顺眼”的情报，将在未来的政治博弈中成为比任何军队都更锐利的武器。"
 TIA.48.a: "……我才不是在搞阴谋呢"
 TIA.48.a_tt: "§G贵族网络中的情报将在未来的危机中提供关键优势§!"

 # --- 米雅 49: 广场演说的浪潮 ---
 TIA.49.t: "皇女殿下万岁！"
 TIA.49.desc: "米雅贝尔在帝都广场的那场演说引发了意想不到的连锁反应。市民们自发组织了“支持皇女改革”的请愿运动，短短三天内就征集到了超过两万个签名。更令人意外的是，帝国各地开始出现模仿米雅演说风格的民间集会——人们站在村口的广场上，谈论着帝国的未来。\n\n原本只关心生计的平民百姓，第一次开始关心“帝国该往何处去”这样的问题。而米雅的名字，成为了这场觉醒的象征。\n\n一位老兵对路过的宪兵说：“二十年前有人许诺给我们面包，我们上了战场。这一次，这个女孩许诺给我们希望，我觉得她是认真的。”"
 TIA.49.a: "这些签名比一千支军队更有力量"
 TIA.49.a_tt: "§G民间的改革热情转化为了实际的人力和物力支持§!"

 # --- 米雅 50: 彻查暗杀的收获 ---
 TIA.50.t: "蛛网之下"
 TIA.50.desc: "历时数周的彻底调查终于拼凑出了暗杀事件的全貌——这不是某个心怀不满的贵族的独立行动，而是一个横跨帝国南北的反改革网络。情报部门追踪到了资金流向、联络暗号、甚至一份标注了“下一步行动目标”的名单。\n\n令人毛骨悚然的是，名单上不仅有米雅贝尔皇女，还有米雅陛下、安妮、路德维希和艾克莱尔的名字。他们原本计划在三个月内逐一除掉所有改革派核心人物。\n\n这些证据是一把双刃剑——公布可以彻底瓦解反对派的信心，但也可能引发恐慌。留在手中则是一张无价的政治底牌。"
 TIA.50.a: "公布一切"
 TIA.50.b: "底牌只有在不亮出来的时候才最有价值"

 # --- 米雅 51: 从容应对的意外 ---
 TIA.51.t: "意想不到的效忠"
 TIA.51.desc: "米雅以皇族少有的优雅和从容处理暗杀事件后，宫廷中出现了微妙的转变。原本态度暧昧的中间派贵族开始一个接一个地向皇室表示“坚定的效忠”。\n\n一位资深外交官私下对路德维希说：“这个女孩在刺客的匕首面前表现出的镇定，比她父辈在战场上的勇气更令人敬畏。追随一个不会被恐惧击倒的人——这是值得的。”\n\n米雅在日记中写道：“他们以为我很勇敢，其实我只是已经知道了被吓到的后果（断头台），所以选择了不被吓到。这算勇气吗？我觉得这只是计算。”"
 TIA.51.a: "……果然还是我最聪明"
 
 # --- 爱丽丝 52: 辩论后的学术改革潮 ---
 TIA.52.t: "理性的胜利"
 TIA.52.desc: "爱丽丝在公开辩论中的压倒性胜利产生了远超学术圈的影响。帝国各地的年轻学者纷纷上书，请求加入她的研究计划。更值得注意的是，长老会中有两位院士在沉默数日后主动拜访了爱丽丝的实验室——他们没有带来抗议书，而是带来了自己数十年的研究笔记。\n\n“真理确实不需要血统，”其中一位老院士说，“但它需要时间。希望你能比我们走得更远。”\n\n爱丽丝第一次在他人面前露出了真正的笑容——不是冷淡的、防御性的笑，而是一个孩子收到认可时的笑。"
 TIA.52.a: "趁热打铁，现在是改组学术院的最佳时机"
 TIA.52.b: "不需要赶尽杀绝，他们已经迈出了第一步"

 # --- 安妮 53: 安妮在南方的名望 ---
 TIA.53.t: "“安妮大人的粮队来了！”"
 TIA.53.desc: "安妮在帝国南部驻扎三周亲自监督粮食分配的消息传开后，“安妮”这个名字在灾区成为了近乎神圣的存在。村民们开始用她的名字为新生儿命名，集市上出现了印着她肖像的廉价版画——画功虽然惨不忍睹，但每一幅都被视若珍宝。\n\n更实际的影响是：安妮建立的直接分配体系打破了地方官员对物资的垄断。那些被她当场撤职的贪腐官员成了反面典型，新任命的官员再也不敢伸手。\n\n安妮返回帝都时，沿途数千民众夹道欢送。她坐在马车里红着眼睛——不是因为感动，而是因为她知道还有太多地方需要她。"
 TIA.53.a: "这就是改革的意义，每一个被救下的人都是帝国的力量"

 # --- 安妮 54: 安妮走出疫区 ---
 TIA.54.t: "活着走出来的圣女"
 TIA.54.desc: "安妮在疫区停留了十一天。她亲手为病人换药、清洗伤口、分配仅有的药物。第七天的时候她自己也出现了轻微的发热症状——随行的医生恳求她立刻撤离，但她拒绝了。\n\n“如果我现在走了，他们会觉得连帝国都放弃了他们。”她说。\n\n第十一天，疫情出现了转机。当安妮终于走出村庄时，幸存者——只剩下最初人数的一半——跪在泥泞的村口失声痛哭。一个小女孩拉住了安妮的衣角，递给她一朵歪歪扭扭的野花。\n\n这个故事在一个月内传遍了整个帝国。民间开始称安妮为“帝国的圣女”——一个她坚决不肯接受的称号。"
 TIA.54.a: "安妮的事迹将成为帝国新的精神图腾"
 TIA.54.b: "将疫区经验编写成《防疫手册》"

 # --- 艾克莱尔 55: 单骑赴营之后 ---
 TIA.55.t: "“铁娘子”艾克莱尔"
 TIA.55.desc: "艾克莱尔独自走进叛意暗涌的军营之后究竟发生了什么，至今众说纷纭。最流行的版本是：她当场向十七名军官发起了一对一的格斗挑战——“谁打赢我，谁就可以不服从命令。”\n\n没有人打赢她。\n\n更可靠但不那么戏剧性的版本是：她用两个小时的演讲让所有人意识到，继续内斗只会让帝国在外敌面前更加脆弱。演讲结束后，她摘下佩剑放在桌上说：“如果你们仍然不服——现在就可以杀了我。”\n\n沉默持续了整整一分钟。然后，十七名军官中资历最老的那位站起来，向她敬了一个标准的帝国军礼。\n\n“铁娘子”的名号从此传遍全军。"
 TIA.55.a: "从今天起——帝国军只有一个声音"

 # --- 迪欧娜 56: 接见后的灵感 ---
 TIA.56.t: "祈祷树下的启示"
 TIA.56.desc: "与少数民族代表的谈话深深触动了迪欧娜。那天晚上，她独自在办公室里重新审视了整个民族政策的框架——代表们说的一句话在她脑海中反复回响：\n\n“我们不怕成为帝国的一部分。我们怕的是成为帝国的一部分之后，就不再是我们自己了。”\n\n迪欧娜突然意识到，“整合”不等于“同化”。一个真正强大的帝国不需要抹去差异——它需要的是让所有不同的声音都能在同一面旗帜下找到自己的位置。\n\n她连夜起草了两份备选方案。"
 TIA.56.a: "设立帝国多元文化基金——保护每一棵“祈祷树”"
 TIA.56.b: "以法律确立各族平等地位"

 # --- 迪欧娜 57: 文献保护的涟漪 ---
 TIA.57.t: "灰烬中的新芽"
 TIA.57.desc: "文献保护令颁布后的三个月，发生了一件让所有人意外的事——帝国各地的少数民族社区开始自发向帝都寄送他们珍藏的古老文献抄本，请求帝国图书馆代为保管。\n\n“与其让它们在某一天被另一场大火吞噬，”一位部族长老在附信中写道，“不如让它们在帝国的屋檐下安全地活下去。这是对迪欧娜大人的信任。”\n\n帝国图书馆的少数民族文献专区在半年内收藏了超过三千册珍贵文献。学者们惊喜地发现，其中许多包含着失传已久的农业技术、天文观测记录和医学知识——这些知识不仅属于某个民族，更是整个帝国的财富。"
 TIA.57.a: "从灰烬中诞生的信任"

 # --- 路德维希 58: 紧缩令的数据 ---
 TIA.58.t: "数字不会说谎"
 TIA.58.desc: "紧缩令实施两个月后，路德维希拿到了第一份完整的财务报告。数字冰冷而清晰：帝国财政赤字收窄了百分之四十二，国库结余首次出现正数，拖欠的军饷已全额补发。\n\n面包价格也开始回落——不是因为路德维希心软了，而是因为财政稳定后，粮食供应链自然恢复了效率。那些在暴动中砸碎橱窗的市民，现在排队在同一家商铺前购买比暴动前更便宜的面包。\n\n路德维希把报告放在桌上，破天荒地给自己倒了一杯酒。他不喝酒——但今天值得例外。"
 TIA.58.a: "让数字堵住所有质疑者的嘴"
 TIA.58.b: "数字给自己看就够了"

 # --- 路德维希 59: 公开账簿的地震 ---
 TIA.59.t: "贵族的冬天"
 TIA.59.desc: "公开贵族资产清单的后果远比路德维希预想的更为剧烈。帝国议会的旁听席上爆发了近乎暴动的愤怒——平民代表们要求“让吸血鬼把偷走的钱吐出来”。\n\n面对排山倒海的舆论压力，贵族们分裂成了两派：一派匆忙认购国债以示合作，另一派开始秘密转移资产。路德维希对此早有预料——他已经让人封锁了所有对外资金通道。\n\n“想跑？”路德维希在办公室里整理文件时自言自语，“晚了。从你们第一天拒绝认购国债的时候，这盘棋就已经布好了。”"
 TIA.59.a: "趁热打铁，推行贵族财产税"
 TIA.59.b: "他们已经学到了教训"

 # --- 莉薇娅 60: 遗迹的重大发现 ---
 TIA.60.t: "五百年前的蓝图"
 TIA.60.desc: "考古发掘持续了将近两个月，出土文物的数量和价值远超预期。最令人震惊的发现是一套完整的古代城市供水系统蓝图——用一种已经失传的合金制成的管道，即使埋在地下五百年依然完好无损。\n\n工程学家们对蓝图进行了详细分析后得出了一个令人难以置信的结论：古代人的供水系统在效率上比帝国现有的技术高出近三倍。如果能复原这种合金的配方，帝国的基础设施建设将获得质的飞跃。\n\n莉薇娅站在出土的古代石板前沉思良久：“两千年前，这片土地上曾经存在过一个更先进的文明……它为什么消失了？”"
 TIA.60.a: "将这些古代蓝图应用到南北交通计划中"
 TIA.60.b: "建立帝国考古博物馆陈列这些珍贵文物"

 # --- 莉薇娅 61: 工人权利法案的涟漪 ---
 TIA.61.t: "铁路工人的回礼"
 TIA.61.desc: "莉薇娅与工人代表达成的协议在帝国引发了广泛关注——这是帝国历史上第一次以正式法律形式确立工人的基本权利。足额工资、休息日、安全保障——这些在过去被视为“奢侈要求”的条件，现在成了白纸黑字的法律条文。\n\n工人们的回应出乎所有人的意料：罢工结束后的第一个月，南北干线的施工进度不仅恢复了正常，还超额完成了百分之十五的工程量。工人们自发延长工时——不是因为被逼迫，而是因为他们觉得“莉薇娅大人值得我们卖力”。\n\n一位工头在工地日志上写道：“她把我们当人看。我们要让她看到，人能做到什么。”"
 TIA.61.a: "这才是帝国应有的样子"

 # --- 尤蜜拉 62: 脉冲数据突破 ---
 TIA.62.t: "帝都之下的心脏"
 TIA.62.desc: "对异常魔力脉冲的深入研究取得了突破性进展。尤蜜拉的团队通过三角定位确认：脉冲的源头位于帝都正下方约三百米深处——那里存在着一个巨大的、仍在活动的古代魔力核心。\n\n这个核心的魔力输出量相当于帝国已知的所有魔力水晶矿的总和。它不是天然形成的，而是人工制造的——五百年前的某个文明创造了这件不可思议的造物，然后出于未知的原因将它深埋地下。\n\n“它还活着，”尤蜜拉喃喃自语，“两千年了，它还在运转。这意味着……要么它的设计远超我们的理解，要么……”\n\n她没有说完那个“要么”。"
 TIA.62.a: "继续深入"
 TIA.62.b: "暂时封锁数据，在确认安全之前不能冒险"

 # --- 尤蜜拉 63: 深入禁区的代价 ---
 TIA.63.t: "尤蜜拉的眼睛"
 TIA.63.desc: "深入研究禁忌文献中的生命力转化术三周后，尤蜜拉身上出现了令人不安的变化。\n\n首先是她的瞳色——原本的黑色逐渐变成了淡紫色，在黑暗中甚至能隐约发光。然后是她的感知能力——她开始能够“看见”空气中的魔力流动，就像普通人看见灰尘在阳光下飞舞。\n\n研究团队的其他成员注意到了这些变化，恐惧开始在实验室中蔓延。有人私下说她正在“变成什么不是人的东西”。\n\n尤蜜拉对着镜子看了很久自己变了色的眼睛。她知道自己正走在一条无法回头的路上——但她也知道，如果不继续走下去，帝国可能永远找不到解决魔力枯竭的答案。\n\n“如果代价只是一双眼睛的颜色，”她说，“那太便宜了。”"
 TIA.63.a: "继续前进"
 TIA.63.b: "立刻封印研究，不值得拿人性去冒险"

 ###################################
 # 瘟疫防线联动系统 - 完整本地化
 ###################################

 TIA.64.t: "第一座隔离病房"
 TIA.64.desc: "医疗改革启动两个月后，路德维希递交了第一份进度报告。好消息是：帝都贫民区的排水系统已经初步改造完毕，三座临时诊疗站开始运营，死于传染病的人数下降了两成。\n\n坏消息是：这远远不够。米雅翻开日记，她清楚地记得“那个”未来里瘟疫爆发的规模——仅靠帝都的改善无法阻止一场席卷全国的灾难。\n\n“我们需要做得更多，”米雅对路德维希说，“瘟疫不会是从帝都开始的，任何地方都有可能。”\n\n路德维希推了推眼镜：“那就意味着更大的投入。殿下需要选择：我们的资源有限，重点放在哪里？”"
 TIA.64.a: "建设隔离病房网络，在每个主要城镇设立隔离设施"
 TIA.64.b: "培训乡村巡医，把医生派到最偏远的村庄去"
 TIA.64.c: "基础卫生消毒就够了,省下的钱投入其他改革"
 TIA.64.a_tt: "§G在帝国各主要城镇建立隔离病房网络。一旦瘟疫出现，可以在第一时间隔离患者，阻断传播链§!"
 TIA.64.b_tt: "§G培训并派遣两百名乡村巡医。他们将成为帝国的“疫情哨兵”——在瘟疫扩散之前就发出预警§!"
 TIA.64.c_tt: "§Y基础消毒措施能提供一定的保护，但面对大规模疫情可能力不从心……§!"

 TIA.65.t: "南方来的坏消息"
 TIA.65.desc: "公共卫生运动全面铺开后不久，安妮收到了一份令人不安的报告：帝国南部边境的一座小镇出现了多例不明原因的高热病例。症状与矿石病的早期表现惊人地相似。\n\n如果这真的是矿石病——那么帝国的医疗防线即将迎来第一次真正的考验。\n\n安妮立刻召集了卫生运动的核心团队。现在的问题是：之前投入的医疗基础设施，能不能在关键时刻发挥作用？"
 TIA.65.a: "隔离协议启动！立即封锁病例所在区域"
 TIA.65.b: "巡医已经在现场了！他们会处理的"
 TIA.65.c: "只能临时征用民房做隔离点……还来得及吗？"
 TIA.65.d: "什么医疗设施都没有……安妮只能带着她的团队徒手上阵"
 TIA.65.a_tt: "§G隔离病房网络在第一时间启动。患者被迅速转移至专业隔离设施，接触者被就地隔离观察。疫情扩散的速度大幅降低§!"
 TIA.65.b_tt: "§G乡村巡医体系在疫情爆发前三天就发出了预警！安妮的团队提前部署了消毒和隔离措施，将疫情扼杀在了萌芽阶段§!"
 TIA.65.c_tt: "§Y临时措施勉强凑效，但效率远不如专业隔离设施。疫情被控制住了，但付出了不必要的时间和人力代价§!"
 TIA.65.d_tt: "§R没有任何医疗基建的支撑，安妮的公共卫生团队只能靠最原始的方法对抗瘟疫。前方传来的报告越来越令人担忧……§!"

 TIA.66.t: "瘟疫来袭"
 TIA.66.desc: "南方的疑似病例在两周内扩散到了三个城镇——矿石病的诊断已被确认。米雅日记中记载的那场瘟疫，终于来了。\n\n但这一次，帝国不是毫无准备。\n\n各地的卫生站、隔离设施和医疗人员按照安妮制定的应急方案运转起来。每一天的疫情数据都被汇总到帝都，安妮和她的团队彻夜分析、调整策略。\n\n这是一场看不见硝烟的战争。没有旗帜，没有冲锋号，只有一份份报告、一瓶瓶消毒液、和一个个不眠不休的身影。\n\n三十天后，最后一例确诊病例痊愈出院。安妮合上报告，闭上眼睛，长长地呼出一口气。"
 TIA.66.a: "瘟疫被彻底挡住了！隔离网络证明了它的价值"
 TIA.66.b: "疫情被基本控制！但边远地区仍有零星病例"
 TIA.66.c: "总算熬过来了……但如果疫情更严重一些，后果不堪设想"
 TIA.66.a_tt: "§G帝国成功抵御了矿石病的侵袭！完善的隔离网络将死亡人数控制在了百人以内——在日记记载的那个未来里，这个数字是十万。瘟疫的阴影被一劳永逸地驱散了§!"
 TIA.66.b_tt: "§Y瘟疫的主要传播被切断，但帝国的医疗体系暴露出了覆盖面不足的问题。好消息是，最坏的情况没有发生§!"
 TIA.66.c_tt: "§Y帝国付出了沉重但可承受的代价控制住了疫情。瘟疫的威胁降低了，但并未完全消除§!"

 TIA.67.t: "《防疫手册》"
 TIA.67.desc: "安妮从疫区归来后做的第一件事，不是休息，而是把自己关在书房里整整五天。当她走出来时，手里拿着一叠厚厚的手稿——帝国历史上第一部系统性的防疫指导手册。\n\n这部手册不是凭空写成的。安妮在疫区亲眼所见的每一个病例、每一次成功或失败的救治，都被她转化为了清晰的操作流程。更重要的是，她将自己的实战经验与帝国现有的医疗基础设施进行了完美的结合。\n\n路德维希翻阅完手册后沉默了很久，然后说了一句：“即刻印刷三千份，发往帝国每一个行政单位。”"
 TIA.67.a: "隔离网络+安妮的实战经验 = 帝国最坚固的防疫体系"
 TIA.67.b: "乡村巡医+安妮的基层知识 = 深入村庄的医疗网"
 TIA.67.c: "安妮独力完成了这部手册——虽然缺少基建配合，但她的经验弥足珍贵"
 TIA.67.a_tt: "§G安妮的疫区经验与隔离病房网络的结合，创造了一套完整的帝国防疫体系。这套体系将在未来挽救无数生命§!"
 TIA.67.b_tt: "§G安妮将疫区的一线经验编入了乡村巡医的培训教材。帝国最偏远的村庄也将拥有基本的疫病应对能力§!"
 TIA.67.c_tt: "§Y安妮凭借个人的勇气和智慧完成了这部手册，但如果有更完善的医疗基础设施配合，它的效果将大大提升§!"

 TIA.68.t: "被划掉的命运"
 TIA.68.desc: "那天深夜，米雅独自坐在书房里，面前摊开着那本改变了一切的日记。\n\n她翻到了关于瘟疫的那几页——在“另一个未来”里，这场矿石病夺走了帝国十分之一人口的生命，摧毁了路德维希辛苦修复的财政，最终成为将她推上断头台的三块多米诺骨牌之一。\n\n米雅拿起笔，在那一页的顶端缓缓画了一个大大的“×”。\n\n“这一次，”她自言自语，声音有些颤抖，“瘟疫没有来。”\n\n她的眼泪滴落在墨迹上，将那个×晕染开来。但她没有擦——让它留在那里。作为证据。\n\n证据证明命运是可以改变的。"
 TIA.68.a: "“这一次……瘟疫没有来。”"
 TIA.68.b: "命运被改变了——虽然不完美，但足够了"
 TIA.68.a_tt: "§G米雅在日记上划去了瘟疫的章节。三块导致断头台的多米诺骨牌——财政崩溃、瘟疫肆虐、宗教分裂——现在只剩下两块需要解决§!"
 TIA.68.b_tt: "§Y瘟疫的威胁虽未完全消除，但已不再是致命的。米雅在日记上做了标注：'这一页，勉强算是改写了。'§!"

 TIA.69.t: "无准备之殇"
 TIA.69.desc: "矿石病的爆发速度远超安妮的预期。没有隔离病房、没有预警网络、没有足够的医疗人员——安妮的公共卫生团队在毫无基础设施支撑的情况下，被迫用最原始的方法对抗一场蔓延全国的瘟疫。\n\n帝国南部的三个省份在两周内陷入了地狱般的景象。安妮连续八天没有合眼，她的声音已经嘶哑到无法说话，只能用手写的便条指挥救援。\n\n当疫情终于在六周后开始消退时，安妮瘫坐在一座空荡荡的帐篷里。\n\n“如果我们有隔离病房……如果我们有巡医……如果有人在一切开始之前就做好了准备……”\n\n但没有人做好准备。而代价，由那些最脆弱的人承担了。"
 TIA.69.a: "安妮用血和泪换来了胜利，但帝国为此付出了惨痛代价"
 TIA.69.b: "向邻国紧急求援，药品和医生，不惜一切代价"
 TIA.69.c: "放弃重灾区，  把资源集中保护帝国核心地带"
 TIA.69.a_tt: "§R瘟疫最终被控制住了，但帝国失去了大量人口。这场灾难本可以避免——如果米雅当初选择了医疗改革§!"
 TIA.69.b_tt: "§R邻国的援助帮助帝国渡过了最危急的时刻，但帝国为此背上了沉重的外交债务§!"
 TIA.69.c_tt: "§R边境省份被放弃了。帝国保住了核心，但失去了灵魂的一部分§!"

 TIA.70.t: "废墟上的教训"
 TIA.70.desc: "瘟疫过后，帝国南部满目疮痍。安妮站在一座临时纪念碑前——上面刻着这场瘟疫的死亡人数。\n\n“我们现在有两个选择，”安妮在紧急内阁会议上说，“要么从废墟中建起一套真正的医疗体系。要么把一切资源投入军事，因为下一场灾难可能不是瘟疫，而是战争。”\n\n她顿了顿：“但无论选择哪一个——请记住今天。记住那些本不必死去的人。”"
 TIA.70.a: "从今天起建设帝国医疗体系"
 TIA.70.b: "把有限的资源投入军事"
 TIA.70.a_tt: "§Y从废墟中重建。虽然起步太晚，但安妮用鲜血换来的经验将成为帝国医疗体系的基石§!"

 ###################################
 # 枫丹危机事件链
 ###################################

 # FON侧事件
 TIA.71.t: "帝国的目光"
 TIA.71.desc: "帝国开始对枫丹局势进行正式评估的消息已经传到了刺玫会的耳中。这意味着枫丹问题已经从帝国的“次要关切”升级为“需要专门处理的议题”。刺玫会必须做好准备——无论帝国的结论是怀柔还是铁拳，枫丹都将面临一场改变命运的考验。"
 TIA.71.a: "命运掌握在自己手中"

 # 怀柔线——谈判
 TIA.72.t: "刺玫会的条件"
 TIA.72.desc: "谈判桌上，刺玫会代表团提交了一份“枫丹人民诉求清单”。清单长达十二页，核心要求包括：扩大议会立法权、设立枫丹地方军、独立的财政预算、外交事务上的“协商权”、以及——最敏感的——“枫丹民族自决权”。最后一条虽然没有直接说独立，但其含义不言而喻。帝国代表团需要决定谈判策略。"
 TIA.72.a: "逐条讨论，表示帝国愿意倾听每一个诉求"
 TIA.72.b: "直接划定底线，自决权不在讨论范围内"
 TIA.72.c: "亮出独立路线图，让他们知道我们什么都清楚"
 TIA.72.a_tt: "诚恳的态度将赢得温和派的好感，但谈判过程会更加漫长"
 TIA.72.b_tt: "底线清晰可以避免不必要的拖延，但也可能让激进派有借口退出谈判"
 TIA.72.c_tt: "§Y独立路线图的曝光将让刺玫会陷入内部危机。温和派会与激进派划清界限。§!"

 # 文化保护法的反响
 TIA.73.t: "枫丹的感谢"
 TIA.73.desc: "《枫丹文化保护法》颁布后，枫丹庭的反应出乎帝国官员的意料。普通市民们自发组织了一场感谢游行——不是刺玫会策划的政治游行，而是真正发自内心的民间庆祝。老人们在街头流泪，感慨“终于有人把我们当人看了”；年轻艺术家们在广场上即兴演奏枫丹传统音乐；甚至有些原本同情刺玫会激进派的年轻人开始动摇。帝国驻军的士兵们第一次在枫丹街头收到了市民递来的面包和水。"
 TIA.73.a: "民心比城墙更坚固"

 # 议会改革后的辩论
 TIA.74.t: "枫丹议会的首次自由辩论"
 TIA.74.desc: "改革后的枫丹议会召开了第一次公开辩论。温和派代表主张“在帝国框架内争取最大权益”，激进派代表则坚持“没有真正的自治就没有真正的尊严”。辩论在全枫丹进行了现场转播——这本身就是前所未有的。帝国情报部门密切关注着辩论的走向和民众的反应……"
 TIA.74.a: "温和派占了上风，枫丹人民选择了理性"
 TIA.74.b: "激进派仍有市场，和解之路还很漫长"
 TIA.74.a_tt: "温和派在民意测验中获得了多数支持。枫丹正在转向"
 TIA.74.b_tt: "激进派虽然没有获胜，但他们的声音足以让帝国警醒——工作还远未完成"

 # 和解仪式
 TIA.75.t: "历史性的握手"
 TIA.75.desc: "在帝都举行的和解仪式上，米雅与枫丹议会议长当着数千名观众和各国使节的面握手，共同签署了《堤亚穆-枫丹合作宣言》。宣言确认枫丹的自治地位、文化保护、经济合作和政治参与将以帝国法律永久保障。枫丹议长在致辞中说：“我们曾经以为自由意味着分离，如今我们知道，真正的自由可以在合作中绽放。”全场起立鼓掌。"
 TIA.75.a: "这是帝国外交的最高成就"
 TIA.75.a_tt: "§G和解仪式的消息传遍了整个大陆。各国对堤亚穆的和平解决能力印象深刻。§!"

 # 铁腕线——撤销自治
 TIA.76.t: "枫丹的怒吼"
 TIA.76.desc: "撤销自治权的消息传到枫丹后，整座城市仿佛被点燃了。刺玫会总部升起了枫丹旧旗帜——那面在帝国法律中已经被禁止的旗帜。数万人涌上街头，不分温和派激进派，所有人都被帝国的决定激怒了。帝国驻军紧急关闭了城门，驻军指挥官请求增援。帝都收到了来自枫丹总督的紧急电报：全文只有一句话——“一切谈判的可能性已经关闭。”"
 TIA.76.a: "收到。准备迎接风暴。"
 TIA.76.a_tt: "§R枫丹的温和派也加入了抗议行列。帝国在枫丹已经没有政治盟友了。§!"

 # 军管——冲突
 TIA.77.t: "检查站事件"
 TIA.77.desc: "军管令实施后的第三周，帝国在枫丹内城设立的检查站发生了一起严重事件。一名帝国士兵在检查一位枫丹老人的身份证件时发生争执，推搡中老人倒地受伤。围观的枫丹市民当场群情激愤，与驻军发生了冲突。事件虽然被迅速控制，但消息通过地下渠道传遍了整个枫丹。刺玫会将这位老人塑造成“帝国暴政的受害者”，他的受伤照片被印成传单到处散发。"
 TIA.77.a: "严惩肇事士兵并公开道歉，军纪不能动摇"
 TIA.77.b: "宣布宵禁扩大至全天，减少军民接触"
 TIA.77.c: "从北方调来新部队替换现有驻军，消除积怨"

 # 清剿——最后据点
 TIA.78.t: "玫瑰的最后荆棘"
 TIA.78.desc: "清剿行动摧毁了刺玫会的大部分组织网络，但一小股核心成员退缩到了枫丹郊外的群山中，利用当地人的同情和熟悉的地形建立了最后的据点。帝国侦察兵已经锁定了他们的位置——一座被改造成堡垒的旧矿山。据点内估计有200-300名武装人员和一批从枫丹军械库偷运出来的武器。"
 TIA.78.a: "集中兵力在一天之内解决战斗"
 TIA.78.b: "断绝补给线，等他们自行崩溃"
 TIA.78.c: "发出最后通牒，48小时内投降者可获从宽处理"
 TIA.78.a_tt: "强攻速度快但必然有伤亡"
 TIA.78.b_tt: "围困策略可以避免直接冲突，但需要耐心等待"
 TIA.78.c_tt: "最后通牒可能分化据点内部，并非所有人都愿意死战到底"

 TIA.79.t: "围困的结局"
 TIA.79.desc: "断绝补给线后的第四周，山中据点终于崩溃了。饥饿和疾病瓦解了顽抗者的意志，残余人员在一个凌晨举着白旗走出了矿洞。刺玫会激进派作为有组织的力量，到此为止。"
 TIA.79.a: "收容投降者，清查矿洞"

 # 直辖化——最终决定
 TIA.80.t: "枫丹的命运"
 TIA.80.desc: "刺玫会被清剿、驻军被强化、反抗力量被消灭——帝国对枫丹的铁腕已经锻造完成。现在，米雅面前摆着两份文件。一份是“枫丹并入帝国诏令”——枫丹将不再作为附属国存在，其领土将直接成为帝国本土的一部分。另一份是“枫丹特别行政区设立令”——枫丹保留名义上的政治实体，但实权完全归帝国任命的总督。前者干净利落但代价巨大，后者温和一些但可能留下后患。"
 TIA.80.a: "签署并入诏令——帝国版图上不再有“枫丹”这个名字"
 TIA.80.b: "签署特别行政区令——保留外壳，掏空内核"
 TIA.80.a_tt: "§R枫丹将被正式吞并。所有国家都会对此做出反应——绝大多数是负面的。§!"
 TIA.80.b_tt: "枫丹在名义上仍然存在，但帝国总督拥有一切实权。这比吞并温和，但治理成本更高。"

 # 独立战争
 TIA.81.t: "枫丹独立宣言"
 TIA.81.desc: "最坏的情况发生了。在帝国铁腕政策和阿库娅信仰压迫的双重刺激下，枫丹刺玫会在一个凌晨发表了独立宣言——宣布“枫丹人民不再承认帝国的宗主权，枫丹自即日起成为独立自由的国家”。几乎同时，枫丹各城的帝国驻军遭到了有组织的袭击。枫丹地方部队倒戈加入叛军，帝国旗帜在炮火中被撕下。这不是骚乱，这是战争。"
 TIA.81.a: "帝国不会容忍叛乱，调集大军平叛！"
 TIA.81.a_tt: "§R枫丹独立战争爆发！帝国必须用武力夺回失去的领土。§!"

 # 穆露奈依特反应
 TIA.82.t: "来自北方的声音"
 TIA.82.desc: "穆露奈依特通过外交渠道发表了一份措辞精心的声明，对帝国在枫丹的军事行动表示“严重关切”。声明没有直接谴责帝国，但呼吁“各方保持克制，通过对话解决分歧”——这在外交语言中等同于公开批评。更令人不安的是，穆露奈依特的北方边境驻军最近进行了一次“例行调动”。帝国情报部门怀疑这是在试探帝国的战略注意力是否被枫丹牵扯。"
 TIA.82.a: "记下这笔账——穆露奈依特的“关切”不会被遗忘"
 TIA.82.a_tt: "穆露奈依特正在利用枫丹危机试探帝国的虚实"

 # ====== Inspection Events (83-86) ======
 
 TIA.83.t: "巡察报告：贝尔曼子爵领"
 TIA.83.desc: "巡察使在贝尔曼子爵领待了整整一个月，带回了一份出人意料的报告。\n\n贝尔曼子爵——那个在静海森林事件中预感到自己将名声大噪的精明小贵族——实际上已经在悄悄向帝国靠拢。他主动将领地税收的三成上缴帝国财政（尽管法律只要求两成），并允许帝国驻军通过其领地时免费补给。\n\n“子爵大人说了，”巡察使在报告末尾写道，“皇女殿下让我建了皇女镇，皇女镇让我发了财和赚了名声。我不是傻子，站在赢家那边永远不会亏。”\n\n路德维希评价：“贝尔曼不是忠臣，但他是个聪明人。聪明人比忠臣好对付。”"
 TIA.83.a: "记下了，贝尔曼子爵应该是最容易整合的目标"
 TIA.83.a_tt: "§G贝尔曼子爵态度合作。巡察评估：整合难度低，预计无武力抵抗§!"
 
 TIA.84.t: "巡察报告：鲁多路冯伯爵领"
 TIA.84.desc: "鲁多路冯伯爵的领地规模是四个爵位领中最大的。伯爵本人与米雅有过粮食储备合作的交情，态度不算敌对，但也绝谈不上欢迎。\n\n巡察使报告中最引人注目的是一个细节：伯爵领内部正在经历一场权力交接。年迈的伯爵逐渐将事务移交给长女迪欧娜——而迪欧娜的弟弟塞洛目前正在帝国学院就读。\n\n“伯爵本人是个守旧派，”巡察使分析道，“但迪欧娜小姐受过帝都教育，对中央集权的抵触不如其父，并且和陛下私交甚好。如果能利用这一代际差异……”\n\n路德维希画了一条时间线：“伯爵还能撑多少年？”\n巡察使：“最乐观估计，五到八年。”"
 TIA.84.a: "鲁多路冯家族的代际交替是一个机会窗口"
 TIA.84.a_tt: "§Y鲁多路冯伯爵态度保守但非敌对。下一代继承人可能更容易合作。整合难度：中等§!"
 
 TIA.85.t: "巡察报告：多克尼斯伯爵领"
 TIA.85.desc: "多克尼斯伯爵领的巡察报告只有薄薄几页——因为巡察使到达领地后发现，需要调查的东西远比预想的少。\n\n原因很简单：现任多克尼斯女伯爵尤蜜拉·多克尼斯，也就是帝国魔学首席，常年住在帝都。她对领地事务的管理方式可以用一句话概括——“全权委托给管家，别来烦我做研究。”\n\n巡察使在报告中写道：“多克尼斯伯爵领的日常行政完全由首席管家和家臣团运转。尤蜜拉大人每季度会审阅一次财务报表——据管家说，她通常只看五分钟就签字了。领地唯一一项由尤蜜拉大人亲自批准的预算，是地下魔力结晶矿脉的研究经费。”\n\n路德维希合上报告，表情微妙：“所以我们要做的事情是——让一位对自己领地毫无兴趣的内阁同僚，交出一块她本来就不怎么在意的土地？”\n\n米雅点了点头：“听起来应该很简单……？”\n\n“问题不在尤蜜拉，”路德维希说，“问题在于那个管了三代人的首席管家。对他来说，领地就是一切。”"
 TIA.85.a: "尤蜜拉本人不会有异议——真正的变数是家臣团"
 TIA.85.a_tt: "§G尤蜜拉·多克尼斯身为帝国内阁魔学首席，对领地几乎没有留恋。真正的阻力来自世代效力的家臣团。整合难度：低（对尤蜜拉），中等（对家臣团）§!"
 
 TIA.86.t: "巡察报告：阿修巴顿伯爵领"
 TIA.86.desc: "阿修巴顿伯爵领的巡察报告让路德维希忍不住笑了一声——这大概是他处理政务以来笑得最轻松的一次。\n\n现任阿修巴顿伯爵派翠克·阿修巴顿，同时也是尤蜜拉·多克尼斯的伴侣，此刻正坐在路德维希对面的椅子上，手里端着一杯茶。\n\n“巡察使不用派了，”派翠克说，语气温和得像是在讨论今天的天气，“我直接把领地的账本带来了。”\n\n他从公文包里取出一叠装订整齐的文件——财政收支、人口统计、驻军编制、基础设施清单——分门别类，标注清晰，甚至连领地内每一条主要道路的维护状况都有记录。\n\n路德维希翻了几页，抬头看向派翠克：“……你是不是早就准备好了？”\n\n派翠克微微一笑：“自从殿下开始推行集权改革，我就知道这一天迟早会来。与其被动等待，不如主动准备——这样至少可以确保领地里的人得到妥善安置。”\n\n他顿了顿，补充道：“不过有一件事需要商量——领地里有几位服务了很久的老管家，如果能给他们安排帝国的行政职位，移交会更加顺利。”"
 TIA.86.a: "派翠克已经把一切都准备好了，这是最省心的一个"
 TIA.86.a_tt: "§G派翠克·阿修巴顿主动配合，甚至提前准备了完整的移交材料。唯一需要处理的是老家臣的安置问题。整合难度：极低§!"
 
 # ====== Negotiation Event (87) ======
 
 TIA.87.t: "谈判桌上的博弈"
 TIA.87.desc_VBC: "贝尔曼子爵如约来到了帝都。与其他贵族不同，他没有带随从、没有带律师、甚至没有带剑——只带了一份精心准备的“合作提案”和一个算盘。\n\n“殿下，”贝尔曼子爵开门见山，“您想要我的领地，我想要继续赚钱。这两件事并不矛盾。”他摊开提案：“领地可以交，税收可以交，军队可以交——但我要帝国特许贸易商的头衔，以及皇女镇十五年的独家经营权。”\n\n路德维希低声说：“他在讨价还价。”\n米雅心想：至少他愿意卖。"
 TIA.87.desc_CLV: "鲁多路冯伯爵没有亲自前来——他派了长女迪欧娜代为出席。这本身就是一个微妙的信号。\n\n迪欧娜行礼时举止得体，谈吐间偶尔流露出在帝都求学时养成的习惯。她带来了伯爵的立场：领地可以分阶段移交，但需要保障伯爵家族的世袭荣誉和领地内的经济利益。\n\n“父亲大人年事已高，”迪欧娜说到一半时忽然顿住，似乎在斟酌措辞，“……他希望这些变化能够体面地发生。”\n\n路德维希注意到迪欧娜说的是“变化”而不是“交出”——这个词的选择很有意思。"
 TIA.87.desc_CDK: "谈判地点在帝都魔学研究院的会客室——因为尤蜜拉拒绝离开研究区域超过一百米。\n\n“领地的事，”尤蜜拉翻着手里的研究论文，头也不抬，“随便。”\n\n路德维希咳嗽了一声：“尤蜜拉大人，‘随便’不是一个正式的法律回应。我们需要您在移交协议上签字，并且——”\n\n“给我笔。”\n\n路德维希还没来得及说完条款，尤蜜拉已经拿起笔准备签了。派翠克温和但坚定地按住了她的手。\n\n“等一下，尤蜜拉。至少看一下内容。”\n\n“……太长了。有什么重要的你帮我看。”\n\n派翠克叹了口气，接过文件逐条审阅。十分钟后他提出了两点修改：一是保留尤蜜拉对领地地下魔力矿脉的研究优先权，二是妥善安置领地内服务多年的老家臣。\n\n路德维希看了看米雅。米雅点头。条件完全合理。\n\n但真正的问题不在这个房间里——而在数百里外的多克尼斯领地。首席管家得知消息后会作何反应，谁也说不准。"
 TIA.87.desc_CAB: "派翠克的“谈判”更像是一次友好的工作汇报。\n\n他带来了一份比巡察使报告还详尽的移交方案——时间表、人员安置、资产清算、甚至连领地府邸的钥匙归还流程都写得一清二楚。路德维希越看越沉默，最后放下文件说了一句：“……你确实是我见过最省心的谈判对手。”\n\n派翠克微微鞠躬：“这不是谈判。阿修巴顿家族效忠皇室，这只是一次程序上的确认。”\n\n他唯一的请求是：给领地内的老家臣们足够的时间和尊严来接受这个变化。“他们中很多人从祖父那一代就开始为阿修巴顿家族服务了。对他们来说，这不仅是失去工作——是失去身份认同。”\n\n米雅当场承诺：所有愿意继续任职的家臣将被纳入帝国地方行政体系，保留原有待遇。\n\n派翠克露出了一个如释重负的微笑：“有殿下这句话，我回去就能说服他们了。”"
 
 TIA.87.a: "外交路线——以协议和补偿换取和平移交"
 TIA.87.b: "强硬路线——以帝国的权威要求无条件服从"
 TIA.87.c: "温和集权的前期布局在此刻发挥了作用——对方几乎没有抵抗的理由"
 TIA.87.a_tt: "§G选择外交路线。付出更多政治资本，但保证平稳过渡，不会引发叛乱§!"
 TIA.87.b_tt: "§R选择强硬路线。政治成本较低但风险更高——对方可能被逼急后发动武装抵抗§!"
 TIA.87.c_tt: "§G此前推行的温和集权策略建立了充分的信任基础。领主们几乎没有理由拒绝一个对双方都有利的提案§!"
 
 # ====== Rebellion Event (88) ======
 
 TIA.88.t: "领地叛乱！"
 TIA.88.desc_VBC: "贝尔曼子爵——那个“只忠于金子”的精明小贵族——做出了一个所有人都没料到的决定。当帝国使节带着最后通牒抵达皇女镇时，发现城门紧闭、吊桥高悬。\n\n子爵通过城头喊话：“我算过了——服从帝国的收益不如保留领地的收益高！”\n\n路德维希叹气：“他甚至反叛都要先算账。”"
 TIA.88.desc_CLV: "消息在深夜传到帝都：鲁多路冯伯爵在收到帝国的强制整合令后，召集了领地内的全部骑士团。迪欧娜试图劝阻父亲，但老伯爵拍着桌子咆哮：“体面？他们根本不打算给我体面！”\n\n伯爵领的城堡升起了家族旗帜——这在帝国法典中意味着“拒绝中央权威”。"
 TIA.88.desc_CDK: "叛乱的消息传到帝都时，尤蜜拉正在实验台前校准魔力测量仪。她听完报告后沉默了三秒钟——对认识她的人来说，这已经是异常强烈的情绪反应了。\n\n事情的经过是这样的：当帝国使节带着尤蜜拉亲笔签署的移交令抵达多克尼斯领地时，首席管家率领家臣团拒绝开门。他们声称移交令是“伪造的”或“胁迫所得”——因为在他们看来，“尤蜜拉大人怎么可能自愿放弃家族的领地？一定是帝都的人逼迫了她。”\n\n他们没有理解一件事：尤蜜拉是真的不在意。\n\n“……所以他们是在替我做我不想让他们做的决定？”尤蜜拉终于开口了。实验室里的空气开始微微震颤——暗属性魔力的压迫感让在场所有人后背发凉。\n\n派翠克又一次及时拉住了她的手：“让帝国来处理。你亲自去的话——”\n\n“——会把矿脉也炸了。我知道。”\n\n她的语气很平静。但派翠克注意到测量仪的指针已经被震断了。"
 TIA.88.desc_CAB: "阿派翠克第一次在米雅面前失去了从容。\n\n他带回去的安置方案本该让所有人满意——帝国行政职位、保留待遇、甚至还有一笔额外的遣散金。但阿修巴顿领地内以老骑士长为首的保守派根本不看方案的内容。他们看到的只有一件事：家主要把领地交出去。\n\n“少爷，”老骑士长——一个从派翠克祖父时代就在阿修巴顿家服务的白发老人——拦在府邸门口，“恕老臣不能遵命。阿修巴顿的土地，是您祖父用一生守护下来的。就算是您亲口下令，老臣也不能看着它被交出去。”\n\n派翠克站在自己家的大门前，却无法走进去。\n\n他在写给米雅的急报中字迹略有潦草——这对一向工整的派翠克来说极其反常：“殿下，情况超出了我的预期。骑士长他们不是在反抗帝国——他们是在反抗我的决定。这比我想象的……要难处理得多。请求帝国支援。”"
 
 TIA.88.a: "调动帝国军队平叛——不能让这个口子开下去"
 TIA.88.b: "紧急让步——现在不是动武的时候"
 TIA.88.a_tt: "§R军事镇压将恢复秩序，但会造成兵力损耗和稳定下降。叛乱被镇压后可继续推进吞并§!"
 TIA.88.b_tt: "§Y放弃强硬路线，转为外交手段。损失大量政治资本，但避免了流血冲突§!"
 
 # ====== Rebellion Suppressed (89) ======
 
 TIA.89.t: "秩序恢复"
 TIA.89.desc: "帝国军队在三周内完成了对叛乱领地的围剿。抵抗比预想的要弱——这些领主手下的私兵终究不是正规军的对手。\n\n战斗结束后，领主被押送帝都等候发落。现在的问题是：如何处置战败者？"
 TIA.89.desc_CDK: "帝国军队抵达多克尼斯领地时，发现叛乱已经……自行结束了。\n\n据现场军官报告：尤蜜拉不顾派翠克的劝阻，亲自传送到了领地上空。她没有施放任何攻击魔法——她只是站在那里，俯视着下方。\n\n暗属性魔力的压迫感在方圆三里内蔓延开来。花草枯萎，小动物纷纷逃窜，首席管家率领的“叛军”在坚持了大约四十秒后，整齐划一地放下了武器。\n\n事后尤蜜拉对帝国军官说了一句话：“他们是替我管了很多年家的人。处罚的事——交给帝国决定就好。但是……”\n\n她难得地犹豫了一下：“不要太过分。”\n\n派翠克在旁边轻轻叹了口气。这大概是尤蜜拉说过的最长的一段关心别人的话了。"
 TIA.89.desc_CAB: "阿修巴顿伯爵领的“叛乱”以一种谁都没想到的方式结束了。\n\n派翠克在帝国军队到达之前先一步回到了领地。他没有带任何卫兵，独自走到伯爵府门前——老骑士长带着二十名全副武装的家臣拦在那里。\n\n派翠克站在自己家的大门前，看着这个从小看着他长大的白发老人。然后他做了一件所有人都没预料到的事——他向老骑士长鞠了一个九十度的躬。\n\n“骑士长大人，四十三年来辛苦了。”\n\n老骑士长的手开始发抖。\n\n“阿修巴顿家族的荣誉——”派翠克抬起头，眼眶微红但声音稳定——“不在于这座府邸。在于站在这里的每一个人。”\n\n沉默持续了很久。然后老骑士长缓缓放下了手中的剑，单膝跪地：\n\n“……少爷长大了。”"
 
 TIA.89.a: "公开审判，杀一儆百，震慑其他潜在的反叛者"
 TIA.89.b: "宽大处理，剥夺爵位和领地，但保留性命和财产"
 TIA.89.a_tt: "§R公开审判将树立中央权威的绝对性，但可能让其他领主更加恐惧，阻碍后续的和平整合§!"
 TIA.89.b_tt: "§G宽大处理展示了帝国的胸襟。其他领主将更倾向于和平移交，但也可能被视为软弱§!"
 TIA.89.c: "让尤蜜拉自行处置"
 TIA.89.d: "不能让尤蜜拉再随便出手了"
 TIA.89.c_tt: "§G尤蜜拉的存在本身就是最好的威慑。叛乱的家臣们被妥善安置，多克尼斯领地平稳回归。尤蜜拉的这次“出场”甚至让周边领地的整合变得更加顺利——没有人想体验等级99的注视§!"
 TIA.89.d_tt: "§Y帝国军队正式接管了多克尼斯领地。家臣团被解散并重新编入帝国行政体系。过程虽然规范，但留下了一些不必要的摩擦§!"
 TIA.89.e: "派翠克一个人解决了一切"
 TIA.89.f: "不能总靠派翠克的个人魅力"
 TIA.89.e_tt: "§G派翠克以个人的真诚和家族的情感纽带化解了冲突。所有家臣自愿放下武器，没有一滴血流下。这是四个领地整合中最体面的收场§!"
 TIA.89.f_tt: "§Y帝国军队正式介入，家臣团被有序遣散。过程合规但缺少温度——老骑士长在交出佩剑时一言不发§!"
 
 # ====== Annexation Event (90) ======
 
 TIA.90.t: "帝国旗帜升起"
 TIA.90.desc_VBC: "贝尔曼子爵的印信被正式收缴，皇女镇城头的子爵旗帜被缓缓降下，取而代之的是堤亚穆帝国的金色双头鹰。\n\n贝尔曼本人对此表现得出奇平静。他甚至在交接仪式上开了个玩笑：“从今天起我不是子爵了——但我仍然是皇女镇最大的商人。”\n\n米雅不禁莞尔。有些人，你不需要让他变成忠臣——你只需要让他继续有钱赚。"
 TIA.90.desc_CLV: "鲁多路冯伯爵的交接仪式是最安静的一个。老伯爵在仪式上一言不发，只是将家族传了七代的印信放在桌上，然后转身离去。\n\n迪欧娜代替父亲说了最后的话：“伯爵家族请求保留祖宅和家族墓园。其余一切——”她停顿了一瞬——“归于帝国。”\n\n仪式结束后，路德维希在报告里写了一行字：“鲁多路冯家族的尊严值得尊重。建议保留其荣誉头衔。”"
 TIA.90.desc_CDK: "多克尼斯伯爵领的移交仪式是四个中最简短的——因为尤蜜拉在签完最后一份文件后，立刻说了一句“我回去继续实验了”就离开了。\n\n倒是派翠克留下来处理了所有的后续事宜。他花了整整一天时间与多克尼斯的家臣团逐一会面，安排了每个人的去处。首席管家最后一个离开——老人在交出府邸钥匙时手微微发抖，但什么都没说。\n\n仪式的最后一个环节是签署魔力矿脉的研究优先权协议。路德维希把文件递给尤蜜拉——她是专门为这一项回来的。\n\n“这个我看。”她拿过文件仔细审阅了每一个条款。用了四十五分钟。\n\n路德维希和米雅对视了一眼：整份领地移交协议她五分钟就签了，研究优先权反而看了四十五分钟。\n\n这就是尤蜜拉。"
 TIA.90.desc_CAB: "阿修巴顿伯爵领的移交仪式是四个中最周到的——因为派翠克亲手安排了每一个细节。\n\n他为每一位离任的家臣准备了一封感谢信和一份帝国任命书。老骑士长收到信时站在原地看了很久，然后——在场的人后来说——老人的眼眶泛红了。信上写着：\n\n“骑士长大人为阿修巴顿家族服务了四十三年。这份忠诚不会因为领地的归属改变而被遗忘。帝国西南行政区恭候您的赴任。——派翠克·阿修巴顿”\n\n移交仪式最后，派翠克将家族印信交到米雅手中时，行了一个完美的礼。\n\n“阿修巴顿这个名字，”他说，“从今天起不再代表一块领地。”\n\n他抬起头，微微一笑——那种温和的、让人安心的笑容：\n\n“但它仍然代表忠诚。”"
 
 TIA.90.a: "保留旧领主部分权限，给他们一个有尊严的退场"
 TIA.90.b: "中央直辖，帝国需要完全的控制权"
 TIA.90.a_tt: "§G保留前领主的荣誉头衔和部分经济权益。领地平稳过渡，民心安定§!"
 TIA.90.b_tt: "§Y完全收归中央直辖。行政效率更高，但前领主的支持者可能心存不满§!"
 
 # ====== All Vassals Integrated (91) ======
 
 TIA.91.t: "四领归一"
 TIA.91.desc: "当最后一面领主旗帜在帝国版图上被帝国旗帜取代时，米雅站在帝都宫殿的最高阳台上，俯瞰着露那提亚的万家灯火。\n\n四个爵位领——贝尔曼、鲁多路冯、多克尼斯、阿修巴顿——全部被纳入了帝国的直辖体系。这是堤亚穆帝国自黄金二十五年以来最大规模的一次行政整合。\n\n路德维希递来了一杯茶。“接下来呢？”\n\n米雅看向西方——枫丹刺玫会的方向——然后看向南方——帝国广袤的版图——最后低头看了看手中那本褪色的日记。\n\n“日记里的帝国，”她说，“在这个时候已经开始分裂了。而我们——”她合上日记——“在把它拼回来。”"
 TIA.91.a: "帝国的统一，从今天开始"
 
 TIA_centralized_authority: "中央集权体制"
 TIA_centralized_authority_desc: "四个爵位领被成功整合为帝国直辖行政区。中央政府对全国的控制力达到了前所未有的高度。"
 
 # ====== Fontaine Events (92-96) ======
 
 TIA.92.t: "枫丹的玫瑰与荆棘"
 TIA.92.desc: "关于枫丹刺玫会自治区的评估报告比任何一个爵位领的都要厚——足足三百页。\n\n核心问题很简单也很棘手：枫丹不是一个普通的贵族领地。它是一个以芙宁娜（或芙卡洛斯）信仰为核心、拥有独立文化认同的半独立实体。刺玫会不是一个政治组织——它是一个宗教组织，而它的权力来源不是军队或土地，而是信仰。\n\n“你不能用吞并贝尔曼子爵的方式吞并枫丹，”安妮在报告的批注中写道，“贝尔曼信的是金子，你给他金子就行。枫丹信的是神——你打算给他们什么？”\n\n报告的最后一页是一张地图，标注着枫丹自治区内所有芙宁娜派教堂、修道院和朝圣路线的位置。密密麻麻，如同玫瑰的刺。"
 TIA.92.desc_furina: "关于枫丹刺玫会自治区的评估报告摆在案头，但路德维希在翻阅前先说了一句让所有人都松了口气的话：“至少我们和他们信的是同一个神。”\n\n帝国已经确立芙宁娜（芙卡洛斯）为国家正统信仰——这意味着枫丹刺玫会的信仰核心与帝国官方完全一致。这是一张极其有力的谈判牌。\n\n但安妮提醒道：“信同一个神不代表是同一种人。枫丹人信芙宁娜是因为芙宁娜是他们的神——不是因为帝国告诉他们应该信谁。如果我们摆出‘你们本来就该听我们的’这种态度，反而会适得其反。”\n\n她在报告上写了一行字：“共同的信仰是桥梁，不是绳索。”"
 TIA.92.desc_akua: "关于枫丹刺玫会自治区的评估报告让路德维希皱紧了眉头——因为帝国选择了阿库娅作为国家正统信仰，而枫丹人信的是芙宁娜。\n\n“这是最糟糕的组合，”安妮直言不讳，“我们不仅要整合一个半独立的自治区，还要面对一个信仰与国教对立的宗教组织。刺玫会会把集权解读为‘阿库娅派要消灭芙宁娜信仰’——不管我们的本意是什么。”\n\n不过也不全是坏消息。恰恰因为帝国选了对立面，枫丹人对帝国的“宗教迫害”有着极高的警惕——这意味着如果帝国能拿出令人信服的信仰保障，反而能赢得更深的信任。\n\n“最怕的不是对立，”路德维希说，“是对立之后的猜疑。我们需要比预想更多的诚意。”"
 TIA.92.desc_none: "关于枫丹刺玫会自治区的评估报告呈现出一个微妙的局面——帝国已经废除了国家水神信仰，宣布皇权至上、政教分离。\n\n“这把双刃剑，”安妮分析道，“好的一面是：枫丹人不用担心帝国会强推一个‘异端’的神——因为帝国已经不推任何神了。坏的一面是：刺玫会的权力来源就是信仰，而我们刚刚宣布信仰不再是国家权威的来源。他们会怎么理解这件事？”\n\n路德维希沉思片刻：“他们会理解为——‘帝国不在乎我们的神’。这比‘帝国要消灭我们的神’好一点，但比‘帝国尊重我们的神’差很多。”\n\n一个尴尬但可以操作的处境。"
 TIA.92.a: "枫丹的问题需要完全不同的策略"
 TIA.92.a_tt: "§Y枫丹刺玫会自治区的核心问题是宗教和文化认同，而非单纯的政治权力。任何强制手段都可能引发远比领地叛乱更严重的后果§!"

 TIA.93.t: "与刺玫会的对话"
 TIA.93.desc: "刺玫会的代表团在帝都受到了隆重接待——按照安妮的建议，接待仪式中特意加入了芙宁娜派的传统礼仪元素。这个细节让刺玫会的首席代表——一位名叫薇妮莎的年轻修女——脸上第一次露出了不那么戒备的表情。\n\n“我们来这里不是因为我们想来，”薇妮莎开门见山，“而是因为我们知道帝国迟早会来。主动坐到桌前，至少还能选择坐在哪一边。”\n\n她的话很直接：枫丹人不反对帝国的存在，但他们绝对反对帝国干涉他们的信仰。信仰自由是枫丹的底线——碰了这条线，“整个枫丹会变成一座永远燃烧的火山。”\n\n谈判正式开始。一切取决于帝国的态度。"
 TIA.93.a: "我们不干涉教堂，教堂不干涉政治"
 TIA.93.b: "帝国的法律高于一切，包括宗教"
 TIA.93.c: "信仰固然重要，但面包也很重要"
 TIA.93.a_tt: "§G表明帝国尊重信仰自由的立场。刺玫会的警惕明显降低了一个等级§!"
 TIA.93.b_tt: "§R直接挑战了枫丹的核心底线。薇妮莎的表情瞬间凝固——谈判的气氛骤然紧张§!"
 TIA.93.c_tt: "§Y提出经济合作方案：帝国投资枫丹的基础设施建设，换取枫丹在行政上的配合。薇妮莎沉思了很久§!"
 
 TIA.94.t: "枫丹回归条件"
 TIA.94.desc: "经过数轮漫长而紧张的谈判，双方终于进入了核心议题：枫丹回归帝国的具体条件是什么？\n\n刺玫会提出了他们的方案：宗教自治权、教育自主权、以及在帝国议会中的永久席位。作为交换，枫丹接受帝国的行政管辖、军事统一指挥、以及统一税制。\n\n路德维希一条条地分析这些条件——有些可以接受，有些需要谈，有些……取决于帝国愿意为和平付出多少代价。"
 
 TIA.94.a: "接受宗教自治，信仰的归信仰，行政的归帝国"
 TIA.94.b: "拒绝自治条件，帝国不接受国中之国"
 TIA.94.c: "提出联邦模式，枫丹将作为帝国特别行政区，享有经济优惠"
 TIA.94.d: "标准外交路线，逐条讨价还价"
 TIA.94.a_tt: "§G宗教自治协议签署。枫丹保留信仰自由和教育自主权，但接受帝国在行政、军事和财政上的统一管辖。这是最平稳的回归路径§!"
 TIA.94.b_tt: "§R刺玫会代表团当场离席。枫丹局势急剧恶化的风险大幅上升§!"
 TIA.94.c_tt: "§G联邦模式兼顾了帝国的统一性和枫丹的特殊性。前期经济投入较大，但长期回报丰厚§!"
 TIA.94.d_tt: "§Y标准外交谈判。过程漫长但稳健，双方在每一个条款上反复拉锯§!"
 
 TIA.95.t: "枫丹危机"
 TIA.95.desc: "帝国的强硬立场引爆了枫丹积蓄已久的怒火。刺玫会宣布中止一切谈判，薇妮莎在帝都的最后一次公开声明中说了一句话：\n\n“枫丹的玫瑰可以被践踏——但践踏它的人会发现脚下全是刺。”\n\n三天后，枫丹自治区全境发生了大规模的和平抗议——教堂的钟声从黎明响到黄昏，所有商铺关门歇业，枫丹人穿上白色长袍聚集在广场上静默祈祷。\n\n这不是叛乱，这比叛乱更难对付。你不能向祈祷的人开枪。\n\n或者说——你可以，但代价是帝国的灵魂。"
 TIA.95.a: "军事介入，用武力恢复秩序"
 TIA.95.b: "全面让步，承认枫丹的宗教自治权"
 TIA.95.c: "请阿库娅派出面调解，让两个水神信仰找到共存之道"
 TIA.95.a_tt: "§R军事介入将镇压抗议，但帝国在枫丹的统治将永远建立在恐惧而非认同之上。长期代价不可估量§!"
 TIA.95.b_tt: "§Y全面让步。帝国付出了巨大的政治代价，但避免了一场可能撕裂帝国的宗教危机§!"
 TIA.95.c_tt: "§G阿库娅派与芙宁娜派虽然是竞争关系，但在“水神”这个共同根源上有对话的可能。由阿库娅派出面调解，反而可能促成一个帝国框架下的宗教和解§!"
 
 TIA.96.t: "枫丹回归"
 TIA.96.desc_peaceful: "签约仪式在枫丹最古老的芙宁娜大教堂中举行——这个地点的选择本身就是帝国诚意的证明。\n\n薇妮莎代表刺玫会在协议上盖下了玫瑰印章。米雅代表帝国盖下了双头鹰。两枚印章紧挨在一起——玫瑰与鹰。\n\n“从今天起，”薇妮莎说，“枫丹是帝国的枫丹。但枫丹的教堂——”她看了一眼头顶的穹顶彩画——“仍然是芙宁娜的教堂。”\n\n米雅点了点头。有些东西不需要抢——你只需要保证不去碰它。"
 TIA.96.desc_forced: "枫丹回归帝国的方式并不光彩。在帝国军队进驻后，刺玫会被勒令解散，芙宁娜派的高级神职人员被“请”到帝都“做客”。\n\n枫丹的教堂仍然矗立着，但钟声不再响起。广场上不再有白衣祈祷的人群——不是因为他们不想，而是因为他们不敢。\n\n路德维希在报告中写道：“枫丹已被整合。”他停笔想了想，又加了一句：“代价待评估。”"
 TIA.96.desc_standard: "枫丹回归帝国的过程不算顺利，但最终在双方的妥协下完成了。刺玫会保留了有限的宗教事务管理权，但行政和军事权力全部移交帝国。\n\n这不是最好的结果，但也不是最坏的。枫丹人没有欢庆，也没有抗议——他们只是安静地接受了。"
 TIA.96.a: "枫丹在和平与尊重中回归帝国"
 TIA.96.b: "枫丹被纳入帝国直辖版图"
 TIA.96.c: "枫丹的回归是谈判与妥协的结果"
 TIA.96.a_tt: "§G枫丹的和平回归为帝国赢得了国际声誉，也为处理其他文化冲突树立了典范§!"
 TIA.96.b_tt: "§R枫丹虽然在行政上完成了整合，但宗教创伤可能在未来造成隐患§!"
 TIA.96.c_tt: "§Y枫丹回归。双方各有得失，但总体稳定§!"

 # ====== Fontaine Post-War Governance ======
 TIA.97.t: "征服之后"
 TIA.97.desc: "枫丹收复已经多个月了。帝国的旗帜插遍了每一座城镇，驻军在街头巡逻，行政官员接管了刺玫会留下的政务——表面上一切井然有序。\n\n但安妮的报告揭示了表面之下的暗流：枫丹人不再公开反抗，但他们也不再说话。市场上的交谈声小了，教堂的钟声停了，连孩子们都不再在广场上玩耍。\n\n“这不是和平，”安妮在报告末尾写道，“这是沉默。沉默比抵抗更可怕——因为你不知道它什么时候会爆发。”\n\n刺玫会的残余成员转入了地下。芙宁娜派的信仰没有消失——它只是从教堂搬到了地窖。帝国需要做一个决定：是让伤口慢慢愈合，还是把它彻底缝死？"
 TIA.97.desc_furina: "枫丹收复已经多个月了。讽刺的是——帝国与枫丹信的是同一个神。\n\n这个事实让一切变得更加荒诞。帝国士兵踢开芙宁娜教堂的大门时，里面供奉的正是帝国自己的国教女神。枫丹人看着这一幕时的表情不是恐惧——是困惑。\n\n“你们信芙宁娜？”一个枫丹老妇人问帝国军官，“那你们为什么要打我们？”\n\n军官没有回答。他也回答不了。\n\n安妮在报告中写道：“共同的信仰现在不是桥梁——它是一面镜子。枫丹人从中看到的是帝国的矛盾和虚伪。如果我们不正视这一点，征服的代价会远远超过战争本身。”\n\n但反过来说——正是这面镜子，给了帝国一个独特的修复机会。"
 TIA.97.desc_akua: "枫丹收复已经多个月了。阿库娅正统诏令的阴影笼罩在每一座芙宁娜教堂上。\n\n枫丹人的恐惧很具体：帝国不仅用武力征服了他们的土地，还可能用国教取代他们的信仰。地下传播的谣言越来越夸张——“帝国要把所有芙宁娜圣像烧掉”，“祈祷芙宁娜的人会被送去劳改”……\n\n安妮气得拍了桌子：“这些谣言有三分之一是枫丹人自己编的，三分之一是敌对势力煽动的，还有三分之一——”她看了路德维希一眼——“是我们自己造成的。”\n\n路德维希沉默了。确立阿库娅正统在当时是正确的政治决定，但它在枫丹产生的后果，可能需要很长时间来消化。"
 TIA.97.desc_none: "枫丹收复已经多个月了。帝国已废除国教，宣布政教分离——这在枫丹产生了一种奇怪的效果。\n\n枫丹人对帝国没有宗教层面的恐惧——毕竟帝国连自己的神都不要了，不太可能来迫害别人的神。但他们同样没有宗教层面的信任——“一个连神都不信的帝国，凭什么理解我们？”\n\n安妮的报告用了一个精准的比喻：“枫丹看帝国的眼神，像是虔诚者看无神论者——不是仇恨，是怜悯。他们觉得我们可怜。”\n\n路德维希评论道：“被征服者怜悯征服者。这大概是帝国历史上最黑色幽默的一幕。”"
 
 TIA.97.a: "允许芙宁娜信仰在帝国法律框架内自由存续"
 TIA.97.b: "限制公开宗教活动，但不禁止私人信仰"
 TIA.97.c: "全面取缔刺玫会残余，将芙宁娜信仰纳入国教管控"
 TIA.97.d: "以芙宁娜之名修复创伤"
 TIA.97.e: "援引朝圣协约的精神重建信任，帝国曾承诺过尊重"
 TIA.97.a_tt: "§G允许芙宁娜信仰合法存续。教堂重新开放，钟声再次响起。枫丹人的沉默被打破了——虽然还有疑虑，但至少他们开始重新开口说话§!"
 TIA.97.b_tt: "§Y大型宗教集会和公开布道被禁止，但私人祈祷和家庭仪式不受限制。枫丹人不满意但可以接受——信仰从广场退回了客厅§!"
 TIA.97.c_tt: "§R全面管控。刺玫会地下网络被瓦解，芙宁娜教会被纳入帝国宗教管理局。枫丹的沉默变得更深了——但这次的沉默里，藏着仇恨的种子§!"
 TIA.97.d_tt: "§G帝国以芙宁娜正统信仰的名义向枫丹伸出了橄榄枝。当帝国官员在芙宁娜教堂中与枫丹人并肩祈祷时——三个月来第一次，教堂里传出了哭声。不是恐惧的哭，是释然的哭§!"
 TIA.97.e_tt: "§G帝国拿出了朝圣协约的原件——上面有刺玫会的玫瑰印章。“这份协约证明帝国曾经尊重过你们的信仰，”路德维希对枫丹代表说，“现在，我们愿意重新开始。”协约的存在为破裂的信任提供了一个修复的起点§!"
 




 TIA.101.t: "铁路人偶带动了铁路客运的提升！"
 TIA.101.desc: "铁路人偶的推广使得铁路的安全性大幅度提升，火车的运行也变得更加稳定。虽然在一开始的时候，铁路人偶的出现引起了部分人的反感，但是随着时间的推移，越来越多的人们开始接受了她们，甚至因为其可爱的外表开始喜欢上了她们，有人不惜专门乘坐铁路来观赏自己各式各样的铁路人偶，可以说铁路人偶的推广也因此获得了成功。"
 TIA.101.a: "铁路人偶真是太可爱了！"


