 TIA_the_inner_circle_dm_desc: "[TIA.GetLeader]陛下的皇家内阁囊括了各地各方面的精英，都是忠诚于米娅陛下的内阁成员，致力于推进[TIA.GetLeader]的愿景。尽管他们都有所图谋，努力在核心圈内晋升为“内阁领袖”，他们的影响力塑造了军事、工业和政治决策，并推动堤亚穆帝国的政策制定。"
 TIA_the_inner_circle_dm_tt: "§Y皇家内阁§!可用顾问：\n§Y米雅贝儿·卢娜·堤亚穆§!、§Y路德維希·休伊特§!、§Y安妮·理特斯坦§!、§Y迪欧娜·鲁多路冯§!、§Y艾克莱尔§!、§Y莉薇娅§!、§Y尤蜜拉·多克尼斯§!、§Y爱丽丝·贝德福德§!"

