 TIA_power_balance_desc: "在改革中，要注意旧贵族与改革派关系的平衡，一味偏向改革派可能会引起旧贵族不满；一味偏向旧贵族可能导致改革派转向激进；任何一种结果都有可能导致堤亚穆内战，并且让潜在的革命势力出现。"
