 # 中央集权决议系统 - 完整本地化
 ###################################

 TIA_shrink_territory_management_category: "加强中央集权"
 TIA_shrink_territory_management_category_desc: "通过外交施压、经济控制和行政改革，将帝国境内的伯爵领、子爵领和自治区逐步纳入中央直辖体系。"
 
 TIA_inspect_VBC: "派遣巡察使：贝尔曼子爵领"
 TIA_inspect_VBC_desc: "贝尔曼子爵是静海森林事件中的关键人物。在派出巡察使评估其领地状况之前，我们需要了解他对中央集权的真实态度。"
 TIA_inspect_CLV: "派遣巡察使：鲁多路冯伯爵领"
 TIA_inspect_CLV_desc: "鲁多路冯伯爵与皇女有粮食储备方面的合作关系，但其领地实力不容小觑。需要详细评估。"
 TIA_inspect_CDK: "派遣巡察使：多克尼斯伯爵领"
 TIA_inspect_CDK_desc: "多克尼斯伯爵领是帝国魔学首席尤蜜拉·多克尼斯的领地。尤蜜拉本人长期驻帝都，领地由家臣团代管。巡察使需要评估家臣团的实际态度。"
 TIA_inspect_CAB: "派遣巡察使：阿修巴顿伯爵领"
 TIA_inspect_CAB_desc: "阿修巴顿伯爵领是派翠克·阿修巴顿的领地。派翠克与皇女关系良好且态度合作，但领地内的老家臣可能有不同想法。"
 
 TIA_negotiate_VBC: "施压谈判：贝尔曼子爵领"
 TIA_negotiate_VBC_desc: "巡察使的报告已经送达。是时候与贝尔曼子爵坐下来谈谈帝国的未来了。"
 TIA_negotiate_CLV: "施压谈判：鲁多路冯伯爵领"
 TIA_negotiate_CLV_desc: "巡察使的报告已经送达。鲁多路冯伯爵领的情况比预想的更加复杂。"
 TIA_negotiate_CDK: "施压谈判：多克尼斯伯爵领"
 TIA_negotiate_CDK_desc: "巡察使的报告已经送达。尤蜜拉本人对领地毫无留恋，但多克尼斯的首席管家和家臣团才是真正需要说服的对象。"
 TIA_negotiate_CAB: "施压谈判：阿修巴顿伯爵领"
 TIA_negotiate_CAB_desc: "巡察使的报告已经送达。派翠克已提前准备了完整的移交方案，但老家臣团的态度仍需确认。"
 
 TIA_integrate_VBC: "正式吞并：贝尔曼子爵领"
 TIA_integrate_VBC_desc: "条件已经成熟。是时候将贝尔曼子爵领正式纳入帝国直辖版图。"
 TIA_integrate_CLV: "正式吞并：鲁多路冯伯爵领"
 TIA_integrate_CLV_desc: "条件已经成熟。是时候将鲁多路冯伯爵领正式纳入帝国直辖版图。"
 TIA_integrate_CDK: "正式吞并：多克尼斯伯爵领"
 TIA_integrate_CDK_desc: "尤蜜拉已签署移交协议，家臣团的安置方案也已敲定。是时候完成最后的行政手续了。"
 TIA_integrate_CAB: "正式吞并：阿修巴顿伯爵领"
 TIA_integrate_CAB_desc: "派翠克准备的移交方案完善到无可挑剔。万事俱备，只欠最后的签章。"
 
 TIA_suppress_rebellion_VBC: "镇压叛乱：贝尔曼子爵领"
 TIA_suppress_rebellion_VBC_desc: "贝尔曼子爵的残余势力仍在进行零星抵抗。必须尽快恢复秩序。"
 TIA_suppress_rebellion_CLV: "镇压叛乱：鲁多路冯伯爵领"
 TIA_suppress_rebellion_CLV_desc: "鲁多路冯伯爵召集了领地骑士团进行抵抗。必须迅速平定。"
 TIA_suppress_rebellion_CDK: "镇压叛乱：多克尼斯伯爵领"
 TIA_suppress_rebellion_CDK_desc: "多克尼斯的家臣团违抗尤蜜拉的命令据守领地。需要帝国军队介入——同时确保尤蜜拉不要亲自出手。"
 TIA_suppress_rebellion_CAB: "镇压叛乱：阿修巴顿伯爵领"
 TIA_suppress_rebellion_CAB_desc: "阿修巴顿的老骑士长带领保守派家臣封锁了伯爵府。派翠克请求帝国支援平息此事。"
 
 TIA_fon_assess: "评估枫丹形势"
 TIA_fon_assess_desc: "枫丹刺玫会自治区的情况远比普通贵族领地复杂——这里涉及的不仅是权力，还有信仰。在采取任何行动之前，我们需要全面了解枫丹的现状。"
 TIA_fon_contact: "接触刺玫会领导层"
 TIA_fon_contact_desc: "评估完成。是时候与刺玫会的核心人物进行正式接触了。每一句话都可能影响枫丹的未来走向。"
 TIA_fon_negotiate: "枫丹回归谈判"
 TIA_fon_negotiate_desc: "初步接触的结果还算积极。现在进入最关键的阶段——正式谈判枫丹回归帝国的条件。"
 TIA_fon_integrate: "执行枫丹回归方案"
 TIA_fon_integrate_desc: "谈判框架已经确定。是时候将枫丹刺玫会自治区正式纳入帝国的行政体系了。"

 TIA_fon_postwar_governance: "枫丹战后治理"
 TIA_fon_postwar_governance_desc: "枫丹已在内战中被帝国武力收复，但征服只是开始。刺玫会被解散，芙宁娜派教会失去了政治庇护——然而信仰不会因为军队的到来而消失。帝国需要决定如何治理这片满是伤疤的土地。"
 

