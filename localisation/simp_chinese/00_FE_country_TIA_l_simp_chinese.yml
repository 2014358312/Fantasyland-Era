 TIA.122.t: "抵抗中央的暗流"
 TIA.122.desc: "中央集权法令颁布后，帝国各地领主的反应如同被捅了的马蜂窝。三个最有实力的边境总督联名上书，措辞礼貌但立场强硬：“帝国的传统是地方自治，中央过度干预将动摇根基。”翻译过来就是：“你管你的帝都，我管我的地盘。”\n\n更棘手的是，这三位总督手下各有一支规模不小的地方军。他们不敢公然叛乱，但如果逼得太紧……\n\n米雅看完联名信后叹了口气。她的日记里写得很清楚：在“另一个”未来里，地方势力的坐大正是帝国分裂的根源之一。"
 TIA.122.a: "温水煮蛙，慢慢削权，让他们在不知不觉中失去实力"
 TIA.122.b: "下最后通牒，三个月内交出地方军指挥权，否则以叛国论处"
 TIA.122.c: "以退为进，给他们荣誉头衔，换取实质性让步"
 
 TIA.123.t: "北方的冬天"
 TIA.123.desc: "帝国北部边境的领主们和枫丹自治区对中央的一系列改革持谨慎观望态度——直到安抚使节带着米雅的亲笔信和一车皇室礼物抵达。\n\n北方的问题很实际：漫长的冬季、匮乏的物资、以及来自穆露奈依特的边境压力。他们不关心帝都的政治游戏，他们只想知道一件事——中央会不会在他们需要的时候伸出手？\n\n使节在信中转达了米雅的承诺，但承诺需要行动来证明。"
 TIA.123.a: "投资北方，修建道路，改善补给线"
 TIA.123.b: "派遣帝国军驻扎北方，让他们知道中央有能力保护边疆"
 TIA.123.c: "先前的温和集权策略赢得了北方的信任，他们主动提出合作"
 
 TIA.124.t: "枷锁断裂之日"
 TIA.124.desc: "废奴诏令在帝国议会通过的那一天，帝都广场上发生了一幕让所有人都毕生难忘的场景。\n\n数百名刚刚获得自由的前奴隶涌入广场，他们中有人跪在地上失声痛哭，有人茫然地站在原地不知所措，还有人将脖子上的铁项圈砸碎在石板路上——金属撞击的声音在整个广场回荡。\n\n一个白发苍苍的老人颤巍巍地走到皇宫门前，举起了一双满是疤痕的双手，用嘶哑的嗓音说了一句话。广场上立刻安静了下来——所有人都听到了：\n\n“六十三年了。”\n\n贵族们在高处冷眼旁观。安妮在人群中默默流泪。米雅攥紧了阳台上的栏杆。\n\n改革走到这一步，没有退路了。"
 TIA.124.a: "他们是帝国新的自由公民"
 TIA.124.b: "给他们自食其力的能力"
 TIA.124.c: "确保废奴过程平稳过渡，不被反对派利用"
 
 TIA.125.t: "一口价的约定"
 TIA.125.desc: "看着粮食储备的报告，米娅对路德维希说道，“粮食储备还是远远不够啊”\n“再多的储备费用会对财政造成很大的影响”\n“那么要是发生了饥荒，该如何处理才好”\n“一般来说，就只能让商人运粮食进来了吧，会被开出远超行情的价格就是了”\n“我想到了，就是‘友情价格’啊”\n于是米雅通过克萝伊找到了她的父亲————温克勒商会的会长马可·福克罗德，简答的寒暄之后，米娅提出了一个简单的方案：帝国与商会签订长期粮食进口协议，以固定价格从海外采购小麦，不论市场行情如何变动，在平时商会会赚一笔稳定甚至高额的利润，万一遇上饥荒，商会也得按这个价格供货，给予通融。\n\n路德维希事后对安妮感叹：“殿下果然深谋远虑，未雨绸缪。”\n\n由于三人各自的误解，事件就这样圆满的解决了。"
 TIA.125.a: "帝国从此有了粮食安全保障"
 TIA.125.a_tt: "§G与温克勒商会的一口价粮食进口协议正式生效。和平时期帝国支付略高于市价的固定采购价（消费品微增），但一旦饥荒来临，帝国将以同样的价格获得保命的粮食。米雅殿下的“深谋远虑”再次让群臣叹服§!"

 TIA.126.t: "影子里的真相"
 TIA.126.desc: "对革命组织的调查揭示了一个令米雅意想不到的真相——所谓的“革命组织”并不是铁板一块。\n\n情报部门渗透进去后发现，这些组织中有三种人：真正想推翻皇室的激进分子（约占两成）；只是想改善生活条件的普通平民和奴隶（约占五成）；以及——令人震惊的——被某些贵族暗中资助、用来制造混乱的傀儡（约占三成）。\n\n“革命的火种不是自己燃起来的，”负责调查的密探说，“有人在往里面添柴——而那些人恰恰是最害怕革命的人。”\n\n米雅翻开日记：在“那个”未来里，正是这场被操控的革命最终将她送上了断头台。现在她知道了幕后黑手——问题是，该怎么处理？"
 TIA.126.a: "继续潜伏，收集更多的情报"
 TIA.126.b: "公开调查结果，让那些普通人知道谁在利用他们"
 TIA.126.c: "秘密逮捕幕后贵，斩草除根"
 TIA.126.b_tt: "§G真相的公开让一些的平民参与者自行退出。革命组织的实力逐渐削弱，而那些被揭露的贵族在舆论压力下再也无法行动，§!§Y但他们的幕后主使似乎将方向放到了别的地方上了......§!"
 
 TIA.127.t: "静海森林的声音"
 TIA.127.desc: "军队已经在森林外围集结完毕，就等一声令下便要杀进去。\n\n米雅看着那片黑压压的森林，脑海里浮现的是日记中的记载：这场仗打完，死伤惨重，活下来的士兵恨透了为了森林资源满足私欲而支持开战的皇女，迪奥·阿莱亚在革命时第一个倒戈……\n\n绝对不能打。但也不能直接下令撤军——子爵筹备了这么久，军队也已经开拔，没有一个说得过去的理由就喊停，只会让所有人质疑皇女的威信。\n\n米雅需要一个“理由”。\n\n于是她带着将领和亲卫队亲自进入了森林视察。走了没多远，米雅被树根摔倒，然后假装蛮横地踢了一下树根——\n\n几支箭支射来，幸亏被阿莱亚砍断。\n\n“呀啊啊啊啊——！！”\n\n米雅的尖叫声响彻整片森林。亲卫队立刻拔剑护住皇女，将领们脸色大变。米雅瘫坐在地上，浑身发抖，眼泪都要掉下来了。\n\n“太、太危险了！”米雅用颤抖的声音说，“撤退撤退，把我护送到城中……立刻、立刻下令全军撤回营地！不止亲卫队，我说的是全军！”\n\n没有人会质疑一个“亲身经历了森林恐怖”的皇女做出的撤军决定。将领们松了口气（其实他们也不太想打），士兵们欢呼雀跃（不用送命了），就连原住民也因为军队的突然撤退而避免了一场血战。\n\n贝尔曼子爵虽然没能如愿扩张，回到帝都后，但米雅随即向父皇情愿将静海森林纳入皇女直辖领，马蒂亚斯随即批准了该请求并命令子爵在附近兴建皇女镇——子爵的眼睛瞬间亮了起来。\n\n事后，随行文官在日志中写道：“殿下不顾个人安危深入险地，亲眼确认了森林的危险程度后果断下令撤军，以皇女之躯为全军避免了一场无谓的牺牲。此等勇气与仁慈，实乃帝国之幸。”"
 TIA.127.a: "算是避免了一次冲突"
 TIA.127.a_tt: "§G米雅殿下“亲赴险境”后下令撤军，给了所有人一个体面的台阶。一场注定代价惨重的战争被避免——士兵们感激涕零，将领们暗自庆幸，原住民得以保全家园。迪奥·阿莱亚等军官的叛变隐患也随之消失。贝尔曼子爵虽然丢了扩张机会，但皇女镇的商机和声誉让他笑得合不拢嘴§!"
 
 TIA.128.t: "皇女镇奠基"
 TIA.128.desc: "皇女镇的选址定在了静海森林东缘的一片开阔谷地——北靠森林，南临河流，既有防御纵深又有水运便利。\n\n奠基仪式当天，贝尔曼子爵破天荒地表现出了十二分的热情。贵族是一种把名誉看的比什么都重的生物——承建一座以皇女命名的新城，比领土问题什么的都重要多了。\n\n米雅站在临时搭建的高台上，面对着数百名工人、商人和闻讯赶来的定居者。她看着脚下这片还是一片荒地的土地，第一次真实地感受到——她正在亲手建造一些“那个”未来里从未存在过的东西。\n\n这座城镇的未来，将由她的选择来决定。"
 TIA.128.a: "民用优先"
 TIA.128.b: "军事优先"
 
 TIA.129.t: "蓝图上的帝国"
 TIA.129.desc: "美好国度——这个词对不同的人有不同的含义。\n\n米雅把内阁核心成员召集到一间铺满了地图和图纸的会议室里。墙上挂着帝国的全境地图，上面标注着每一个省份的现状：人口、资源、基础设施、军事部署……和问题。\n\n“日记里的帝国在这个时候已经分崩离析了，”米雅思索着，“但现在，我们还有机会。”她转向在座的每一个人。\n\n“告诉我——你们心中的‘美好国度’是什么样的？”\n\n安妮说：每个人都不会挨饿。路德维希说：国库永远有盈余。艾克莱尔说：没有任何敌人敢越过边境线。爱丽丝说：每个孩子都有书读。\n\n米雅听完，在地图上画了一个圈——把所有人的愿望都圈在了里面：“那就——全部都要。”"
 TIA.129.a: "以民生为核心，让帝国的每一个角落都安居乐业"
 TIA.129.b: "以基建为核心，用道路和铁路将帝国连为一体"
 TIA.129.c: "以科教为核心，知识是帝国最持久的力量"
 TIA.129.a_tt: "§G以民生为核心的蓝图将大幅提升帝国人口增长和社会稳定§!"
 TIA.129.b_tt: "§G全国性的基建计划将为每一个省份带来基础设施升级§!"
 TIA.129.c_tt: "§G以科教为核心的蓝图为帝国开辟了新的研究方向§!"
 
 TIA.130.t: "马奇诺的新翼楼"
 TIA.130.desc: "马奇诺女子学院是帝国唯一的精英军事学院，也是帝国军官团的摇篮。扩建计划获批后，学院院长激动得差点当场落泪——她已经为这个计划请愿了五年。\n\n新翼楼的功能设计引发了一场激烈的讨论。传统派教官主张增设战术演练场和武器库，将扩建重心放在实战训练上。改革派教官则认为应该建设现代化教室和研究实验室，培养能够适应新时代战争的军事人才。\n\n院长两手一摊：“预算只够做一件事。但如果你们能说服皇女殿下追加拨款……”\n\n艾克莱尔的眼睛亮了。"
 TIA.130.a: "建设战术模拟中心，用先进的训练方法锤炼新一代军官"
 TIA.130.b: "扩大招生规模，帝国需要更多受过专业训练的基层军官"
 TIA.130.c: "追加预算，两个都要，马奇诺不能打折扣"
 
 TIA.131.t: "远方的来客"
 TIA.131.desc: "阿鲁卡王国的使节团比预期更早抵达了帝都。更令人意外的是，使节团的规模——三十二人的代表团中包括了阿鲁卡的贸易大臣、两位将军、以及一位公主。\n\n这不是一次普通的外交拜访——阿鲁卡人显然在认真评估与堤亚穆结盟的可能性。\n\n使节团带来了三份提案：贸易协定（互减关税）、军事互助条约（共同应对穆露奈依特威胁）、以及一份文化交流协议（互派留学生）。\n\n“他们不是来做客的，”路德维希说，“他们是来投资的。问题是——我们愿意拿什么来交换。”"
 TIA.131.a: "优先签署贸易协定，经济互利是长期友谊的基石"
 TIA.131.b: "优先签署军事互助条约，北方的威胁需要盟友共同面对"
 TIA.131.c: "三份都签，堤亚穆需要一个全方位的盟友"

 ###################################
 # 饥荒系统 - 完整本地化
 ###################################
 
 # ====== Famine Strikes ======
 TIA.132.t: "饥荒"
 TIA.132.desc: "它来了。\n\n没有预兆，没有征兆——或者说，征兆一直都在，只是没有人愿意去看。连续两年的干旱悄悄蚕食着帝国南部的粮仓，当秋收报告终于送到帝都时，路德维希的脸色白得像纸。\n\n“产量只有往年的四成。”\n\n帝国的粮食储备最多撑三个月。三个月后，帝都的面包房就会关门。六个月后，乡村会开始出现饿殍。\n\n米雅坐在书桌前，手不自觉地摸向那本日记——在“另一个”未来里，这场饥荒就是一切崩溃的起点。粮价飞涨，投机商人囤积居奇，平民揭竿而起，帝国在饥饿中分崩离析。\n\n现在，同样的命运站在门口敲门。\n\n问题是——她有没有提前准备好应对的手段？"
 TIA.132.a: "启动粮食进口协议——商会的船队已经在路上了"
 TIA.132.a_tt: "§G温克勒商会按照一口价协议开始紧急调运海外粮食。虽然初期会有短暂的供应紧张，但最坏的情况不会发生§!"
 TIA.132.b: "没有任何准备……帝国只能靠自己熬过去"
 TIA.132.b_tt: "§R没有粮食进口协议。帝国陷入了严重的粮食危机，粮价开始疯狂飙升。接下来会发生什么，取决于帝国的选择——但没有一个选项是轻松的§!"
 
 # ====== Resolved (agreement path) ======
 
 TIA.133.t: "面包没有断"
 TIA.133.desc: "第一批商会粮船在饥荒消息传开后的第十二天抵达了七号自由港。马可·福克罗德站在码头上，看着成箱的小麦被卸下来，脸上的表情五味杂陈。\n\n按照一口价协议，这些粮食的售价和丰年一模一样。而此刻的自由市场上，同样的小麦已经涨了六倍。\n\n“这笔买卖，”马可·福克罗德苦笑着对路德维希说，“我亏了整整一个船队的利润。”\n\n路德维希难得地露出了一丝微笑：“但您赢得了帝国永远的信任。”\n\n面包房没有关门。粮价在短暂波动后恢复了稳定。帝都的平民甚至不知道自己刚刚从一场灾难的边缘被拉了回来。\n\n米雅偷偷松了一口气。日记里那个饿死人的冬天……这一次没有来。"
 TIA.133.a: "日记里的命运又被改写了一页"
 TIA.133.a_tt: "§G粮食协议发挥了作用。饥荒被化解于无形之中，帝国的稳定得到了巩固。马可·福克罗德亏了一笔钱，但从此成为了帝国最受信赖的商业伙伴§!"
 
 # ====== Escalation (no agreement) ======
 
 TIA.134.t: "粮价飞涨"
 TIA.134.desc: "饥荒的消息像野火一样蔓延。\n\n帝都的粮商们在一夜之间将价格翻了三倍——第二天又翻了一倍。到了第三天，普通家庭已经买不起面包了。排在粮店门口的长队从天亮排到天黑，越来越多的人空手而归。\n\n更糟糕的是，传言开始流传：“南方的粮仓被贵族提前搬空了。”不管这是不是真的，愤怒已经点燃了。第一起抢粮事件发生在帝都贫民区——一群饥饿的男人砸开了一家粮店的门。\n\n路德维希把紧急报告摔在桌上：“我们有三个选择。每一个都很糟糕。”"
 TIA.134.a: "紧急从海外高价采购粮食，不惜一切代价"
 TIA.134.b: "强制征用贵族的粮食储备，饿死的是平民，囤粮的是贵族"
 TIA.134.c: "这一切会自己过去"
 TIA.134.a_tt: "§Y以六倍市价从海外紧急采购粮食。帝国财政遭受重创，但至少不会有人饿死。如果当初签了一口价协议，这笔钱本可以省下§!"
 TIA.134.b_tt: "§R强制征用贵族粮仓。平民的饥饿暂时缓解了，但贵族们的怒火被点燃——他们会记住这件事§!"
 TIA.134.c_tt: "§R什么都不做。路德维希在听到这个决定时沉默了很久，然后说了一句：“那么殿下，请准备好面对后果。”§!"
 
 # ====== Noble Backlash (requisition path) ======
 
 TIA.135.t: "贵族的反噬"
 TIA.135.desc: "强制征粮令颁布后的第三周，五个省的贵族联名上书帝都，措辞已经不再客气：\n\n“皇女殿下的征粮令侵犯了贵族的世袭财产权。如果帝国连自己臣民的粮仓都要抢，那和街上的暴民有什么区别？”\n\n更令人不安的是，北方两个省份的贵族开始暗中联络——他们不仅拒绝交出剩余粮食，还开始向领地内的私兵分发武器。\n\n“这不是请愿，”安妮看完信后说，“这是最后通牒。”"
 
 TIA.135.a: "镇压，现在不是跟贵族讲道理的时候"
 TIA.135.b: "退让，归还已征粮食，用帝国财政高价补偿"
 TIA.135.c: "局势失控了……"
 TIA.135.a_tt: "§R帝国军队平息了贵族的骚动，但代价是帝国内部的裂痕进一步加深。那些被镇压的贵族不会忘记今天§!"
 TIA.135.b_tt: "§Y退让和补偿平息了贵族的怒火，但帝国的威信遭到了严重损害。更重要的是——粮食问题依然没有解决§!"
 TIA.135.c_tt: "§R稳定度过低，帝国的权威已经岌岌可危。贵族的反抗和平民的饥饿汇成了一股无法阻挡的洪流……§!"
 
 # ====== Famine Ignored - Catastrophe ======
 
 TIA.136.t: "饥饿的代价"
 TIA.136.desc: "两个月了。\n\n帝都的面包房早已关门。粮店被砸了一遍又一遍，直到里面连一粒米都不剩。贫民区的老人和孩子最先倒下——安静地、无声地、一个接一个地。\n\n南方传来的报告越来越短、越来越简：\n“某村断粮。”\n“某镇暴动。”\n“某城失联。”\n\n米雅站在宫殿的窗前，看着帝都街头空荡荡的景象。日记里的画面正在一帧一帧地变成现实——那个她拼命想改写的未来，正在从指缝间滑落。\n\n路德维希走进来时，米雅注意到他的眼睛是红的。\n\n“殿下，”他的声音沙哑得几乎听不见，“帝国南部三个省……已经事实脱离了中央管控。”"
 
 TIA.136.a: "还来得及……一定还来得及……"
 TIA.136.b: "日记里的命运……真的无法改变吗？"
 TIA.136.a_tt: "§R帝国竭尽全力止血。饥荒最终会过去，但它留下的伤疤——人口锐减、经济崩溃、民心尽失——将在很长时间内无法愈合§!"
 TIA.136.b_tt: "§R这一刻，米雅第一次怀疑自己是否真的能改变命运。帝国正在重蹈日记中记载的覆辙——财政崩溃、饥荒、然后是……§!"
 
 TIA_mcg_doctrine: "马奇诺战术革新"
 TIA_foreign_exchange: "外交技术交流"

 TIA.1006.t: "环大陆铁道同盟大会议程————铁路人偶的管理"
 TIA.1006.desc: ""
 TIA.1006.a: "铁路人偶的管理将会由各国铁路公司负责"
 TIA.1006.b: "铁路人偶的管理将会由最高机构负责"
 TIA.1006.c: "铁路人偶的管理将会由各国政府负责"
 TIA.1006.d: "新的管理机构将会接手此事"

 TIA.1001.t: "超级足球联赛开幕！"
 TIA.1001.desc: "超级足球联赛于魔法纪元1000年2月开始了第三届比赛，比赛共16支球队分别来自于目前已知的世界各国的球队，而今年本国的代表球队是枫丹庭队，他们将在第一场面对来自帕雷提亚王国的卡拉比丘队。"
 TIA.1001.a: "上啊！枫丹庭队！"
 
 TIA_state_event.1.t: "浮游都市特斯莱尔"
 TIA_state_event.1.desc: "浮游都市特斯莱尔由堤亚穆帝国的皇家科学院与魔法学会共同主导，于魔法纪元998年正式启动选址建设，成为帝国“天穹计划”中首座升空的浮游都市。该计划核心是利用地脉魔法能量驱动结合蒸汽核心技术的反重力引擎，通过在城市地基下方铺设巨型复合动力阵列，使整座城市脱离地表。\n\n经过两年紧张施工与多次局部升空试验（包括应对魔法能源波动、结构应力测试及居民适应性调整），特斯莱尔于魔法纪元1000年丰收月第3日正午成功升空。[From.GetLeader]陛下亲临主持仪式，数千名市民聚集在中央广场见证了这一历史时刻，而城市边缘的防护屏障在阳光下泛起虹彩流光，成为帝国地带最引人瞩目的奇观。\n\n此举不仅标志着堤亚穆帝国在魔法工业融合技术上的突破，也为后续的浮游都市的建设提供了关键数据与运营经验。然而，帝国内部亦有批评声音指出，该计划耗用了过多稀有魔法资源，并可能导致地脉生态的长期不稳定。"
 TIA_state_event.1.a: "庆祝浮游都市特斯莱尔成功飞天！"


