 ###################################
 # 水神信仰线 - 国民精神本地化
 ###################################

 # 芙宁娜系
 TIA_Funina_orthodoxy_established: "芙宁娜正统"
 TIA_Funina_orthodoxy_established_desc: "帝国已正式确立芙宁娜为唯一正统水神。秩序与法理的信条在首都和北方省份深入人心，知识分子和文官系统衷心拥护。然而南方的阿库娅派信众尚未平息，帝国在信仰上的统一仍未完成。"
 TIA_water_court: "水神裁判所"
 TIA_water_court_desc: "水神裁判所以芙宁娜教义为法理基础，不仅审理宗教争端，更拥有对贵族违法行为的审判权。这个新生的司法机构正在重塑帝国的权力格局。"
 TIA_southern_purification: "南方净化"
 TIA_southern_purification_desc: "帝国正在南方强制推行芙宁娜正统，阿库娅神殿被关闭，教产被没收。南方的反抗活动虽被压制，但暗流涌动。"
 TIA_Funina_orthodoxy_mature: "芙宁娜正统（成熟期）"
 TIA_Funina_orthodoxy_mature_desc: "芙宁娜信仰与枫丹朝圣经济的结合产生了意想不到的化学反应。帝国的宗教政策不再仅仅是信仰工具，更成为了经济增长的引擎。"
 TIA_Funina_orthodoxy_enforced: "芙宁娜正统（强制推行）"
 TIA_Funina_orthodoxy_enforced_desc: "南方动乱被武力平定后，帝国的芙宁娜信仰在全境确立了绝对权威。统一的代价是南方省份的深重创伤和持续的维稳成本。"
 TIA_water_harmony_spirit: "水之和谐"
 TIA_water_harmony_spirit_desc: "皇权即神权，水神的意志通过皇帝传达，水神裁判所是帝国司法的最高层级。秩序、法律、信仰三位一体——这是堤亚穆帝国的终极形态。"
 TIA_divine_authority_spirit: "神罚之水"
 TIA_divine_authority_spirit_desc: "芙宁娜的意志不可违抗，一切法律的最终解释权归于水神裁判所。帝国在绝对的信仰权威下实现了高效统一，但自由思想的火种已经熄灭。"

 # 世俗化系
 TIA_secularization_chaos: "信仰真空"
 TIA_secularization_chaos_desc: "政教分离敕令让两大教派同时愤怒——这是建国以来从未出现过的局面。帝国正处于最危险的信仰真空期，社会动荡严重，军队士气低落。唯一的安慰是，知识分子和少数开明贵族站在了米雅这边。"
 TIA_secularization_transition: "世俗化过渡期"
 TIA_secularization_transition_desc: "最坏的时候已经过去了。两大教派的抗议从暴风骤雨变成了断断续续的雷阵雨，社会秩序正在缓慢恢复。但帝国仍然需要找到一个新的精神支柱来取代宗教——否则信仰真空终将被别的东西填满。"
 TIA_age_of_reason: "理性时代"
 TIA_age_of_reason_desc: "《理性时代宣言》为帝国指明了方向：科学、法律和人文精神将取代神权成为国家的基石。旧教派仍有不满，但新思潮的力量正在成长。"
 TIA_secular_tolerance: "世俗宽容"
 TIA_secular_tolerance_desc: "信仰自由保障法确立了帝国的包容精神：所有信仰合法存在，但宗教不得干涉政务。两大教派在法律的框架下逐渐接受了共处的现实。帝国以制度而非暴力实现了和解。"
 TIA_state_atheism_spirit: "国家无神论"
 TIA_state_atheism_spirit_desc: "所有官方神殿被关闭，宗教教育被清除，教产被没收充公。帝国以空前的效率消灭了宗教的公共影响力，但也因此成为了整个世界的异类——没有任何国家能理解一个否认一切神明的帝国。"
 TIA_enlightened_empire_spirit: "理性之光"
 TIA_enlightened_empire_spirit_desc: "堤亚穆帝国证明了即使在一个魔法与神权并存的世界里，人类也可以用理性和制度来治理国家。这束光芒吸引了全世界的目光——东大陆的共和主义者发现启蒙帝制比他们想象的更接近理想，西大陆的君主们则惊讶于一个放弃神权的帝国竟然如此稳定。"
 TIA_scientific_supremacy_spirit: "钢铁理性"
 TIA_scientific_supremacy_spirit_desc: "这个帝国不相信任何神明，只相信数据、实验和钢铁。魔法被视为可以用科学方法研究的自然现象而非恩赐。工厂全速运转，实验室夜以继日。堤亚穆变得空前强大，也空前孤独——因为在这个世界上，没有人愿意与一个否认神明的国家做朋友。"

 # 阿库娅系
 TIA_Aqua_orthodoxy_established: "阿库娅正统"
 TIA_Aqua_orthodoxy_established_desc: "帝国已正式确立阿库娅为唯一正统水神。“滋养万物、庇佑苍生”的教义在南方省份获得了狂热支持，农民和士兵们以空前的热情响应帝国号召。然而北方的知识分子和芙卡洛斯信仰的发源地枫丹正暗流涌动。"
 TIA_divine_grace_mission_spirit: "女神恩泽布道团"
 TIA_divine_grace_mission_spirit_desc: "布道团将宗教活动与社会福利绑定，在底层民众中建立了极高的支持率。帝国的征兵和动员能力大幅提升，但工业生产因劳动力被抽调参加宗教活动而受到影响。"
 TIA_Aqua_militant_faith: "阿库娅武装信仰"
 TIA_Aqua_militant_faith_desc: "神恩征召令将宗教狂热转化为军事力量。数以万计的信徒志愿参军，帝国的战争潜力急剧膨胀。但这种以狂信为基础的军事力量是否可控，没有人能给出确定的答案。"
 TIA_Aqua_pragmatic_faith: "阿库娅务实信仰"
 TIA_Aqua_pragmatic_faith_desc: "通过安抚北方学者，帝国在维持阿库娅正统的同时保留了理性的声音。这种平衡虽然脆弱，却让帝国避免了走向极端。"
 TIA_aqua_renaissance_research_boost: "阿库娅文艺复兴"
 TIA_aqua_renaissance_research_boost_desc: "宗教热情与科学精神的融合催生了大量学术成果。帝国正在经历一场前所未有的知识爆发。"
 TIA_Aqua_enlightened_faith: "阿库娅开明信仰"
 TIA_Aqua_enlightened_faith_desc: "阿库娅文艺复兴证明了信仰与理性可以共存。帝国在不放弃宗教传统的前提下拥抱了科学精神，走出了一条兼容并蓄的道路。"
 TIA_aqua_militant_theocracy_spirit: "神恩即力量"
 TIA_aqua_militant_theocracy_spirit_desc: "帝国不再是一个拥有军队的国家，而是一支拥有国家的军队。阿库娅最高神官在帝国决策中的话语权已与皇帝平起平坐——甚至更大。帝国如同一柄圣剑，无比锋利，但握住它的手正在流血。"
 TIA_aqua_benevolent_spirit: "水之恩泽"
 TIA_aqua_benevolent_spirit_desc: "帝国在阿库娅“滋养万物”的教义下走出了一条独特的“仁慈神权”之路。皇帝以水神代言人的身份治国，治理核心是恩泽而非暴力。这条路既不通向断头台，也不通向战场，而是通向一个水神眷顾的黄金时代。"

 TIA_faith_international_scholars: "国际访问学者"
 TIA_faith_international_scholars_desc: "来自各国的学者齐聚十桥大学，与帝国学者交流理性治国的理念。这种跨国学术合作极大地促进了知识进步。"

 TIA_faith_harvest_blessing: "丰收的恩泽"
 TIA_faith_harvest_blessing_desc: "在阿库娅的庇佑下，帝国迎来了罕见的大丰收。粮仓充盈，民众安乐，水之恩泽的教义从未如此深入人心。"

 TIA_faith_war_prayer_buff: "阿库娅的战斗祝福"
 TIA_faith_war_prayer_buff_desc: "战前大祈祷让将士们坚信阿库娅女神正在庇佑帝国军队。这种信仰带来的力量是真实的——士气高涨、纪律严明、视死如归。"

 TIA_faith_chaplain_corps_permanent: "随军祭司团"
 TIA_faith_chaplain_corps_permanent_desc: "每一个帝国军师都配备了阿库娅随军祭司，负责维护将士的精神状态、主持战前祈祷和战后抚慰。这已经成为帝国军队不可分割的一部分。"

 ###################################
 # 水神信仰线 - 事件临时国民精神本地化
 ###################################

 TIA_faith_southern_protest_suppressed: "南方抗议镇压"
 TIA_faith_southern_protest_suppressed_desc: "帝国宪兵正在南方省份维持秩序，抗议活动被控制但并未完全平息。"
 TIA_faith_martial_law_lite: "有限戒严"
 TIA_faith_martial_law_lite_desc: "近卫军被部署在帝都街头维持秩序。虽然没有使用武力，但军人的存在让市民生活受到了明显影响。"
 TIA_faith_curfew: "临时宵禁"
 TIA_faith_curfew_desc: "帝都实施临时宵禁令，夜间禁止出行。社会秩序正在恢复，但经济活动也因此受到抑制。"

 # 内阁线终点国民精神
 TIA_new_dawn_spirit: "堤亚穆的新曙光"
 TIA_new_dawn_spirit_desc: "皇女的理想主义化作帝国的新信条。民众重新抬头仰望希望的星空，帝国在废墟中找到了新的方向。"
 TIA_reshaping_reason_spirit: "理智重塑国家"
 TIA_reshaping_reason_spirit_desc: "在爱丽丝的推动下，科学理性成为国家的基石。实验室与工厂取代了神殿与教堂，帝国的未来由人类之手铸就。"
 TIA_people_are_empire_spirit: "民心即帝国"
 TIA_people_are_empire_spirit_desc: "安妮的理念深入人心——民众才是帝国真正的基石。救济、卫生、民选议会，这些看似微小的改革正在重塑帝国的灵魂。"
 TIA_imperial_spirit_idea: "帝国军魂"
 TIA_imperial_spirit_idea_desc: "“只要帝国尚存，军魂永不灭。”艾克莱尔重新点燃了帝国军队的骄傲与纪律，钢铁般的意志再次流淌在每一名士兵的血液中。"
 TIA_common_destiny_spirit: "帝国的共同命运"
 TIA_common_destiny_spirit_desc: "迪欧娜的民族整合政策让帝国境内的各族群逐渐找到了共同的认同——他们首先是堤亚穆的臣民，然后才是各自民族的成员。"
 TIA_financial_miracle_spirit: "财政奇迹"
 TIA_financial_miracle_spirit_desc: "在路德维希冷酷而精确的计算下，帝国财政终于出现盈余。国债被偿还，金库有了存余，经济运转回到了正轨。"
 TIA_empire_steel_spirit: "钢铁的帝国"
 TIA_empire_steel_spirit_desc: "莉薇娅的基础设施重建计划让帝国的骨架重新坚固。铁路贯通南北，工厂的烟囱再次冒出浓烟，帝都焕发出新的生机。"
 TIA_regeneration_technique_spirit: "堤亚穆的再生术"
 TIA_regeneration_technique_spirit_desc: "尤蜜拉证明了魔法是文明的延续而非堕落的象征。魔力被重新理解、利用和转化，帝国在科学与魔法的交汇处找到了独特的发展道路。"
 TIA_maginot_reformed_spirit: "马其诺学院改革完成"
 TIA_maginot_reformed_spirit_desc: "经过漫长而艰难的改革，马其诺军事学院重新成为西大陆最优秀的军官摇篮。新战术、新装备、新精神——帝国军队脱胎换骨。"

 TIA_plague_shield: "帝国防疫体系"
 TIA_plague_shield_desc: "通过医疗改革与公共卫生运动的双重努力，堤亚穆帝国建立起了一套完整的疫病防控体系。\n\n§G日记中记载的那场夺走十万人生命的瘟疫，这一次没有发生。§!"
 TIA_plague_weakened: "衰退的疫病"
 TIA_plague_weakened_desc: "瘟疫的威胁虽未完全消除，但帝国的防疫措施已经将其控制在了可承受的范围内。\n\n§Y日记中的噩梦被部分改写了——虽然不完美，但足以让帝国继续前行。§!"
 TIA_plague_scarred: "瘟疫的伤疤"
 TIA_plague_scarred_desc: "瘟疫已经过去了，但它留下的伤疤深深刻在了帝国的肌体上。\n\n§R这场灾难本可以避免。如果在一切开始之前，有人做好了准备……§!"

 TIA_fontaine_model_province: "帝国的模范省份"
 TIA_fontaine_model_province_desc: "枫丹危机的和平解决被帝国内外视为范例。昔日的叛乱温床如今成为帝国治理智慧的最佳证明——文化得到尊重、经济蓬勃发展、政治参与有序。枫丹人民以“帝国模范省份”的身份感到自豪。"

 TIA_fontaine_martial_law_cost: "枫丹军管维稳"
 TIA_fontaine_martial_law_cost_desc: "在枫丹维持军事管制需要大量的人力和物力。驻军需要轮换、补给线需要维护、情报网需要运转——这一切都在消耗帝国的资源。"

 TIA_fontaine_occupation_cost: "枫丹占领成本"
 TIA_fontaine_occupation_cost_desc: "枫丹被正式吞并后，帝国面临着巨大的治理成本。当地民众的消极抵抗、地下组织的破坏活动、国际社会的谴责——这一切都在持续消耗帝国的政治力量和经济资源。"

 TIA_fontaine_direct_admin: "枫丹直辖管理"
 TIA_fontaine_direct_admin_desc: "枫丹名义上仍是帝国的附属国，但实权已完全归帝国总督掌握。这种“名为自治实为直辖”的模式减少了国际非议，但日常管理的成本仍然不低。"




#FOCUS
 TIA_dream: "梦？"
 TIA_dream_desc: "破烂的囚服下拖曳着沉重的镣铐，米雅麻木的向行刑台上走去。谩骂、怒吼声潮水般撞击着耳膜，台下是人群中一道道愤怒、仇恨的目光。台前，席翁、迪欧娜、迪奥等人的身影矗立，宣告着行刑开始，狂热的欢呼中，脖子传来一阵剧痛，她的意识逐渐消散..."
 TIA_Choice: "抉择"
 TIA_Choice_desc: "刚才是梦？惊醒后，环顾四周，还是在自己华丽的卧室里。米雅刚松了口气，突然看到桌子上染血的日记，正是自己记录牢狱生活的，翻开细细阅读，冷汗大滴流出，难道走向断头台的命运是注定的？不行，一定要全力改变！"
 TIA_Make_change: "做出改变"
 TIA_Make_change_desc: "有了牢狱之灾的经历，米雅的待人接物有了巨大改变，这让身边的人十分讶异和佩服，也收获了侍女安妮等人的认可和效忠。当然，仅仅这样是不够的，表面风平浪静的帝国实际上问题巨大、暗流涌动，记忆中首当其冲就是逐渐崩溃的帝国财政。"
 TIA_Financial_issues: "财政问题"
 TIA_Financial_issues_desc: "支出远超收入，作为帝国财政部门的金月省却对此毫无作为，作为帝国唯一皇女，米雅将上一世因为直言问题、得罪上级被调离的优秀文官路德維希·休伊特，发动特权留在身边，通过重新规划调整，逐步改善财政问题。"
 TIA_Prevention_plague: "医疗改革"
 TIA_Prevention_plague_desc: "据日记记载，因为突发的瘟疫导致路德維希所改善的财政全部功亏一篑，导致米雅还是无法逃离断头台的命运，因此，米雅来到了首都最贫苦的地方，将自己宝贵的头饰交给路德维希以迫使贵族出资支持卫生改善，现在，只需要等待......"
 TIA_ensure_national_belief: "确立国民信仰"
 TIA_ensure_national_belief_desc: "堤亚穆帝国长久以来引以为傲的水神信仰，如今却成了分裂国家的利刃。南方高呼§Y阿库娅§!之名，北方则坚信§Y芙卡洛斯/芙宁娜§!才是真神。这种信仰上的混乱不仅动摇了君权神授的根基，更在街头巷尾、城镇乡村酿成无数冲突，严重威胁着帝国的稳定与安全。米娅也不能再坐视不理！是时候以帝国最高权威，一锤定音，确立唯一、至高、不容置疑的§G国家水神信仰§!，结束这场无谓的纷争，将帝国的力量重新凝聚起来。无论选择哪一位女神，或是采取更激进的措施，这都将是一个塑造帝国未来灵魂的决定。"
 TIA_next_step_plan: "下一步计划......"
 TIA_next_step_plan_desc: ""
 TIA_class_discrimination_reform: "阶级歧视改革"
 TIA_class_discrimination_reform_desc: ""
 TIA_Investigate_revolutionary_organizations: "调查革命组织"
 TIA_Investigate_revolutionary_organizations_desc: ""
 TIA_befriend_neighbors: "交好友邦邻国"
 TIA_befriend_neighbors_desc: ""
 TIA_purg_opposition: "清洗反对派"
 TIA_purg_opposition_desc: ""
 TIA_Contact_Chamber_Commerce: "联系温克勒商会"
 TIA_Contact_Chamber_Commerce_desc: ""
 TIA_Wheat_import_contract: "进口小麦合约"
 TIA_Wheat_import_contract_desc: "为了解决日记中预言的饥荒问题，米雅跟克萝伊同学的父亲，商会会长马可·福克罗德进行了会晤。米雅提出向福克罗德商会长期定价采购小麦解决潜在危机。通过长期贸易形成商路维持供应，会长也折服在皇女的惊世智慧下。"
 TIA_Dealing_Jinghai_Forest: "处理静海森林问题"
 TIA_Dealing_Jinghai_Forest_desc: "贝尔曼子爵为了开拓领地，准备整军驱逐静海森林的原住民。根据前世记忆，战斗牺牲很大，战后士兵们对支持启动战争的皇女怨气极重，更有像迪奥·阿莱亚这种军官在革命后迅速倒戈，给了帝国致命一击。可以说阻止战争刻不容缓。"
 TIA_Establishment_Princess_Directly_Governed_Territory: "建立皇女镇"
 TIA_Establishment_Princess_Directly_Governed_Territory_desc: "在静海森林中遭遇危机后，米雅阻止军队继续深入。她决定提出将森林纳入皇女直辖领，并命令子爵在附近兴建皇女镇，预感到自己将要名声大噪的子爵立刻同意了。"
 TIA_build_school: "帝国境内的“圣诺尔学院”"
 TIA_build_school_desc: "另一方面，贝尔曼子爵的扩张行为引发了相邻的鲁多路冯伯爵的不满。为了平衡事态，也为继续保持与迪欧娜的良好关系，米雅计划将迪欧娜的弟弟塞洛引荐进入即将开工建设的帝国第一名校中。"
 TIA_Rudolvon_food_reserves: "皇女“名下”的小麦储备"
 TIA_Rudolvon_food_reserves_desc: "米雅与鲁多路冯伯爵的会面中，提出了解决饥荒的另外一个想法，在饥荒发生时，可以用皇女的名义向灾民发放伯爵府内存粮，收获名声的同时也避免了其他贵族影响救灾秩序，不愧是帝国第一睿智米娅殿下呢。"
 TIA_Shrink_territory_management: "加强中央集权"
 TIA_Shrink_territory_management_desc: ""
 TIA_Soothe_North: "安抚北方"
 TIA_Soothe_North_desc: ""
 TIA_abolish_slavery: "废除奴隶制"
 TIA_abolish_slavery_desc: ""
 TIA_floating_city_construction: "浮游都市的建成方法"
 TIA_floating_city_construction_desc: ""
 TIA_magnificent_kingdom_construction: "美好国度的建设方略"
 TIA_magnificent_kingdom_construction_desc: ""
 TIA_Royal_Cabinet: "皇家内阁"
 TIA_Royal_Cabinet_desc: "米雅陛下的皇家内阁囊括了各地各方面的精英，都是忠诚于米娅陛下的内阁成员，致力于推进米娅的愿景。尽管他们都有所图谋，努力在核心圈内晋升为“内阁领袖”，他们的影响力塑造了军事、工业和政治决策，并推动堤亚穆帝国的政策制定。"
 TIA_cabinet_Miabel_Runa_Tiamun: "米雅贝儿·卢娜·堤亚穆"
 TIA_cabinet_Miabel_Runa_Tiamun_desc: "米雅来自未来的子嗣，堤亚穆帝国的顺位继承人。"
 TIA_cabinet_Alice_Bedford: "爱丽丝·贝德福德"
 TIA_cabinet_Alice_Bedford_desc: "爱丽丝·贝德福德，跳级就读堤亚穆十桥大学的天才少女，与高能力相衬的高自尊心和强烈的自我表现欲，在十桥大学中显得有些格格不入。在图书馆看书有随意标注的习惯，馆内藏书几乎全有爱丽丝的笔记。"
 TIA_cabinet_Anne_Littstein: "安妮·理特斯坦"
 TIA_cabinet_Anne_Littstein_desc: ""
 TIA_cabinet_Tiona_Rudolvon: "迪欧娜·鲁多路冯"
 TIA_cabinet_Tiona_Rudolvon_desc: ""
 TIA_cabinet_Ludwig_Hewitt: "路德维希·休伊特"
 TIA_cabinet_Ludwig_Hewitt_desc: ""
 TIA_cabinet_Livia: "莉薇娅"
 TIA_cabinet_Livia_desc: ""
 TIA_cabinet_Ekure: "艾克莱尔"
 TIA_cabinet_Ekure_desc: ""
 TIA_cabinet_Yumiella_Dolkness: "尤蜜拉·多克尼斯"
 TIA_cabinet_Yumiella_Dolkness_desc: ""
 TIA_empire_tomorrow: "帝国的明日"
 TIA_empire_tomorrow_desc: "帝国的未来并非掌握在旧贵族或商会手中，而在继承帝位的少女心中。她的理想或许稚嫩，但能让民众再度抬头望向希望的星空。"
 TIA_reaffirming_imperial_power: "重申皇权"
 TIA_reaffirming_imperial_power_desc: "王室权威的衰落令地方诸侯肆意妄为。米雅贝儿宣布恢复皇室议会对地方的统治权，虽引起贵族不满，却赢得平民喝彩。"
 TIA_royal_edict: "王室诏令"
 TIA_royal_edict_desc: "皇女亲自颁布诏令，重整帝国机构并清除腐败的官僚。"
 TIA_new_dawn_for_tearmoon: "“堤亚穆的新曙光”"
 TIA_new_dawn_for_tearmoon_desc: "皇女的理想主义化作帝国的新信条，“新堤亚穆”的口号响彻全国。"
 TIA_light_reason: "理性之光"
 TIA_light_reason_desc: "爱丽丝主张在混乱中保持冷静与数据分析，用科学重建国力。"
 TIA_military_research_budget_restarted: "军用研究预算重启"
 TIA_military_research_budget_restarted_desc: "关闭多年的军工研究所重新点燃炉火，科学家们回到实验室。"
 TIA_magic_technology_fusion: "魔导科技融合" 
 TIA_magic_technology_fusion_desc: "爱丽丝大胆提出将古老魔法与现代科技结合，这一举动让学术界震动。"
 TIA_reshaping_country_reason: "理智重塑国家"
 TIA_reshaping_country_reason_desc: "在爱丽丝的推动下，科学理性成为国家的新信条。帝国的未来不再由神祇决定，而由人类之手铸就。"
 TIA_relief_food_distribution: "救济与粮配"
 TIA_relief_food_distribution_desc: "面对瘟疫与饥荒，安妮推出粮食救济与基本生活保障。"
 TIA_public_health_campaigns: "公共卫生运动"
 TIA_public_health_campaigns_desc: "计划改善卫生环境，遏制瘟疫传播。"
 TIA_rebuilding_local_councils: "重建地方议会"
 TIA_rebuilding_local_councils_desc: "为削弱贵族控制，安妮重启地方民选议会制度。"
 TIA_people_are_empire: "民心即帝国"
 TIA_people_are_empire_desc: "安妮的理念深入人心——民众才是帝国的基石。"
 TIA_rectify_military_discipline: "整顿军纪"
 TIA_rectify_military_discipline_desc: "在战乱与腐败的阴影下，艾克莱尔发起大规模军纪整肃行动。"
 TIA_unified_military_command_system: "军部统一指挥体系"
 TIA_unified_military_command_system_desc: "削弱各地军阀，将军权再度集中于帝都。"
 TIA_iron_and_blood_recast: "铁血再铸"
 TIA_iron_and_blood_recast_desc: "新式训练体系全面推广，帝国军的精锐传统被重新唤醒。"
 TIA_imperial_spirit: "帝国军魂"
 TIA_imperial_spirit_desc: "“只要帝国尚存，军魂永不灭”"
 TIA_imperial_national_integration_bureau: "帝国民族整合局"
 TIA_imperial_national_integration_bureau_desc: "迪欧娜创建民族事务局，以重新界定帝国臣民身份。"
 TIA_assimilation_policy: "同化政策"
 TIA_assimilation_policy_desc: "实施“文化统一教育”，强化中央认同。"
 TIA_border_autonomy_experiment: "边境自治实验"
 TIA_border_autonomy_experiment_desc: "在多族混居地区试行有限自治，减少冲突。"
 TIA_common_destiny_empire: "帝国的共同命运"
 TIA_common_destiny_empire_desc: "迪欧娜的口号成为帝国统一的象征。"
 TIA_fiscal_austerity_orders: "财政紧缩令"
 TIA_fiscal_austerity_orders_desc: "路德维希颁布紧缩政策，削减冗余支出。"
 TIA_empire_bond_issue: "帝国债券发行"
 TIA_empire_bond_issue_desc: "推行“堤亚穆国债”计划，以未来换取现在。"
 TIA_nationalization_chamber_commerce: "商会国有化"
 TIA_nationalization_chamber_commerce_desc: "收回贵族商会与地方行会的财政控制权，收入归于帝都。"
 TIA_financial_miracle: "财政奇迹"
 TIA_financial_miracle_desc: "在路德维希冷酷的计算下，帝国财政终于出现盈余。"
 TIA_rebuilding_imperial_capital: "重修帝都"
 TIA_rebuilding_imperial_capital_desc: "堤亚穆帝都满目疮痍，莉薇娅将指挥修复工程。"
 TIA_north_south_transportation_plan: "南北交通计划"
 TIA_north_south_transportation_plan_desc: "推行“南北通行工程”，修复全国铁路公路网络。"
 TIA_industrial_revitalization: "工业再兴"
 TIA_industrial_revitalization_desc: "废弃的工厂被重新启用，生产再次启动。"
 TIA_empire_steel: "钢铁的帝国"
 TIA_empire_steel_desc: "“唯有钢与混凝土，才能支撑文明的躯干。”"
 TIA_mana_drain_research: "魔力枯竭研究"
