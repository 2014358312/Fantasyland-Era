 TIA_import_wheat: "进口小麦合约"
 TIA_import_wheat_desc: "米娅主导的进口小麦合约已经进入正常履行状态，稳定的小麦进口解决了国内粮食短缺的问题，即便进入粮食充足的时期也可以贮藏起来作为国家储备粮，因此不用过于担心饥荒的发生了。"
