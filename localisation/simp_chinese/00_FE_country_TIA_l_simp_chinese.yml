 TIA_grain_agreement_signed: "一口价粮食进口协议"
 TIA_grain_agreement_signed_desc: "§G与温克勒商会的一口价粮食进口协议正式生效。和平时期帝国支付略高于市价的固定采购价（消费品微增），但一旦饥荒来临，帝国将以同样的价格获得保命的粮食。§!"
 TIA_famine_emergency_purchase: "紧急粮食采购"
 TIA_famine_emergency_purchase_desc: "由于国内粮食短缺，帝国被迫启动紧急粮食采购程序，从国际市场以高价购买大量粮食来缓解饥荒的压力。虽然短期内解决了粮食危机，但长期来看可能会加剧财政负担。"
 TIA_famine_crisis: "粮食危机"
 TIA_famine_crisis_desc: "帝国正在经历严重的粮食短缺。粮价飞涨，平民挨饿，社会秩序岌岌可危。\n\n§R如果当初签了粮食进口协议，这一切本可以避免。§!"
 TIA_famine_devastation: "饥荒的废墟"
 TIA_famine_devastation_desc: "饥荒已经过去了，但它留下的废墟触目惊心。帝国失去了大量人口，经济遭到毁灭性打击，南方数省几近瘫痪。\n\n§R在日记记载的“那个”未来里，饥荒就是帝国崩溃的起点。这一次……历史正在重演。§!"

