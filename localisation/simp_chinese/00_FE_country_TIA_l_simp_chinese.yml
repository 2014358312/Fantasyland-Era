 TIA_Mia_Runa_Tiamun_desc: "堤亚穆帝国的第一皇女。\n\n§C该人物将随着剧情的进展而对属性产生修正§!"
 Anne_Littstein: "安妮·理特斯坦"
 Tiona_Rudolvon: "迪欧娜·鲁多路冯"
 TIA_Tiona_Rudolvon_desc: "堤亚穆帝国边境领地的边土伯爵的长女。\n\n§C该人物将随着剧情的进展而对属性产生修正§!"
 Dion_Alaia: "迪奥·阿莱亚"
 Ludwig_Hewitt: "路德维希·休伊特"
 TIA_Ludwig_Hewitt_desc: "堤亚穆帝国的文官。优秀但尖酸刻薄。由于他的尖酸刻薄而被上司讨厌，被调到地方工作。米雅阻止了路德维希的调职，并重用他作为自己的得力助手。"
